<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>2-12 출석 로그인</title>
  <link rel="manifest" href="../manifest.json?v=10">
  <link rel="icon" href="../favicon.png?v=10">
  <link rel="apple-touch-icon" href="../favicon.png?v=10">
  <meta name="theme-color" content="#fafaf8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="2-12 출석">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root{--bg:#fafaf8;--soft:#f1f0ec;--card:#fffefb;--text:#1f2320;--muted:#74746e;--line:rgba(92,92,84,.18);--accent:#3f403a;--accent2:#2e302b;--accentText:#fff;--red:#b7423a;--green:#2f8f5b;--input:#fffefb;--shadow:0 18px 50px rgba(31,35,32,.07)}
    @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--soft:#303030;--card:#242424;--text:#f2f0ea;--muted:#aaa69e;--line:rgba(230,226,215,.14);--accent:#d8d3c5;--accent2:#eee8d9;--accentText:#1a1a1a;--red:#e07b73;--green:#78c59a;--input:#202020;--shadow:0 22px 60px rgba(0,0,0,.32)}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--bg);color:var(--text);font-family:"Google Sans", "Google Sans Text", "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif}
    .card{width:min(440px,100%);padding:28px;border:1px solid var(--line);border-radius:28px;background:var(--card);box-shadow:var(--shadow)}
    .brand{display:inline-flex;align-items:center;min-height:28px;margin-bottom:18px;padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:var(--soft);font-size:12px;font-weight:900;letter-spacing:.02em}
    .hidden{display:none!important}
    h1{margin:0;font-size:29px;line-height:1.16;letter-spacing:-.055em;font-weight:950}
    .sub{margin:8px 0 22px;color:var(--muted);font-size:14px;line-height:1.55;font-weight:700}
    button,input{font:inherit}button{border:0;cursor:pointer}button:disabled,input:disabled{opacity:.55;cursor:not-allowed}
    .primary,.secondary{width:100%;min-height:48px;border-radius:15px;font-size:14px;font-weight:950}
    .primary{background:var(--accent);color:var(--accentText)}.primary:hover{background:var(--accent2)}
    .secondary{margin-top:12px;background:var(--soft);color:var(--text);border:1px solid var(--line)}
    .status{margin-top:14px;padding:11px 12px;border:1px solid var(--line);border-radius:14px;background:var(--soft);color:var(--muted);font-size:12px;line-height:1.5;font-weight:750}
    .status.ok{color:var(--green)}.status.bad{color:var(--red)}
    .device-hint{margin-top:9px;color:var(--muted);text-align:center;font-size:12px;font-weight:750}
    .google-wrap{display:grid;place-items:center;min-height:44px}
    .google-loading{color:var(--muted);font-size:12px;font-weight:750}
    .divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--muted);font-size:12px;font-weight:850}
    .divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--line)}
    label{display:block;margin:12px 0 7px;font-size:13px;font-weight:850}
    input{width:100%;height:46px;border:1px solid var(--line);border-radius:14px;padding:0 14px;background:var(--input);color:var(--text);font-size:15px;outline:none}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(92,92,84,.12)}
    .text-link{display:block;width:100%;margin-top:14px;padding:7px;border:0;background:transparent;color:var(--muted);text-align:center;text-decoration:none;font-size:13px;font-weight:850}
    .note{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.55;text-align:center;font-weight:700}
    .loading{position:fixed;inset:0;display:none;place-items:center;padding:20px;background:rgba(31,35,32,.55);z-index:40}.loading.show{display:grid}
    .loading-card{width:min(340px,100%);padding:28px 22px;border:1px solid var(--line);border-radius:24px;background:var(--card);box-shadow:var(--shadow);text-align:center}
    .spinner{width:42px;height:42px;margin:0 auto 16px;border-radius:50%;border:4px solid rgba(92,92,84,.16);border-top-color:var(--accent);animation:spin .75s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    .loading-title{font-size:17px;font-weight:950}.loading-sub{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.5;font-weight:750}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(8px);max-width:calc(100vw - 32px);padding:12px 16px;border-radius:999px;background:#1f2320;color:#fff;font-size:13px;font-weight:850;text-align:center;opacity:0;pointer-events:none;transition:.25s;z-index:50}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:560px){body{padding:14px;align-items:start;padding-top:max(34px,env(safe-area-inset-top))}.card{padding:24px 20px;border-radius:24px}h1{font-size:27px}}
  </style>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
</head>
<body>
  <main class="card">
    <div class="brand">2-12 출석</div>

    <section id="normalLoginPanel">
      <h1>관리자 로그인</h1>
      <div class="sub">Google 계정 또는 관리자 계정으로 로그인하세요.</div>
      <div class="google-wrap">
        <div id="googleButton"></div>
        <div id="googleLoading" class="google-loading">Google 로그인 불러오는 중…</div>
      </div>
      <div class="divider">또는 관리자 로그인</div>
      <label for="adminId">관리자 ID</label>
      <input id="adminId" type="text" placeholder="관리자 ID" autocomplete="username">
      <label for="adminPw">관리자 비밀번호</label>
      <input id="adminPw" type="password" placeholder="비밀번호" autocomplete="current-password">
      <button id="adminLoginBtn" class="primary" type="button" onclick="adminLogin()">관리자 로그인</button>
      <a class="text-link" href="../?help=1">도움말</a>
      <div class="note">패스키가 등록된 기기에서는 기기 인증 화면이 자동으로 표시됩니다.</div>
    </section>

    <section id="passkeyPanel" class="hidden">
      <h1 id="passkeyTitle">기기 인증 로그인</h1>
      <div id="passkeySub" class="sub">등록된 기기 인증을 요청합니다.</div>
      <button id="passkeyLoginBtn" class="primary" type="button" onclick="passkeyLogin(false)">
        <span id="passkeyButtonText">기기 인증 다시 시도</span>
      </button>
      <div id="deviceHint" class="device-hint">Face ID · Touch ID · Windows Hello · 기기 PIN</div>
      <div id="passkeySupportState" class="status ok">기기 인증을 시작합니다.</div>
      <button class="secondary" type="button" onclick="showNormalLogin('다른 로그인 방법을 표시합니다.')">다른 방법으로 로그인</button>
      <a class="text-link" href="../?help=1">도움말</a>
    </section>
  </main>

  <div id="loading" class="loading" aria-hidden="true">
    <div class="loading-card"><div class="spinner"></div><div id="loadingTitle" class="loading-title">로그인 중입니다</div><div id="loadingSub" class="loading-sub">잠시만 기다려주세요.</div></div>
  </div>
  <div id="toast" class="toast">알림</div>

  <script>
    const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbzE5SDb4aYv5MtyUCP1r0sAp24wBEfWbySKRQXxpuiLrv6irwSbG4L8ABSNWZY8pEvX/exec";
    const GOOGLE_CLIENT_ID="802531292497-rjso2clr980pru87nc3sbf1nofq31kcc.apps.googleusercontent.com";
    let loginLoading=false,googleInitialized=false,googleAttempts=0;

    document.addEventListener("DOMContentLoaded",function(){
      localStorage.removeItem("attendancePersistentAuth");
      initializeSystemTheme();
      rememberRequestedRoute();
      document.getElementById("adminPw").addEventListener("keydown",e=>{if(e.key==="Enter")adminLogin()});
      if(hasSession()){routeAfterRecoveryLogin();return}
      initGoogleButton();
      if(isPasskeyRegistered()&&supportsPasskey()){
        showPasskeyPanel();setDeviceText();setTimeout(()=>passkeyLogin(true),350);
      }else showNormalLogin();
    });

    window.addEventListener("error",function(){if(!loginLoading)showNormalLogin()});
    function initializeSystemTheme(){const theme=matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";sessionStorage.setItem("theme",theme);localStorage.setItem("attendanceTheme",theme)}
    function rememberRequestedRoute(){const next=new URLSearchParams(location.search).get("next")||"";if(["/setup-login-method/","/choose-login-method/","/dashboard/"].includes(next))sessionStorage.setItem("postLoginRoute",next)}
    function hasSession(){return!!(sessionStorage.getItem("sessionToken")||sessionStorage.getItem("adminId"))}
    function isPasskeyRegistered(){return localStorage.getItem("attendancePasskeyRegistered")==="1"&&!!localStorage.getItem("attendancePasskeyCredentialId")}
    function supportsPasskey(){return"PublicKeyCredential"in window&&!!navigator.credentials}
    function routeAfterRecoveryLogin(){const requested=sessionStorage.getItem("postLoginRoute")||"";if(requested){sessionStorage.removeItem("postLoginRoute");location.replace(".."+requested);return}location.replace(isPasskeyRegistered()?"../dashboard/":"../choose-login-method/")}
    function showPasskeyPanel(){document.getElementById("normalLoginPanel").classList.add("hidden");document.getElementById("passkeyPanel").classList.remove("hidden")}
    function showNormalLogin(message){stopLoading();loginLoading=false;document.getElementById("passkeyPanel").classList.add("hidden");document.getElementById("normalLoginPanel").classList.remove("hidden");initGoogleButton();if(message)toast(message)}
    function setDeviceText(){const ua=navigator.userAgent||"",ipad=navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1;const title=document.getElementById("passkeyTitle"),sub=document.getElementById("passkeySub"),btn=document.getElementById("passkeyButtonText"),hint=document.getElementById("deviceHint");if(/Windows/i.test(ua)){title.textContent="Windows Hello 로그인";sub.textContent="등록된 Windows Hello 인증을 요청합니다.";btn.textContent="Windows Hello 다시 시도";hint.textContent="얼굴 · 지문 · Windows Hello PIN"}else if(/iPhone|iPad|iPod/i.test(ua)||ipad){title.textContent="Face ID 로그인";sub.textContent="등록된 Face ID 또는 기기 인증을 요청합니다.";btn.textContent="Face ID 다시 시도";hint.textContent="Face ID · Touch ID · 기기 암호"}else if(/Macintosh|Mac OS X/i.test(ua)){title.textContent="Touch ID 로그인";sub.textContent="등록된 Touch ID 또는 Mac 인증을 요청합니다.";btn.textContent="Touch ID 다시 시도";hint.textContent="Touch ID · Mac 로그인 암호"}else if(/Android/i.test(ua)){title.textContent="기기 인증 로그인";sub.textContent="등록된 지문, 얼굴 또는 화면 잠금 인증을 요청합니다.";btn.textContent="기기 인증 다시 시도";hint.textContent="지문 · 얼굴 · 화면 잠금 PIN"}}

    async function passkeyLogin(autoStarted){
      if(loginLoading||!isPasskeyRegistered())return;
      if(!supportsPasskey()){showNormalLogin("이 브라우저는 기기 인증을 지원하지 않습니다.");return}
      loginLoading=true;setAllDisabled(true);startLoading("기기 인증 준비 중입니다",autoStarted?"등록된 로그인 방법을 불러옵니다.":"로그인 요청을 생성합니다.");
      try{
        const p=new URLSearchParams({action:"passkeyLoginOptionsJsonp",origin:location.origin,hostname:location.hostname,credentialId:localStorage.getItem("attendancePasskeyCredentialId")||"",deviceName:localStorage.getItem("attendancePasskeyDeviceName")||navigator.platform||"",userAgent:navigator.userAgent||""});
        const optionRes=await callJsonpPromise(APPS_SCRIPT_URL+"?"+p);
        if(!optionRes||!optionRes.ok)throw new Error(optionRes&&optionRes.message||"기기 인증 정보를 불러오지 못했습니다.");
        const source=optionRes.publicKey||optionRes.options||optionRes.data;if(!source||!source.challenge)throw new Error("기기 인증 요청 형식이 올바르지 않습니다.");
        const publicKey=normalizeRequestOptions(source);stopLoading();const credential=await navigator.credentials.get({publicKey});if(!credential)throw new Error("기기 인증 결과를 받지 못했습니다.");
        startLoading("기기 인증 확인 중입니다","서명을 확인하고 로그인합니다.");
        const v=new URLSearchParams({action:"passkeyLoginVerifyJsonp",requestId:optionRes.requestId||optionRes.challengeId||"",credential:JSON.stringify(serializeAssertion(credential)),origin:location.origin,hostname:location.hostname,userAgent:navigator.userAgent||""});
        const verifyRes=await callJsonpPromise(APPS_SCRIPT_URL+"?"+v);if(!verifyRes||!verifyRes.ok||!verifyRes.sessionToken)throw new Error(verifyRes&&verifyRes.message||"기기 인증 검증에 실패했습니다.");
        saveLoginSession("passkey",verifyRes);location.replace("../dashboard/");
      }catch(err){const cancelled=err&&err.name==="NotAllowedError";showNormalLogin(cancelled?"기기 인증이 취소되어 일반 로그인을 표시합니다.":err&&err.message||String(err))}finally{loginLoading=false;setAllDisabled(false)}
    }

    function initGoogleButton(){
      if(googleInitialized)return;
      if(!window.google||!google.accounts||!google.accounts.id){googleAttempts++;if(googleAttempts<40)setTimeout(initGoogleButton,250);else document.getElementById("googleLoading").textContent="Google 로그인을 불러오지 못했습니다. 관리자 로그인을 이용하세요.";return}
      googleInitialized=true;google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleGoogleCredential,auto_select:false,cancel_on_tap_outside:true});google.accounts.id.renderButton(document.getElementById("googleButton"),{type:"standard",theme:matchMedia("(prefers-color-scheme: dark)").matches?"filled_black":"outline",size:"large",text:"signin_with",shape:"pill",logo_alignment:"left",width:280});document.getElementById("googleLoading").classList.add("hidden")
    }
    function handleGoogleCredential(response){if(!response||!response.credential||loginLoading){if(!response||!response.credential)toast("Google 로그인 토큰을 받지 못했습니다.");return}loginLoading=true;setAllDisabled(true);startLoading("Google 계정 로그인 중입니다",getEmailFromGoogleCredential(response.credential)||"Google 계정");const p=new URLSearchParams({action:"googleLoginJsonp",idToken:response.credential});addClientParams(p);callJsonp(APPS_SCRIPT_URL+"?"+p,function(res){loginLoading=false;stopLoading();setAllDisabled(false);if(!res||!res.ok){toast(res&&res.message||"Google 로그인 실패");return}saveLoginSession("google",res);routeAfterRecoveryLogin()})}
    function adminLogin(){if(loginLoading)return;const adminId=document.getElementById("adminId").value.trim(),adminPw=document.getElementById("adminPw").value.trim();if(!adminId||!adminPw){toast("관리자 ID/PW를 입력하세요.");return}loginLoading=true;setAllDisabled(true);startLoading("관리자 계정 로그인 중입니다",adminId);const p=new URLSearchParams({action:"dashboardLoginJsonp",adminId,adminPw});addClientParams(p);callJsonp(APPS_SCRIPT_URL+"?"+p,function(res){loginLoading=false;stopLoading();setAllDisabled(false);if(!res||!res.ok){toast(res&&res.message||"관리자 로그인 실패");return}sessionStorage.setItem("loginType","admin");if(res.sessionToken)sessionStorage.setItem("sessionToken",res.sessionToken);else{sessionStorage.setItem("adminId",adminId);sessionStorage.setItem("adminPw",adminPw)}sessionStorage.setItem("loginRole",res.role||"ADMIN");routeAfterRecoveryLogin()})}
    function saveLoginSession(type,res){sessionStorage.setItem("loginType",type);sessionStorage.setItem("sessionToken",res.sessionToken||"");sessionStorage.setItem("loginEmail",res.email||"");sessionStorage.setItem("loginName",res.name||"");sessionStorage.setItem("loginRole",res.role||"ADMIN")}
    function addClientParams(p){p.set("deviceName",navigator.platform||"");p.set("screenSize",innerWidth+"x"+innerHeight);p.set("clientTime",new Date().toISOString());p.set("clientTimezone",Intl.DateTimeFormat().resolvedOptions().timeZone||"");p.set("userAgent",navigator.userAgent||"")}
    function normalizeRequestOptions(source){const result={...source,challenge:base64UrlToBytes(source.challenge)};if(Array.isArray(source.allowCredentials))result.allowCredentials=source.allowCredentials.map(x=>({...x,id:base64UrlToBytes(x.id)}));return result}
    function serializeAssertion(c){return{id:c.id,rawId:bytesToBase64Url(c.rawId),type:c.type,response:{authenticatorData:bytesToBase64Url(c.response.authenticatorData),clientDataJSON:bytesToBase64Url(c.response.clientDataJSON),signature:bytesToBase64Url(c.response.signature),userHandle:c.response.userHandle?bytesToBase64Url(c.response.userHandle):""},clientExtensionResults:c.getClientExtensionResults?c.getClientExtensionResults():{}}}
    function base64UrlToBytes(v){let s=String(v||"").replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";const b=atob(s);return Uint8Array.from(b,c=>c.charCodeAt(0))}
    function bytesToBase64Url(v){const bytes=new Uint8Array(v);let b="";bytes.forEach(x=>b+=String.fromCharCode(x));return btoa(b).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"")}
    function getEmailFromGoogleCredential(token){try{const p=String(token||"").split(".");if(p.length<2)return"";let x=p[1].replace(/-/g,"+").replace(/_/g,"/");while(x.length%4)x+="=";return String(JSON.parse(decodeURIComponent(Array.from(atob(x),c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""))).email||"").trim()}catch(e){return""}}
    function callJsonpPromise(url){return new Promise((resolve,reject)=>callJsonp(url,resolve,reject))}
    function callJsonp(url,callback,rejectCallback){const name="jsonp_"+Date.now()+"_"+Math.floor(Math.random()*1e5),script=document.createElement("script");let done=false;const timer=setTimeout(()=>finish(new Error("Apps Script 응답 시간 초과")),15000);function finish(err,data){if(done)return;done=true;clearTimeout(timer);delete window[name];script.remove();if(err){loginLoading=false;stopLoading();setAllDisabled(false);if(rejectCallback)rejectCallback(err);else toast(err.message)}else callback(data)}window[name]=data=>finish(null,data);script.src=url+(url.includes("?")?"&":"?")+"callback="+encodeURIComponent(name);script.onerror=()=>finish(new Error("Apps Script 연결 실패"));document.head.appendChild(script)}
    function setAllDisabled(disabled){["passkeyLoginBtn","adminId","adminPw","adminLoginBtn"].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=disabled})}
    function startLoading(title,sub){document.getElementById("loadingTitle").textContent=title||"로그인 중입니다";document.getElementById("loadingSub").textContent=sub||"잠시만 기다려주세요.";document.getElementById("loading").classList.add("show");document.getElementById("loading").setAttribute("aria-hidden","false")}
    function stopLoading(){document.getElementById("loading").classList.remove("show");document.getElementById("loading").setAttribute("aria-hidden","true")}
    function toast(message){const el=document.getElementById("toast");el.textContent=message;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2800)}
  </script>
</body>
</html>
