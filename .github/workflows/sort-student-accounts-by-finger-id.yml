name: Sort student accounts by fingerprint ID
on:
  push:
    paths:
      - 'scripts/sort-student-accounts-by-finger-id.py'
      - '.github/workflows/sort-student-accounts-by-finger-id.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/sort-student-accounts-by-finger-id.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/sort-student-accounts-by-finger-id.yml scripts/sort-student-accounts-by-finger-id.py
          git add -A
          git commit -m "Sort student account management by fingerprint ID" || exit 0
          git push
