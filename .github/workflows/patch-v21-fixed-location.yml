name: Patch fixed school location UI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-v21-fixed-location.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch administrator location UI
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('assets/app.js')
          text = path.read_text(encoding='utf-8')
          old = '<div class="student-school-config"><h3>해강중학교 위치 기준</h3><p>학교 안에서 현재 위치를 저장하면 학생 출석 허용 반경을 100m로 설정합니다.</p><button class="btn btn-soft btn-block" type="button" data-location>현재 위치를 학교 중심으로 저장</button></div>'
          new = '<div class="student-school-config"><h3>해강중학교 위치 기준</h3><p>35°09\'50.70&quot;N 129°08\'08.69&quot;E를 중심으로 반경 100m가 고정 적용됩니다.</p></div>'
          if old not in text:
              raise SystemExit('Expected location UI block was not found')
          text = text.replace(old, new)
          text = text.replace('overlay.querySelector("[data-location]").addEventListener("click", this.saveSchoolLocation.bind(this));', 'const locationButton=overlay.querySelector("[data-location]");if(locationButton)locationButton.addEventListener("click", this.saveSchoolLocation.bind(this));')
          text = text.replace('Number(school.radiusM || 10)', 'Number(school.radiusM || 100)')
          text = text.replace('version: "13.0.0"', 'version: "13.1.0"')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate
        run: |
          node --check assets/app.js
          grep -q '35°09' assets/app.js
          grep -q 'Number(school.radiusM || 100)' assets/app.js

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js
          git commit -m "Show fixed 100m school geofence in admin UI [skip ci]"
          git push
