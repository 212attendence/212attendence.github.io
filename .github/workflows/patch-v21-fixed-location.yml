name: Patch fixed school location UI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-v21-fixed-location.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch administrator location UI and login routes
        run: |
          node <<'NODE'
          const fs = require('fs');

          let app = fs.readFileSync('assets/app.js', 'utf8');
          const oldBlock = `<div class="student-school-config"><h3>해강중학교 위치 기준</h3><p>학교 안에서 현재 위치를 저장하면 학생 출석 허용 반경을 100m로 설정합니다.</p><button class="btn btn-soft btn-block" type="button" data-location>현재 위치를 학교 중심으로 저장</button></div>`;
          const newBlock = `<div class="student-school-config"><h3>해강중학교 위치 기준</h3><p>35°09'50.70&quot;N 129°08'08.69&quot;E를 중심으로 반경 100m가 고정 적용됩니다.</p></div>`;
          app = app.replace(oldBlock, newBlock);
          app = app.replace(
            'overlay.querySelector("[data-location]").addEventListener("click", this.saveSchoolLocation.bind(this));',
            'const locationButton=overlay.querySelector("[data-location]");if(locationButton)locationButton.addEventListener("click", this.saveSchoolLocation.bind(this));'
          );
          app = app.replace('Number(school.radiusM || 10)', 'Number(school.radiusM || 100)');
          app = app.replace('version: "13.0.0"', 'version: "13.1.0"');
          fs.writeFileSync('assets/app.js', app);

          let login = fs.readFileSync('admin/login/index.html', 'utf8');
          login = login.replace(
            'const ALLOWED_NEXT = ["/admin/dashboard/", "/admin/choose-login-method/", "/admin/setup-login-method/"];',
            'const ALLOWED_NEXT = ["/admin/dashboard/", "/admin/help/", "/admin/attendance-rate/", "/admin/choose-login-method/", "/admin/setup-login-method/", "/admin/delete-passkey/", "/admin/verify/", "/admin/home-icon-setting/", "/admin/no-student-added/"];'
          );
          login = login.replace('location.replace(".." + requested);', 'location.replace(requested);');
          fs.writeFileSync('admin/login/index.html', login);
          NODE

      - name: Validate
        run: |
          node --check assets/app.js
          grep -q '35°09' assets/app.js
          grep -q 'Number(school.radiusM || 100)' assets/app.js
          grep -q '"/admin/help/"' admin/login/index.html
          grep -q 'location.replace(requested)' admin/login/index.html

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js admin/login/index.html
          git commit -m "Finalize fixed geofence UI and canonical admin returns [skip ci]"
          git push
