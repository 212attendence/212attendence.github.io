name: Apply fixed school geofence

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-fixed-geofence.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hard-code school center and remove manual setup
        run: |
          node <<'NODE'
          const fs = require('fs');

          const SCHOOL_NAME = '해강중학교';
          const SCHOOL_LAT = '35.16408333333333';
          const SCHOOL_LNG = '129.13574722222222';
          const SCHOOL_RADIUS = '100';

          let gs = fs.readFileSync('apps-script/student-auth-addon.gs', 'utf8');

          if (!gs.includes('var STUDENT_SCHOOL_LAT')) {
            gs = gs.replace(
              "var STUDENT_APPROVAL_TOKEN_TTL_SEC = 10 * 60;",
              "var STUDENT_APPROVAL_TOKEN_TTL_SEC = 10 * 60;\n\n" +
              "// 고정 출석 기준: 35°09'50.70\\\"N 129°08'08.69\\\"E 중심 반경 100m\n" +
              "var STUDENT_SCHOOL_NAME = '" + SCHOOL_NAME + "';\n" +
              "var STUDENT_SCHOOL_LAT = " + SCHOOL_LAT + ";\n" +
              "var STUDENT_SCHOOL_LNG = " + SCHOOL_LNG + ";\n" +
              "var STUDENT_SCHOOL_RADIUS_M = " + SCHOOL_RADIUS + ";"
            );
          }

          gs = gs.replace(
            /  studentSetSetting_\('schoolName',[\s\S]*?  studentSetSetting_\('schoolLng',[^\n]*\);/,
            "  // 설정 시트에는 참고값만 기록하며 실제 판정은 아래 고정 상수를 사용합니다.\n" +
            "  studentSetSetting_('schoolName', STUDENT_SCHOOL_NAME);\n" +
            "  studentSetSetting_('schoolRadiusM', String(STUDENT_SCHOOL_RADIUS_M));\n" +
            "  studentSetSetting_('schoolLat', String(STUDENT_SCHOOL_LAT));\n" +
            "  studentSetSetting_('schoolLng', String(STUDENT_SCHOOL_LNG));"
          );

          gs = gs.replace(
            /function adminSaveSchoolLocationJsonp_\(e\) \{[\s\S]*?\n\}/,
            "function adminSaveSchoolLocationJsonp_(e) {\n" +
            "  setupStudentAuth_();\n" +
            "  studentRequireAdmin_(e);\n" +
            "  // 호환성을 위해 엔드포인트는 유지하지만 사용자 좌표는 받지 않습니다.\n" +
            "  return {\n" +
            "    ok: true,\n" +
            "    fixed: true,\n" +
            "    schoolName: STUDENT_SCHOOL_NAME,\n" +
            "    latitude: STUDENT_SCHOOL_LAT,\n" +
            "    longitude: STUDENT_SCHOOL_LNG,\n" +
            "    radiusM: STUDENT_SCHOOL_RADIUS_M,\n" +
            "    message: '학교 위치는 지정 좌표 중심 반경 100m로 자동 적용됩니다.'\n" +
            "  };\n" +
            "}"
          );

          gs = gs.replace(
            /function studentLocationConfig_\(\) \{[\s\S]*?\n\}/,
            "function studentLocationConfig_() {\n" +
            "  // 설정 시트 값과 무관하게 항상 지정 좌표와 반경을 사용합니다.\n" +
            "  return {\n" +
            "    schoolName: STUDENT_SCHOOL_NAME,\n" +
            "    lat: STUDENT_SCHOOL_LAT,\n" +
            "    lng: STUDENT_SCHOOL_LNG,\n" +
            "    radiusM: STUDENT_SCHOOL_RADIUS_M,\n" +
            "    configured: true,\n" +
            "    fixed: true\n" +
            "  };\n" +
            "}"
          );

          fs.writeFileSync('apps-script/student-auth-addon.gs', gs);

          let app = fs.readFileSync('assets/app.js', 'utf8');
          const oldLocationUi = '<div class="student-school-config"><h3>해강중학교 위치 기준</h3><p>학교 안에서 현재 위치를 저장하면 학생 출석 허용 반경을 100m로 설정합니다.</p><button class="btn btn-soft btn-block" type="button" data-location>현재 위치를 학교 중심으로 저장</button></div>';
          const fixedLocationUi = '<div class="student-school-config"><h3>해강중학교 출석 범위</h3><p><strong>35°09&#39;50.70&quot;N 129°08&#39;08.69&quot;E</strong>를 중심으로 반경 <strong>100m</strong>가 서버에서 자동 적용됩니다. 별도 위치 설정은 필요하지 않습니다.</p></div>';
          app = app.replace(oldLocationUi, fixedLocationUi);
          app = app.replace('      overlay.querySelector("[data-location]").addEventListener("click", this.saveSchoolLocation.bind(this));\n', '');

          const saveStart = app.indexOf('\n    saveSchoolLocation() {');
          const saveEnd = app.indexOf('\n  };\n\n  function formatRequestTime', saveStart);
          if (saveStart >= 0 && saveEnd > saveStart) {
            app = app.slice(0, saveStart) + '\n  };' + app.slice(saveEnd + 5);
          }
          app = app.replace('Number(school.radiusM || 10)', 'Number(school.radiusM || 100)');
          fs.writeFileSync('assets/app.js', app);

          let readme = fs.readFileSync('README.md', 'utf8');
          readme = readme.replace(
            '`setupStudentAuth_()`가 호출될 때 위 기준점과 반경을 설정 시트에 반영합니다.',
            '위 기준점과 반경은 Apps Script의 고정 상수로 자동 적용됩니다. 설정 시트 값이나 관리자 기기의 현재 위치로 변경되지 않습니다.'
          );
          fs.writeFileSync('README.md', readme);

          let setup = fs.readFileSync('STUDENT_LOGIN_SETUP.md', 'utf8');
          setup = setup.replace(
            '`setupStudentAuth_()`가 실행되거나 학생 관련 API가 호출되면 설정 시트의 학교 위치와 반경이 위 값으로 반영됩니다.',
            '학생 관련 API는 항상 위 고정 좌표와 반경을 사용합니다. 관리자가 학교 중심점을 직접 저장하거나 설정 시트의 좌표를 관리할 필요가 없습니다.'
          );
          fs.writeFileSync('STUDENT_LOGIN_SETUP.md', setup);

          let help = fs.readFileSync('admin/help/index.html', 'utf8');
          help = help.replace(
            '학교 기준점은 <strong>35°09\'50.70&quot;N 129°08\'08.69&quot;E</strong>, 허용 반경은 <strong>100m</strong>로 고정 적용됩니다.',
            '학교 기준점은 <strong>35°09\'50.70&quot;N 129°08\'08.69&quot;E</strong>, 허용 반경은 <strong>100m</strong>로 서버에서 자동 적용됩니다. 관리자가 별도로 위치를 설정할 필요가 없습니다.'
          );
          fs.writeFileSync('admin/help/index.html', help);
          NODE

      - name: Validate scripts
        run: |
          node --check assets/app.js
          cp apps-script/student-auth-addon.gs /tmp/student-auth-addon.js
          node --check /tmp/student-auth-addon.js

      - name: Commit fixed geofence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.js apps-script/student-auth-addon.gs README.md STUDENT_LOGIN_SETUP.md admin/help/index.html
          if git diff --cached --quiet; then
            echo "No changes required."
            exit 0
          fi
          git commit -m "Fix school geofence to supplied coordinates and 100m"
          git push
