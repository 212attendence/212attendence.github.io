name: Route administrator settings
on:
  push:
    paths:
      - 'scripts/route-admin-settings.py'
      - '.github/workflows/route-admin-settings.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/route-admin-settings.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/route-admin-settings.yml scripts/route-admin-settings.py
          git add -A
          git commit -m "Route settings button to administrator settings page" || exit 0
          git push
