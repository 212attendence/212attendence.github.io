name: Apply design polish v13

on:
  push:
    branches: [main]
    paths: [".github/workflows/design-polish-v13.yml"]

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add visual polish
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          shared = Path('assets/app.css')
          text = shared.read_text(encoding='utf-8')
          block = r'''
/* DESIGN_POLISH_V13_START */
:root {
  --decor-green: rgba(55, 132, 87, 0.13);
  --decor-blue: rgba(61, 105, 154, 0.10);
  --decor-gold: rgba(177, 122, 43, 0.09);
  --card-highlight: rgba(255, 255, 255, 0.72);
}
html[data-theme="dark"] {
  --decor-green: rgba(91, 184, 128, 0.12);
  --decor-blue: rgba(105, 157, 211, 0.10);
  --decor-gold: rgba(218, 160, 78, 0.09);
  --card-highlight: rgba(255, 255, 255, 0.07);
}
body {
  position: relative;
  overflow-x: hidden;
  background:
    radial-gradient(circle at 8% 5%, var(--decor-green), transparent 30rem),
    radial-gradient(circle at 94% 14%, var(--decor-blue), transparent 28rem),
    radial-gradient(circle at 54% 105%, var(--decor-gold), transparent 34rem),
    var(--bg);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  opacity: 0.34;
  background-image: radial-gradient(circle, color-mix(in srgb, var(--text) 13%, transparent) 0.7px, transparent 0.8px);
  background-size: 26px 26px;
  mask-image: linear-gradient(to bottom, black, transparent 76%);
}
.auth-page::after {
  content: "";
  position: fixed;
  width: 220px;
  height: 220px;
  right: -80px;
  bottom: -95px;
  z-index: -1;
  border: 1px solid color-mix(in srgb, var(--accent) 14%, transparent);
  border-radius: 44% 56% 58% 42%;
  transform: rotate(18deg);
  pointer-events: none;
}
.auth-card {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(36, 40, 33, 0.11), inset 0 1px 0 var(--card-highlight);
}
html[data-theme="dark"] .auth-card {
  box-shadow: 0 28px 84px rgba(0, 0, 0, 0.42), inset 0 1px 0 var(--card-highlight);
}
.auth-card::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 4px;
  background: linear-gradient(90deg, var(--success), var(--info), var(--warning));
}
.auth-card::after {
  content: "";
  position: absolute;
  width: 150px;
  height: 150px;
  top: -88px;
  right: -70px;
  z-index: -1;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in srgb, var(--info) 18%, transparent), transparent 70%);
}
.brand-chip::before {
  content: "";
  width: 7px;
  height: 7px;
  margin-right: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--success) 13%, transparent);
}
.btn {
  box-shadow: 0 1px 0 color-mix(in srgb, white 42%, transparent);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 82%, var(--info)));
  box-shadow: 0 10px 24px color-mix(in srgb, var(--accent) 18%, transparent);
}
.btn-soft:hover,
.input-action:hover {
  border-color: color-mix(in srgb, var(--accent) 28%, var(--line));
  background: color-mix(in srgb, var(--surface-soft) 78%, var(--surface-strong));
}
@media (hover:hover) and (pointer:fine) {
  .btn:hover { transform: translateY(-1px); }
  .auth-card { transition: transform .28s ease, box-shadow .28s ease; }
  .auth-card:hover { transform: translateY(-2px); }
}
.status-box {
  position: relative;
  overflow: hidden;
}
.status-box::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 3px;
  background: currentColor;
  opacity: .55;
}
.setting-card,
.info-row,
details {
  box-shadow: inset 0 1px 0 var(--card-highlight);
}
.modal-backdrop,
.loading-overlay {
  backdrop-filter: blur(8px) saturate(115%);
}
/* DESIGN_POLISH_V13_END */
'''
          pattern = re.compile(r'/\* DESIGN_POLISH_V13_START \*/.*?/\* DESIGN_POLISH_V13_END \*/\n?', re.S)
          text = pattern.sub('', text).rstrip() + '\n\n' + block.strip() + '\n'
          shared.write_text(text, encoding='utf-8')

          dashboard = Path('dashboard/index.html')
          html = dashboard.read_text(encoding='utf-8')
          dash_block = r'''
    /* DASHBOARD_POLISH_V13_START */
    body{position:relative;overflow-x:hidden;background:radial-gradient(circle at 7% 2%,rgba(47,143,91,.12),transparent 28rem),radial-gradient(circle at 94% 10%,rgba(72,112,162,.10),transparent 26rem),var(--bg)}
    body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.28;background-image:radial-gradient(circle,rgba(92,92,84,.22) .65px,transparent .75px);background-size:27px 27px;mask-image:linear-gradient(to bottom,#000,transparent 78%)}
    .topbar-inner{padding:12px 14px;border:1px solid var(--line);border-radius:22px;background:color-mix(in srgb,var(--card) 82%,transparent);box-shadow:0 12px 34px rgba(31,35,32,.06);backdrop-filter:blur(18px) saturate(120%)}
    h1{display:flex;align-items:center;gap:8px}h1::after{content:"LIVE";padding:4px 7px;border-radius:999px;background:rgba(47,143,91,.14);color:var(--green);font-size:9px;letter-spacing:.08em;font-weight:950}
    .summary-card,.panel,.device-card{position:relative;overflow:hidden;box-shadow:0 18px 55px rgba(31,35,32,.08),inset 0 1px 0 rgba(255,255,255,.55);transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease}
    html[data-theme="dark"] .summary-card,html[data-theme="dark"] .panel,html[data-theme="dark"] .device-card{box-shadow:0 22px 60px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.06)}
    .summary-card::before{content:"";position:absolute;inset:0 0 auto;height:4px;background:var(--accent)}
    .summary-card:nth-child(2)::before{background:var(--green)}.summary-card:nth-child(3)::before{background:var(--orange)}.summary-card:nth-child(4)::before{background:var(--red)}.summary-card:nth-child(5)::before{background:var(--muted)}
    .summary-card::after{content:"";position:absolute;width:88px;height:88px;right:-42px;bottom:-52px;border-radius:50%;background:currentColor;opacity:.035}
    .summary-value{letter-spacing:-.055em}.panel-head{background:linear-gradient(135deg,rgba(92,92,84,.055),transparent)}
    .log-row:not(.log-header){transition:background .18s ease}.log-row:not(.log-header):hover{background:rgba(92,92,84,.055)}
    .info-item{transition:transform .18s ease,border-color .18s ease,background .18s ease}.info-item:hover{transform:translateX(2px);border-color:color-mix(in srgb,var(--accent) 28%,var(--line))}
    .btn{transition:transform .16s ease,box-shadow .2s ease,border-color .2s ease}.btn-soft:hover{border-color:color-mix(in srgb,var(--accent) 28%,var(--line));box-shadow:0 8px 20px rgba(31,35,32,.07)}
    .theme-switch{box-shadow:inset 0 1px 2px rgba(31,35,32,.08)}
    @media(hover:hover) and (pointer:fine){.summary-card:hover,.panel:hover,.device-card:hover{transform:translateY(-2px);box-shadow:0 24px 66px rgba(31,35,32,.11),inset 0 1px 0 rgba(255,255,255,.62)}}
    @media(max-width:860px){.topbar-inner{padding:12px}.summary-card:hover,.panel:hover,.device-card:hover{transform:none}}
    /* DASHBOARD_POLISH_V13_END */
'''
          html = re.sub(r'\s*/\* DASHBOARD_POLISH_V13_START \*/.*?/\* DASHBOARD_POLISH_V13_END \*/', '', html, flags=re.S)
          html = html.replace('</style>', dash_block + '\n  </style>', 1)
          dashboard.write_text(html, encoding='utf-8')

          for path in list(Path('.').rglob('*.html')) + [Path('manifest.json')]:
              value = path.read_text(encoding='utf-8')
              value = re.sub(r'\?v=\d+', '?v=13', value)
              path.write_text(value, encoding='utf-8')

          Path('.github/workflows/design-polish-v13.yml').unlink()
          PY

      - name: Commit visual refresh
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add layered visual polish and dashboard accents"
          git push
