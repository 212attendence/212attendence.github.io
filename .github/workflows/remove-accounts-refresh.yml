name: Remove student accounts refresh button
on:
  push:
    paths:
      - 'scripts/remove-accounts-refresh.py'
      - '.github/workflows/remove-accounts-refresh.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/remove-accounts-refresh.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/remove-accounts-refresh.yml scripts/remove-accounts-refresh.py
          git add -A
          git commit -m "Remove refresh button from student account management" || exit 0
          git push
