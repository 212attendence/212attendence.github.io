name: Apply instant internal return

on:
  push:
    paths:
      - tools/apply-instant-internal-return.py
      - .github/workflows/apply-instant-internal-return.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch
        run: python tools/apply-instant-internal-return.py
      - name: Commit result and remove one-time patch files
        run: |
          rm -f tools/apply-instant-internal-return.py
          rm -f .github/workflows/apply-instant-internal-return.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Make internal page returns instant"
          git push
