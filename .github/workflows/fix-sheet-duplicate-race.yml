name: Fix sheet duplicate race

on:
  push:
    paths:
      - '.github/workflows/fix-sheet-duplicate-race.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch Apps Script sheet creation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps-script/student-auth-addon.gs')
          text = path.read_text(encoding='utf-8')

          old_setting = '''function studentSetSetting_(key, value) {
            var ss = SpreadsheetApp.getActiveSpreadsheet();
            var sheet = ss.getSheetByName('설정') || ss.insertSheet('설정');
            var values = sheet.getLastRow() ? sheet.getRange(1, 1, sheet.getLastRow(), Math.max(2, sheet.getLastColumn())).getValues() : [];
            for (var i = 0; i < values.length; i++) {
              if (String(values[i][0] || '').trim() === key) {
                sheet.getRange(i + 1, 2).setValue(value);
                return;
              }
            }
            sheet.appendRow([key, value]);
          }
          '''

          new_setting = '''function studentNormalizeSheetName_(value) {
            return String(value || '').replace(/\\s+/g, '').trim().toLowerCase();
          }

          function studentFindSheet_(ss, name) {
            var direct = ss.getSheetByName(name);
            if (direct) return direct;
            var target = studentNormalizeSheetName_(name);
            var sheets = ss.getSheets();
            for (var i = 0; i < sheets.length; i++) {
              if (studentNormalizeSheetName_(sheets[i].getName()) === target) return sheets[i];
            }
            return null;
          }

          function studentSetSetting_(key, value) {
            var ss = SpreadsheetApp.getActiveSpreadsheet();
            var lock = LockService.getScriptLock();
            lock.waitLock(20000);
            try {
              var sheet = studentFindSheet_(ss, '설정');
              if (!sheet) {
                try {
                  sheet = ss.insertSheet('설정');
                } catch (error) {
                  sheet = studentFindSheet_(ss, '설정');
                  if (!sheet) throw error;
                }
              }
              var values = sheet.getLastRow() ? sheet.getRange(1, 1, sheet.getLastRow(), Math.max(2, sheet.getLastColumn())).getValues() : [];
              for (var i = 0; i < values.length; i++) {
                if (String(values[i][0] || '').trim() === key) {
                  sheet.getRange(i + 1, 2).setValue(value);
                  return;
                }
              }
              sheet.appendRow([key, value]);
            } finally {
              lock.releaseLock();
            }
          }
          '''

          old_sheet = '''function studentEnsureSheet_(ss, name, headers) {
            var sheet = ss.getSheetByName(name) || ss.insertSheet(name);
            if (sheet.getLastRow() === 0) sheet.getRange(1, 1, 1, headers.length).setValues([headers]);
            return sheet;
          }
          '''

          new_sheet = '''function studentEnsureSheet_(ss, name, headers) {
            var lock = LockService.getScriptLock();
            lock.waitLock(20000);
            try {
              var sheet = studentFindSheet_(ss, name);
              if (!sheet) {
                try {
                  sheet = ss.insertSheet(name);
                } catch (error) {
                  sheet = studentFindSheet_(ss, name);
                  if (!sheet) throw error;
                }
              }
              if (sheet.getLastRow() === 0) sheet.getRange(1, 1, 1, headers.length).setValues([headers]);
              return sheet;
            } finally {
              lock.releaseLock();
            }
          }
          '''

          if old_setting not in text:
            raise SystemExit('studentSetSetting_ block not found')
          if old_sheet not in text:
            raise SystemExit('studentEnsureSheet_ block not found')

          text = text.replace(old_setting, new_setting, 1)
          text = text.replace(old_sheet, new_sheet, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-sheet-duplicate-race.yml
          git add apps-script/student-auth-addon.gs
          git commit -m "Prevent duplicate Apps Script sheet creation"
          git push
