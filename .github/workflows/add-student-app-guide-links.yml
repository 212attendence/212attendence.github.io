name: Add student app guide links
on:
  push:
    paths:
      - 'scripts/add-student-app-guide-links.py'
      - '.github/workflows/add-student-app-guide-links.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/add-student-app-guide-links.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-student-app-guide-links.yml scripts/add-student-app-guide-links.py
          git add -A
          git commit -m "Add student app guide and help navigation" || exit 0
          git push
