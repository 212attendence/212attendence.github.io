name: Apply site font stack

on:
  push:
    paths:
      - ".github/workflows/font-fix.yml"

permissions:
  contents: write

jobs:
  apply-fonts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply Google Sans and Pretendard fallback
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          stack = '"Google Sans", "Google Sans Text", "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif'
          pretendard_link = '<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />'

          changed = []
          for path in Path('.').rglob('*.html'):
              text = path.read_text(encoding='utf-8')
              original = text

              text = re.sub(
                  r'font-family\s*:\s*[^;{}]*(?:Pretendard|Apple SD Gothic Neo|-apple-system|BlinkMacSystemFont)[^;{}]*',
                  'font-family:' + stack,
                  text,
                  flags=re.I,
              )

              if 'orioncactus/pretendard' not in text and '</head>' in text:
                  text = text.replace('</head>', '  ' + pretendard_link + '\n</head>', 1)

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:')
          print('\n'.join(changed) if changed else '(none)')
          PY

      - name: Commit font changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No font changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html' '**/*.html'
          git commit -m "Use Google Sans with Pretendard fallback"
          git push
