name: Apply v19 cache references

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-v19.yml

permissions:
  contents: write

jobs:
  update-cache-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check JavaScript syntax
        run: |
          node --check assets/app.js
          node --check assets/student.js
          cp apps-script/student-auth-addon.gs /tmp/student-auth-addon.js
          node --check /tmp/student-auth-addon.js

      - name: Update static asset versions
        run: |
          find . -type f \( -name '*.html' -o -name '*.json' -o -name '*.js' \) \
            -not -path './.git/*' \
            -not -path './.github/workflows/*' \
            -print0 | xargs -0 sed -i -E 's/\?v=(12|15|16|17|18)/?v=19/g'

      - name: Record validation
        run: |
          mkdir -p validation
          printf 'student-auth-v1 validated\nsource-commit=%s\n' "$GITHUB_SHA" > validation/student-feature.ok

      - name: Commit validation and cache references
        run: |
          if git diff --quiet; then
            echo "No files needed updating."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Validate student login and GPS feature [skip ci]"
          git push
