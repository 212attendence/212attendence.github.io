name: Sort today attendance logs
on:
  push:
    paths:
      - 'scripts/sort-today-attendance-logs.py'
      - '.github/workflows/sort-today-attendance-logs.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/sort-today-attendance-logs.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/sort-today-attendance-logs.yml scripts/sort-today-attendance-logs.py
          git add -A
          git commit -m "Order today logs as normal late and absent" || exit 0
          git push
