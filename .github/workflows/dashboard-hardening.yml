name: Apply dashboard session hardening

on:
  push:
    branches:
      - autonomous-v12-hardening
    paths:
      - .github/workflows/dashboard-hardening.yml

permissions:
  contents: write

jobs:
  patch-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch dashboard safely
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('dashboard/index.html')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  '<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />\n  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>',
                  '<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />\n  <script src="../assets/app.js?v=12" defer></script>\n  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>'
              ),
              (
                  'document.addEventListener("DOMContentLoaded",function(){\n      localStorage.removeItem("attendancePersistentAuth");\n      if(!hasSession()){location.replace("../login/");return}',
                  'document.addEventListener("DOMContentLoaded",function(){\n      AttendanceApp.Theme.init();\n      AttendanceApp.Session.restore();\n      if(!hasSession()){location.replace("../login/?next=/dashboard/");return}'
              ),
              (
                  'function hasSession(){return!!(sessionStorage.getItem("sessionToken")||sessionStorage.getItem("adminId"))}',
                  'function hasSession(){return!!AttendanceApp.Session.restore()}'
              ),
              (
                  'function addAuthParams(p){const t=sessionStorage.getItem("sessionToken")||"";if(t)p.set("sessionToken",t);else{p.set("adminId",sessionStorage.getItem("adminId")||"");p.set("adminPw",sessionStorage.getItem("adminPw")||"")}}',
                  'function addAuthParams(p){AttendanceApp.Session.addAuthParams(p)}'
              ),
              (
                  'function logout(){sessionStorage.clear();disconnectMqtt();location.replace("../login/")}',
                  'function logout(){AttendanceApp.Session.clear();disconnectMqtt();location.replace("../login/")}'
              ),
              (
                  'document.getElementById("setMqttPass").value=appSettings.mqttPass||""',
                  'document.getElementById("setMqttPass").value=""'
              ),
              (
                  'mqttPass: document.getElementById("setMqttPass").value.trim(),',
                  'mqttPass: document.getElementById("setMqttPass").value.trim() || appSettings.mqttPass,'
              ),
              (
                  '<div class="modal-body">\n        <div class="section-title">로그인 방법</div>',
                  '<div class="modal-body">\n        <div class="section-title">세션</div>\n        <div class="passkey-card"><p>로그인 세션은 이 기기에서 최대 14일간 유지됩니다. 로그아웃하면 저장된 세션 토큰을 즉시 삭제합니다.</p></div>\n\n        <div class="section-title">로그인 방법</div>'
              )
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit('Expected dashboard pattern not found: ' + old[:100])
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate JavaScript and remove migration workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('dashboard/index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s+[^>]*)?>(.*?)</script>', text, flags=re.S)
          for index, script in enumerate(scripts):
              if script.strip():
                  Path(f'/tmp/dashboard-inline-{index}.js').write_text(script, encoding='utf-8')
          PY
          for file in /tmp/dashboard-inline-*.js; do
            [ -e "$file" ] && node --check "$file"
          done
          rm -f .github/workflows/dashboard-hardening.yml

      - name: Commit dashboard hardening
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/index.html .github/workflows/dashboard-hardening.yml
          git commit -m "Harden dashboard session and secret handling"
          git push
