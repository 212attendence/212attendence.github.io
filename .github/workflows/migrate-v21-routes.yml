name: Migrate v21 canonical routes

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/migrate-v21-routes.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build canonical student and administrator routes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json, re

          root = Path('.')
          version = '21'

          routes = {
              '/student-login/': '/student/login/',
              '/student-attendance/': '/student/identity/',
              '/student-help/': '/student/help/',
              '/error-gps/': '/student/error/gps/',
              '/login/': '/admin/login/',
              '/dashboard/': '/admin/dashboard/',
              '/admin-help/': '/admin/help/',
              '/attendance-rate/': '/admin/attendance-rate/',
              '/choose-login-method/': '/admin/choose-login-method/',
              '/setup-login-method/': '/admin/setup-login-method/',
              '/delete-passkey/': '/admin/delete-passkey/',
              '/verify-admin/': '/admin/verify/',
              '/home-icon-setting/': '/admin/home-icon-setting/',
              '/no-student-added/': '/admin/no-student-added/'
          }

          copies = {
              'student-login/index.html': 'student/login/index.html',
              'student-attendance/index.html': 'student/identity/index.html',
              'student-help/index.html': 'student/help/index.html',
              'error-gps/index.html': 'student/error/gps/index.html',
              'login/index.html': 'admin/login/index.html',
              'dashboard/index.html': 'admin/dashboard/index.html',
              'admin-help/index.html': 'admin/help/index.html',
              'attendance-rate/index.html': 'admin/attendance-rate/index.html',
              'choose-login-method/index.html': 'admin/choose-login-method/index.html',
              'setup-login-method/index.html': 'admin/setup-login-method/index.html',
              'delete-passkey/index.html': 'admin/delete-passkey/index.html',
              'verify-admin/index.html': 'admin/verify/index.html',
              'home-icon-setting/index.html': 'admin/home-icon-setting/index.html',
              'no-student-added/index.html': 'admin/no-student-added/index.html'
          }

          def route_rewrite(text, audience):
              tokens = []
              items = sorted(routes.items(), key=lambda item: len(item[0]), reverse=True)
              for index, (old, new) in enumerate(items):
                  token = f'__ROUTE_V21_{index}__'
                  rel = old.lstrip('/')
                  patterns = ['../' + rel, './' + rel, old]
                  for pattern in patterns:
                      text = text.replace(pattern, token)
                  tokens.append((token, new))

              if audience == 'student':
                  for pattern in ('../?-student', '/?-student', './?-student'):
                      text = text.replace(pattern, '__STUDENT_HELP_V21__')
                  text = text.replace('__STUDENT_HELP_V21__', '/student/help/')
              else:
                  for pattern in ('../?help=1', '/?help=1', './?help=1'):
                      text = text.replace(pattern, '__ADMIN_HELP_V21__')
                  text = text.replace('__ADMIN_HELP_V21__', '/admin/help/')

              for token, new in tokens:
                  text = text.replace(token, new)
              return text

          for source, destination in copies.items():
              src = root / source
              if not src.exists():
                  raise SystemExit(f'Missing source: {source}')
              text = src.read_text(encoding='utf-8')
              source_dir = '/' + str(Path(source).parent).replace('\\', '/') + '/'
              if '<base ' not in text:
                  text = text.replace('<head>', '<head>\n  <base href="' + source_dir + '">', 1)
              audience = 'student' if destination.startswith('student/') else 'admin'
              text = route_rewrite(text, audience)
              text = re.sub(r'\?v=(?:12|15|16|17|18|19|20)', '?v=' + version, text)
              text = text.replace('반경 10m', '반경 100m').replace('허용 반경 10m', '허용 반경 100m')
              dst = root / destination
              dst.parent.mkdir(parents=True, exist_ok=True)
              dst.write_text(text, encoding='utf-8')

          index_html = '''<!DOCTYPE html>
          <html lang="ko" data-theme="light">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
            <title>2-12 출석 시스템</title>
            <link rel="manifest" href="./manifest.json?v=21">
            <link rel="icon" href="./favicon.png?v=21">
            <link rel="apple-touch-icon" href="./favicon.png?v=21">
            <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)">
            <meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin>
            <link rel="stylesheet" href="./assets/app.css?v=21">
            <script src="./assets/app.js?v=21" defer></script>
            <style>
              :root{--admin:#3d443e;--admin-soft:rgba(61,68,62,.1);--student:#315f84;--student-soft:rgba(49,95,132,.12)}
              html[data-theme="dark"]{--admin:#d8d3c5;--admin-soft:rgba(216,211,197,.1);--student:#8ab6d8;--student-soft:rgba(138,182,216,.12)}
              body::before,body::after{content:"";position:fixed;z-index:-1;width:34rem;height:34rem;border-radius:50%;filter:blur(78px);pointer-events:none}
              body::before{left:-15rem;top:-14rem;background:var(--student-soft)}body::after{right:-15rem;bottom:-16rem;background:var(--admin-soft)}
              .role-card{width:min(680px,100%)}.role-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:20px}
              .role-option{position:relative;overflow:hidden;display:flex;min-height:210px;flex-direction:column;justify-content:space-between;padding:21px;border:1px solid var(--line);border-radius:25px;background:linear-gradient(145deg,var(--surface),var(--surface-soft));color:var(--text);text-decoration:none;box-shadow:var(--shadow-soft);transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}
              .role-option::after{content:"";position:absolute;width:145px;height:145px;right:-76px;top:-76px;border-radius:50%;background:currentColor;opacity:.055}
              .role-option.student{color:var(--student)}.role-option.admin{color:var(--admin)}.role-icon{display:grid;place-items:center;width:50px;height:50px;border-radius:17px;background:currentColor;color:var(--surface-strong);font-size:20px;font-weight:900}
              .role-copy{color:var(--text)}.role-copy strong{display:block;font-size:22px;letter-spacing:-.04em}.role-copy span{display:block;margin-top:7px;color:var(--muted);font-size:12px;line-height:1.55;font-weight:650}.role-arrow{align-self:flex-end;color:currentColor;font-size:26px}
              .help-links{display:flex;justify-content:center;margin-top:18px}.help-links a{color:var(--muted);font-size:12px;font-weight:800;text-decoration:none}
              @media(hover:hover) and (pointer:fine){.role-option:hover{transform:translateY(-3px);border-color:color-mix(in srgb,currentColor 32%,var(--line));box-shadow:var(--shadow)}}
              @media(max-width:620px){.role-grid{grid-template-columns:1fr}.role-option{min-height:176px}}
            </style>
          </head>
          <body class="auth-page">
            <main class="auth-card role-card">
              <div class="brand-chip">2-12 출석 시스템</div>
              <h1>이동할 페이지를 선택하세요</h1>
              <p class="subtext">학생 출석 인증과 관리자 대시보드는 분리된 주소를 사용합니다.</p>
              <div class="role-grid">
                <a class="role-option student" href="./student/login/"><div class="role-icon">S</div><div class="role-copy"><strong>학생 페이지로 이동</strong><span>학생 로그인 후 해강중학교 기준 반경 100m 안에서 위치 출석을 인증합니다.</span></div><div class="role-arrow">›</div></a>
                <a class="role-option admin" href="./admin/login/"><div class="role-icon">A</div><div class="role-copy"><strong>관리자 페이지로 이동</strong><span>관리자 로그인, 출석 대시보드와 학생 로그인 승인 요청을 관리합니다.</span></div><div class="role-arrow">›</div></a>
              </div>
              <div class="help-links"><a href="./student/help/">학생 도움말</a></div>
            </main>
            <script>
              document.addEventListener('DOMContentLoaded',function(){
                AttendanceApp.Theme.init();
                const params=new URLSearchParams(location.search),raw=location.search.replace(/^\\?/, '');
                if(raw==='-student'||params.has('-student')){location.replace('./student/help/'+location.hash);return}
                if(params.get('help')==='1'){location.replace('./admin/help/'+location.hash)}
              });
            </script>
          </body>
          </html>'''
          root.joinpath('index.html').write_text(re.sub(r'^          ', '', index_html, flags=re.M), encoding='utf-8')

          manifest = {
              'id': './',
              'name': '2-12 출석 시스템',
              'short_name': '2-12 출석',
              'description': '학생 위치 출석 및 관리자 대시보드',
              'lang': 'ko-KR',
              'start_url': './?v=21',
              'scope': './',
              'display': 'standalone',
              'display_override': ['window-controls-overlay', 'standalone', 'minimal-ui'],
              'background_color': '#f7f7f4',
              'theme_color': '#f7f7f4',
              'orientation': 'any',
              'categories': ['education', 'productivity', 'utilities'],
              'icons': [
                  {'src':'./favicon.png?v=21','sizes':'300x300','type':'image/png','purpose':'any'},
                  {'src':'./favicon.png?v=21','sizes':'300x300','type':'image/png','purpose':'maskable'}
              ],
              'shortcuts': [
                  {'name':'학생 로그인','short_name':'학생','url':'./student/login/','icons':[{'src':'./favicon.png?v=21','sizes':'300x300','type':'image/png'}]},
                  {'name':'관리자 대시보드','short_name':'관리자','url':'./admin/login/?v=21&next=/admin/dashboard/','icons':[{'src':'./favicon.png?v=21','sizes':'300x300','type':'image/png'}]},
                  {'name':'학생 도움말','short_name':'학생 도움말','url':'./student/help/','icons':[{'src':'./favicon.png?v=21','sizes':'300x300','type':'image/png'}]}
              ]
          }
          root.joinpath('manifest.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          redirect_map = {
              'student-login/index.html': '/student/login/',
              'student-attendance/index.html': '/student/identity/',
              'student-help/index.html': '/student/help/',
              'error-gps/index.html': '/student/error/gps/',
              'login/index.html': '/admin/login/',
              'dashboard/index.html': '/admin/dashboard/',
              'admin-help/index.html': '/admin/help/',
              'attendance-rate/index.html': '/admin/attendance-rate/',
              'choose-login-method/index.html': '/admin/choose-login-method/',
              'setup-login-method/index.html': '/admin/setup-login-method/',
              'delete-passkey/index.html': '/admin/delete-passkey/',
              'verify-admin/index.html': '/admin/verify/',
              'home-icon-setting/index.html': '/admin/home-icon-setting/',
              'no-student-added/index.html': '/admin/no-student-added/'
          }
          for path, target in redirect_map.items():
              title = '페이지 이동 중'
              redirect = f'''<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>{title}</title><link rel="canonical" href="{target}"><meta http-equiv="refresh" content="0;url={target}"><script>location.replace({json.dumps(target)});</script></head><body><a href="{target}">새 주소로 이동</a></body></html>'''
              root.joinpath(path).write_text(redirect, encoding='utf-8')

          student_js = root.joinpath('assets/student.js').read_text(encoding='utf-8')
          student_js = student_js.replace('location.replace("../error-gps/?reason="', 'location.replace("/student/error/gps/?reason="')
          student_js = re.sub(r'\?v=(?:12|15|16|17|18|19|20)', '?v=21', student_js)
          root.joinpath('assets/student.js').write_text(student_js, encoding='utf-8')

          app_js = root.joinpath('assets/app.js').read_text(encoding='utf-8')
          app_js = app_js.replace('https://212attendence.github.io/dashboard/?student-requests=1', 'https://212attendence.github.io/admin/dashboard/?student-requests=1')
          app_js = app_js.replace('허용 반경을 10m로 설정합니다.', '허용 반경을 100m로 설정합니다.')
          app_js = app_js.replace('radiusM: "10"', 'radiusM: "100"')
          app_js = app_js.replace('반경 10m를 저장했습니다.', '반경 100m를 저장했습니다.')
          root.joinpath('assets/app.js').write_text(app_js, encoding='utf-8')

          sw = root.joinpath('firebase-messaging-sw.js').read_text(encoding='utf-8')
          sw = sw.replace('./dashboard/?resume=1', './admin/dashboard/?resume=1')
          sw = re.sub(r'\?v=(?:12|15|16|17|18|19|20)', '?v=21', sw)
          root.joinpath('firebase-messaging-sw.js').write_text(sw, encoding='utf-8')

          addon = root.joinpath('apps-script/student-auth-addon.gs').read_text(encoding='utf-8')
          addon = addon.replace("studentEnsureSetting_('schoolRadiusM', '10');", "studentEnsureSetting_('schoolRadiusM', '100');")
          addon = addon.replace("studentEnsureSetting_('schoolLat', '');", "studentEnsureSetting_('schoolLat', '35.16408333333333');")
          addon = addon.replace("studentEnsureSetting_('schoolLng', '');", "studentEnsureSetting_('schoolLng', '129.13574722222222');")
          addon = addon.replace("Number(p.radiusM || 10)", "Number(p.radiusM || 100)")
          addon = addon.replace("studentGetSetting_('schoolRadiusM', '10')", "studentGetSetting_('schoolRadiusM', '100')")
          addon = addon.replace("radiusM || 10", "radiusM || 100")
          addon = addon.replace('https://212attendence.github.io/dashboard/?student-requests=1', 'https://212attendence.github.io/admin/dashboard/?student-requests=1')
          root.joinpath('apps-script/student-auth-addon.gs').write_text(addon, encoding='utf-8')

          for doc in ('README.md', 'STUDENT_LOGIN_SETUP.md'):
              path = root / doc
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              for old, new in routes.items():
                  text = text.replace('`' + old + '`', '`' + new + '`').replace(old, new)
              text = text.replace('반경 10m', '반경 100m')
              if '35.16408333333333' not in text:
                  text += '\n\n학교 위치 기준점: `35.16408333333333, 129.13574722222222`  \n허용 반경: `100m`\n'
              path.write_text(text, encoding='utf-8')

          for html in root.rglob('*.html'):
              text = html.read_text(encoding='utf-8')
              text = re.sub(r'\?v=(?:12|15|16|17|18|19|20)', '?v=21', text)
              html.write_text(text, encoding='utf-8')
          PY

      - name: Validate generated files
        run: |
          node --check assets/app.js
          node --check assets/student.js
          cp apps-script/student-auth-addon.gs /tmp/student-auth-addon.js
          node --check /tmp/student-auth-addon.js
          python3 -m json.tool manifest.json >/dev/null
          test -f student/login/index.html
          test -f student/identity/index.html
          test -f admin/login/index.html
          test -f admin/dashboard/index.html
          grep -q '35.16408333333333' apps-script/student-auth-addon.gs
          grep -q "schoolRadiusM', '100'" apps-script/student-auth-addon.gs

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Migrate to student and admin route namespaces [skip ci]"
          git push
