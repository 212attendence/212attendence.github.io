<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>출석 대시보드</title>
  <link rel="manifest" href="../manifest.json?v=9" />
  <link rel="icon" type="image/png" href="../favicon.png?v=9" />
  <link rel="apple-touch-icon" href="../favicon.png?v=9" />
  <meta name="theme-color" content="#fafaf8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="2-12 출석" />
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root {
      color-scheme:light;
      --bg:#fafaf8; --soft:#f1f0ec; --card:rgba(255,255,252,.95); --solid:#fffefb;
      --text:#1f2320; --muted:#74746e; --line:rgba(92,92,84,.18); --accent:#3f403a;
      --accent-text:#fff; --green:#2f8f5b; --orange:#b86a2b; --red:#b7423a;
      --shadow:0 18px 50px rgba(31,35,32,.07); --overlay:rgba(31,35,32,.5); --input:#fffefb;
    }
    html[data-theme="dark"] {
      color-scheme:dark;
      --bg:#1a1a1a; --soft:#242424; --card:rgba(38,38,38,.92); --solid:#242424;
      --text:#f2f0ea; --muted:#aaa69e; --line:rgba(230,226,215,.14); --accent:#d8d3c5;
      --accent-text:#1a1a1a; --green:#78c59a; --orange:#d79a62; --red:#e07b73;
      --shadow:0 22px 60px rgba(0,0,0,.32); --overlay:rgba(0,0,0,.58); --input:#202020;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:"Google Sans", "Google Sans Text", "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif}
    button,input{font:inherit} button{border:0;cursor:pointer} button:disabled,input:disabled{opacity:.55;cursor:not-allowed}
    .app{width:min(1120px,100%);margin:auto;padding:22px}
    .topbar{position:sticky;top:0;z-index:20;padding:14px 0;background:linear-gradient(to bottom,var(--bg),transparent);backdrop-filter:blur(8px)}
    .topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1{margin:0;font-size:24px;line-height:1.1;letter-spacing:-.05em;font-weight:950}
    .sub{margin-top:4px;color:var(--muted);font-size:13px;font-weight:700}
    .actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:11px 14px;border-radius:14px;font-size:14px;font-weight:900}
    .btn:active{transform:scale(.98)} .btn-soft{background:var(--soft);color:var(--text);border:1px solid var(--line)}
    .btn-primary{width:100%;margin-top:14px;background:var(--accent);color:var(--accent-text)}
    .btn-danger{background:rgba(183,66,58,.11);color:var(--red);border:1px solid rgba(183,66,58,.2)}
    .theme-switch{display:grid;grid-template-columns:1fr 1fr;width:142px;height:40px;padding:4px;border-radius:999px;background:var(--soft);border:1px solid var(--line)}
    .theme-switch button{border-radius:999px;background:transparent;color:var(--muted);font-size:12px;font-weight:950}
    .theme-switch button.active{background:var(--accent);color:var(--accent-text)}
    .grid{display:grid;gap:14px}.summary-grid{grid-template-columns:repeat(5,minmax(0,1fr));margin:12px 0 14px}
    .summary-card,.panel,.device-card{background:var(--card);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}
    .summary-card{padding:18px}.summary-label{color:var(--muted);font-size:13px;font-weight:850}.summary-value{margin-top:8px;font-size:32px;font-weight:950}
    .content-grid{grid-template-columns:1.4fr .8fr;align-items:start}.panel{overflow:hidden}
    .panel-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .panel-title{font-size:17px;font-weight:950;letter-spacing:-.03em}.panel-sub{margin-top:4px;color:var(--muted);font-size:12px;font-weight:700}
    .log-row{display:grid;grid-template-columns:72px 82px 1fr 80px;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);font-size:14px}
    .log-header{background:rgba(92,92,84,.06);color:var(--muted);font-size:12px;font-weight:950}
    .status-chip{display:inline-flex;justify-content:center;min-width:62px;padding:6px 8px;border-radius:999px;font-size:12px;font-weight:950}
    .present{background:rgba(47,143,91,.14);color:var(--green)}.late{background:rgba(184,106,43,.14);color:var(--orange)}
    .notyet{background:rgba(116,116,110,.14);color:var(--muted)}.bad{background:rgba(183,66,58,.13);color:var(--red)}
    .badge{border-radius:999px;padding:5px 8px;font-size:11px;font-weight:950}.online{background:rgba(47,143,91,.14);color:var(--green)}
    .offline{background:rgba(183,66,58,.13);color:var(--red)}.connecting{background:rgba(184,106,43,.14);color:var(--orange)}
    .device-card{padding:18px}.info-list{display:grid;gap:10px;margin-top:14px}.info-item{display:flex;justify-content:space-between;gap:12px;padding:11px 12px;border-radius:16px;background:rgba(92,92,84,.06);border:1px solid var(--line);font-size:13px}
    .info-label{color:var(--muted);font-weight:850}.info-value{font-weight:900;text-align:right;word-break:break-all}
    .modal-backdrop,.loading{position:fixed;inset:0;display:none;place-items:center;padding:20px;background:var(--overlay);z-index:100}
    .modal-backdrop.show,.loading.show{display:grid}.modal{width:min(540px,100%);max-height:calc(100vh - 40px);overflow:auto;background:var(--solid);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}
    .modal-head{position:sticky;top:0;background:var(--solid);padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .modal-body{padding:18px 20px 22px}.section-title{margin:18px 0 8px;font-size:14px;font-weight:950}.section-title:first-child{margin-top:0}
    .passkey-card{padding:14px;border:1px solid var(--line);border-radius:18px;background:var(--soft)}
    .passkey-card p{margin:0 0 12px;color:var(--muted);font-size:12px;line-height:1.55;font-weight:750}
    label{display:block;margin:12px 0 7px;font-size:13px;font-weight:850}input{width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:var(--input);color:var(--text);outline:none}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(8px);max-width:calc(100vw - 32px);padding:12px 16px;border-radius:999px;background:#1f2320;color:#fff;font-size:13px;font-weight:850;text-align:center;opacity:0;pointer-events:none;transition:.25s;z-index:300}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.spinner{width:42px;height:42px;margin:0 auto 16px;border-radius:50%;border:4px solid rgba(63,64,58,.16);border-top-color:var(--accent);animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}.loading-card{width:min(360px,100%);padding:26px 22px;border-radius:28px;background:var(--solid);text-align:center}
    .loading-title{font-size:18px;font-weight:950}.loading-sub{margin-top:8px;color:var(--muted);font-size:13px;font-weight:750}
    .pc-hidden{display:none!important}
    @media(hover:hover) and (pointer:fine){.push-ui{display:none!important}}
    @media(max-width:860px){.app{padding:16px}.topbar-inner{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}.summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.content-grid{grid-template-columns:1fr}.log-row{grid-template-columns:64px 72px 1fr 62px;padding:13px 14px;font-size:13px}}
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="topbar-inner">
        <div><h1>출석 대시보드</h1><div id="todayText" class="sub">2학년 12반 · 오늘 출석 현황</div></div>
        <div class="actions">
          <div class="theme-switch"><button id="lightBtn" onclick="setTheme('light')">Light</button><button id="darkBtn" onclick="setTheme('dark')">Dark</button></div>
          <button id="pushBtn" class="btn btn-soft push-ui" onclick="enablePushNotifications()">알림 확인중</button>
          <button class="btn btn-soft" onclick="loadTodayLogs(true)">새로고침</button>
          <button class="btn btn-soft" onclick="openSettingsModal()">설정</button>
          <button class="btn btn-danger" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </section>

    <section class="grid summary-grid">
      <div class="summary-card"><div class="summary-label">전체</div><div id="sumTotal" class="summary-value">-</div></div>
      <div class="summary-card"><div class="summary-label">출석</div><div id="sumPresent" class="summary-value">-</div></div>
      <div class="summary-card"><div class="summary-label">지각</div><div id="sumLate" class="summary-value">-</div></div>
      <div class="summary-card"><div class="summary-label">결석</div><div id="sumAbsent" class="summary-value">-</div></div>
      <div class="summary-card"><div class="summary-label">미출석</div><div id="sumNotYet" class="summary-value">-</div></div>
    </section>

    <section class="grid content-grid">
      <div class="panel">
        <div class="panel-head"><div><div class="panel-title">오늘 출석 로그</div><div id="logSub" class="panel-sub">Google Sheets에서 불러오는 중</div></div><span id="mqttBadge" class="badge offline">MQTT OFFLINE</span></div>
        <div class="log-row log-header"><div>시간</div><div>상태</div><div>이름</div><div>지문ID</div></div>
        <div id="logList"></div>
      </div>
      <aside class="grid">
        <div class="device-card">
          <div class="panel-title">ESP32 장치 상태</div><div class="panel-sub">MQTT heartbeat 기준</div>
          <div class="info-list">
            <div class="info-item"><span class="info-label">장치</span><span id="espBadge" class="badge offline">OFFLINE</span></div>
            <div class="info-item"><span class="info-label">Wi-Fi</span><span id="deviceWifi" class="info-value">-</span></div>
            <div class="info-item"><span class="info-label">IP</span><span id="deviceIp" class="info-value">-</span></div>
            <div class="info-item"><span class="info-label">RSSI</span><span id="deviceRssi" class="info-value">-</span></div>
            <div class="info-item"><span class="info-label">Queue</span><span id="deviceQueue" class="info-value">-</span></div>
            <div class="info-item"><span class="info-label">Last seen</span><span id="deviceSeen" class="info-value">-</span></div>
          </div>
        </div>
        <div id="pushStatusCard" class="device-card push-ui">
          <div class="panel-title">알림 상태</div><div class="panel-sub">모바일 홈 화면 앱</div>
          <div class="info-list"><div class="info-item"><span class="info-label">권한</span><span id="pushPermissionText" class="info-value">확인중</span></div><div class="info-item"><span class="info-label">PWA</span><span id="pwaText" class="info-value">확인중</span></div></div>
        </div>
      </aside>
    </section>
  </main>

  <div id="settingsModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <div class="modal-head"><div class="panel-title">설정</div><button class="btn btn-soft" onclick="closeSettingsModal()">닫기</button></div>
      <div class="modal-body">
        <div class="section-title">로그인 방법</div>
        <div class="passkey-card">
          <p id="passkeyActionText">이 기기의 패스키 상태를 확인합니다.</p>
          <button id="passkeyActionBtn" class="btn btn-soft" style="width:100%" onclick="handlePasskeySetting()">확인 중</button>
        </div>

        <div class="section-title">MQTT 설정</div>
        <label for="setMqttHost">MQTT Host</label><input id="setMqttHost" placeholder="HiveMQ host" />
        <label for="setMqttPort">MQTT WebSocket TLS Port</label><input id="setMqttPort" placeholder="8884" />
        <label for="setMqttUser">MQTT User</label><input id="setMqttUser" placeholder="username" />
        <label for="setMqttPass">MQTT Password</label><input id="setMqttPass" type="password" placeholder="password" />
        <label for="setTopicStatus">Status Topic</label><input id="setTopicStatus" />
        <label for="setTopicEvent">Event Topic</label><input id="setTopicEvent" />
        <label for="setTopicHeartbeat">Heartbeat Topic</label><input id="setTopicHeartbeat" />
        <label for="setEspOfflineSec">ESP Offline 기준 초</label><input id="setEspOfflineSec" placeholder="25" />
        <button class="btn btn-primary" onclick="saveSettings()">저장</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading" aria-hidden="true"><div class="loading-card"><div class="spinner"></div><div id="loadingTitle" class="loading-title">잠시만 기다려주세요</div><div id="loadingSub" class="loading-sub">처리 중입니다.</div></div></div>
  <div id="toast" class="toast">알림</div>

  <script>
    const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbzE5SDb4aYv5MtyUCP1r0sAp24wBEfWbySKRQXxpuiLrv6irwSbG4L8ABSNWZY8pEvX/exec";
    window.APPS_SCRIPT_URL=APPS_SCRIPT_URL;
    const DEFAULT_SETTINGS={mqttHost:"793e777e3e64408cafd9c5b413d3bd16.s1.eu.hivemq.cloud",mqttPort:"8884",mqttUser:"",mqttPass:"",topicStatus:"attendance/2-12/status",topicEvent:"attendance/2-12/event",topicHeartbeat:"attendance/2-12/heartbeat",espOfflineSec:"25"};
    let appSettings={...DEFAULT_SETTINGS},mqttClient=null,lastEspSeenAt=0,espWatchTimer=null;

    document.addEventListener("DOMContentLoaded",function(){
      localStorage.removeItem("attendancePersistentAuth");
      if(!hasSession()){location.replace("../login/");return}
      if(!isMobilePushTarget())hidePushUiForPc();
      document.getElementById("todayText").textContent="2학년 12반 · "+new Date().toLocaleDateString("ko-KR")+" 출석 현황";
      applyStoredTheme();renderPasskeySetting();
      startLoading("대시보드 로딩 중입니다","설정과 오늘 로그를 불러옵니다.");
      loadRemoteSettings(function(){connectMqtt();startEspWatchdog();loadTodayLogs(false,stopLoading)});
    });

    function hasSession(){return!!(sessionStorage.getItem("sessionToken")||sessionStorage.getItem("adminId"))}
    function addAuthParams(p){const t=sessionStorage.getItem("sessionToken")||"";if(t)p.set("sessionToken",t);else{p.set("adminId",sessionStorage.getItem("adminId")||"");p.set("adminPw",sessionStorage.getItem("adminPw")||"")}}
    function logout(){sessionStorage.clear();disconnectMqtt();location.replace("../login/")}
    function hasLocalPasskey(){return localStorage.getItem("attendancePasskeyRegistered")==="1"&&!!localStorage.getItem("attendancePasskeyCredentialId")}
    function renderPasskeySetting(){
      const btn=document.getElementById("passkeyActionBtn"),text=document.getElementById("passkeyActionText");
      const loginType=sessionStorage.getItem("loginType")||"";
      if(loginType==="passkey"&&hasLocalPasskey()){btn.textContent="패스키 삭제";btn.className="btn btn-danger";btn.disabled=false;text.textContent="현재 패스키로 로그인했습니다. 이 기기의 패스키를 삭제할 수 있습니다.";return}
      if(!hasLocalPasskey()){btn.textContent="패스키 생성";btn.className="btn btn-soft";btn.disabled=false;text.textContent="이 기기에 등록된 패스키가 없습니다. 새 패스키를 생성할 수 있습니다.";return}
      btn.textContent="패스키가 등록되어 있습니다";btn.className="btn btn-soft";btn.disabled=true;text.textContent="패스키를 삭제하려면 다음 로그인에서 패스키로 로그인한 뒤 설정을 여세요."
    }
    function handlePasskeySetting(){const loginType=sessionStorage.getItem("loginType")||"";if(loginType==="passkey"&&hasLocalPasskey())location.href="../delete-passkey/";else if(!hasLocalPasskey())location.href="../setup-login-method/"}

    function applyStoredTheme(){setTheme(sessionStorage.getItem("theme")||localStorage.getItem("attendanceTheme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"),true)}
    function setTheme(theme,silent){const next=theme==="dark"?"dark":"light";document.documentElement.setAttribute("data-theme",next);sessionStorage.setItem("theme",next);localStorage.setItem("attendanceTheme",next);document.getElementById("lightBtn").classList.toggle("active",next==="light");document.getElementById("darkBtn").classList.toggle("active",next==="dark")}

    function loadRemoteSettings(done){const p=new URLSearchParams({action:"getDashboardSettingsJsonp"});addAuthParams(p);callJsonp(APPS_SCRIPT_URL+"?"+p,function(r){if(r&&r.ok)appSettings={...DEFAULT_SETTINGS,...(r.settings||r.data||{})};else toast((r&&r.message)||"원격 설정을 불러오지 못했습니다.");if(done)done()})}
    function loadTodayLogs(showToast,done){const p=new URLSearchParams({action:"todayLogs"});addAuthParams(p);callJsonp(APPS_SCRIPT_URL+"?"+p,function(r){if(!r||!r.ok){toast((r&&r.message)||"로그 불러오기 실패");if(done)done();return}const logs=normalizeLogs(r.logs||[]);renderLogs(logs);renderSummary(logs,r.summary||null);document.getElementById("logSub").textContent="마지막 업데이트 "+new Date().toLocaleTimeString("ko-KR");if(showToast)toast("새로고침 완료");if(done)done()})}
    function normalizeLogs(rows){return Array.isArray(rows)?rows.map(r=>({time:r.time||r.시간||r.timestamp||"-",status:r.status||r.상태||"-",name:r.name||r.이름||"-",fingerId:r.fingerId||r.지문ID||"-"})).reverse():[]}
    function renderLogs(logs){const el=document.getElementById("logList");if(!logs.length){el.innerHTML='<div class="log-row"><div>-</div><div><span class="status-chip notyet">없음</span></div><div>오늘 로그가 없습니다.</div><div>-</div></div>';return}el.innerHTML=logs.map(x=>'<div class="log-row"><div>'+esc(formatTime(x.time))+'</div><div><span class="status-chip '+statusClass(x.status)+'">'+esc(x.status)+'</span></div><div>'+esc(x.name)+'</div><div>'+esc(x.fingerId)+'</div></div>').join("")}
    function renderSummary(logs,s){const c={total:logs.length,present:0,late:0,absent:0,notYet:0};logs.forEach(x=>{const v=String(x.status);if(v.includes("지각"))c.late++;else if(v.includes("출석")&&!v.includes("미출석"))c.present++;else if(v.includes("결석"))c.absent++;else if(v.includes("미출석"))c.notYet++});if(s)Object.keys(c).forEach(k=>{if(s[k]!=null)c[k]=Number(s[k])||0});["Total","Present","Late","Absent","NotYet"].forEach(k=>document.getElementById("sum"+k).textContent=c[k.charAt(0).toLowerCase()+k.slice(1)])}
    function statusClass(s){s=String(s);if(s.includes("지각"))return"late";if(s.includes("출석")&&!s.includes("미출석"))return"present";if(s.includes("결석")||s.includes("오류")||s.includes("미등록"))return"bad";return"notyet"}
    function formatTime(v){const m=String(v||"").match(/(\d{1,2}:\d{2}(?::\d{2})?)/);return m?m[1]:(v||"-")}

    function connectMqtt(){disconnectMqtt();if(!window.mqtt||!appSettings.mqttHost||!appSettings.mqttUser||!appSettings.mqttPass){setMqttBadge("offline");return}setMqttBadge("connecting");mqttClient=mqtt.connect("wss://"+appSettings.mqttHost+":"+(appSettings.mqttPort||"8884")+"/mqtt",{username:appSettings.mqttUser,password:appSettings.mqttPass,clean:true,connectTimeout:8000,reconnectPeriod:4000,clientId:"dashboard_2_12_"+Math.random().toString(16).slice(2)});mqttClient.on("connect",()=>{setMqttBadge("online");[appSettings.topicStatus,appSettings.topicEvent,appSettings.topicHeartbeat].forEach(t=>t&&mqttClient.subscribe(t))});mqttClient.on("reconnect",()=>setMqttBadge("connecting"));mqttClient.on("close",()=>setMqttBadge("offline"));mqttClient.on("error",()=>setMqttBadge("offline"));mqttClient.on("message",(topic,payload)=>{let d={};try{d=JSON.parse(payload.toString())}catch(e){}if(topic===appSettings.topicHeartbeat||topic===appSettings.topicStatus||topic===appSettings.topicEvent){lastEspSeenAt=Date.now();setEspBadge(true);updateDeviceInfo(d)}if(topic===appSettings.topicEvent)setTimeout(()=>loadTodayLogs(false),600)})}
    function disconnectMqtt(){if(mqttClient){try{mqttClient.end(true)}catch(e){}mqttClient=null}}
    function startEspWatchdog(){clearInterval(espWatchTimer);espWatchTimer=setInterval(()=>{if(!lastEspSeenAt||Date.now()-lastEspSeenAt>Number(appSettings.espOfflineSec||25)*1000)setEspBadge(false)},3000)}
    function updateDeviceInfo(d){document.getElementById("deviceWifi").textContent=d.wifiSsid||d.ssid||"-";document.getElementById("deviceIp").textContent=d.ip||"-";document.getElementById("deviceRssi").textContent=d.wifiRssi==null?"-":d.wifiRssi+" dBm";document.getElementById("deviceQueue").textContent=d.queueCount==null?"-":d.queueCount;document.getElementById("deviceSeen").textContent=new Date().toLocaleTimeString("ko-KR")}
    function setMqttBadge(s){const e=document.getElementById("mqttBadge");e.textContent="MQTT "+(s==="online"?"ONLINE":s==="connecting"?"CONNECTING":"OFFLINE");e.className="badge "+s}
    function setEspBadge(on){const e=document.getElementById("espBadge");e.textContent=on?"ONLINE":"OFFLINE";e.className="badge "+(on?"online":"offline")}

    function openSettingsModal(){fillSettingsForm();renderPasskeySetting();document.getElementById("settingsModal").classList.add("show")}
    function closeSettingsModal(){document.getElementById("settingsModal").classList.remove("show")}
