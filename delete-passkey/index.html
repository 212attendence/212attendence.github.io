<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>패스키 삭제</title>
  <link rel="manifest" href="../manifest.json?v=12">
  <link rel="icon" href="../favicon.png?v=12">
  <link rel="apple-touch-icon" href="../favicon.png?v=12">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin>
  <link rel="stylesheet" href="../assets/app.css?v=12">
  <script src="../assets/app.js?v=12" defer></script>
  <style>
    .danger-mark{width:60px;height:60px;display:grid;place-items:center;margin-bottom:18px;border-radius:20px;background:color-mix(in srgb,var(--danger) 13%,transparent);color:var(--danger);font-size:28px;font-weight:900}.device-box{margin:16px 0 0}.warning-text{margin-top:12px;color:var(--danger)}
  </style>
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="danger-mark">!</div>
    <h1>패스키를 삭제할까요?</h1>
    <p class="subtext">삭제를 계속하려면 Google 계정 또는 관리자 계정으로 다시 인증해야 합니다.</p>

    <div class="setting-card device-box">
      <div class="info-row"><span class="info-label">등록 기기</span><span id="deviceName" class="info-value">확인 중</span></div>
      <div class="info-row"><span class="info-label">서버 등록</span><span class="info-value">삭제 예정</span></div>
    </div>
    <div class="small-note warning-text">웹사이트에서 삭제한 뒤 운영체제나 비밀번호 관리자에 남은 패스키는 기기 설정에서 별도로 삭제할 수 있습니다.</div>

    <div class="actions-stack">
      <button class="btn btn-danger btn-block" type="button" onclick="continueDelete()">예, 다시 인증하고 삭제</button>
      <button class="btn btn-soft btn-block" type="button" onclick="location.replace('../dashboard/')">아니요, 대시보드로 돌아가기</button>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      AttendanceApp.Theme.init();
      if (!AttendanceApp.Session.require("../login/", "/dashboard/")) return;
      const session = AttendanceApp.Session.current();
      if (!session || session.loginType !== "passkey" || !AttendanceApp.Passkey.isRegistered()) {
        location.replace("../dashboard/");
        return;
      }
      document.getElementById("deviceName").textContent = AttendanceApp.Passkey.getDeviceName() || AttendanceApp.Passkey.deviceInfo().name;
    });

    function continueDelete() {
      sessionStorage.setItem("passkeyDeletePending", "1");
      sessionStorage.setItem("passkeyDeleteCredentialId", AttendanceApp.Passkey.getCredentialId());
      sessionStorage.setItem("passkeyDeleteDeviceName", AttendanceApp.Passkey.getDeviceName() || AttendanceApp.Passkey.deviceInfo().name);
      location.href = "../verify-admin/";
    }
  </script>
</body>
</html>
