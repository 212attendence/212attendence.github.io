<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <base href="/">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="2-12 학생 출석">
  <title>학생 로그인 · 2-12 출석</title>
  <link rel="manifest" href="/student/manifest.json?v=30"><link rel="icon" type="image/png" sizes="300x300" href="/favicon.png?v=30"><link rel="shortcut icon" href="/favicon.png?v=30"><link rel="apple-touch-icon" sizes="300x300" href="/favicon.png?v=30">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)"><meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="preconnect" href="https://script.google.com"><link rel="preconnect" href="https://script.googleusercontent.com"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin><link rel="stylesheet" href="/student/assets/app.css?v=22">
  <script src="/student/assets/app.js?v=30" defer></script><script src="/assets/role-app.js?v=30" defer></script><script src="/student/assets/student.js?v=31" defer></script><script src="/assets/resilience.js?v=1" defer></script>
  <style>:root{--student:#315f84;--student-soft:rgba(49,95,132,.12)}html[data-theme="dark"]{--student:#8ab6d8;--student-soft:rgba(138,182,216,.12)}body::before{content:"";position:fixed;z-index:-1;width:32rem;height:32rem;left:-13rem;top:-14rem;border-radius:50%;background:var(--student-soft);filter:blur(72px)}.student-chip{background:var(--student-soft);color:var(--student)}.approval-box{display:grid;gap:10px;margin-top:16px;padding:16px;border:1px solid var(--line);border-radius:19px;background:var(--surface-soft)}.approval-head{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:900}.approval-dot{width:10px;height:10px;border-radius:50%;background:var(--warning);box-shadow:0 0 0 5px color-mix(in srgb,var(--warning) 14%,transparent);animation:pulse 1.5s ease-in-out infinite}@keyframes pulse{50%{opacity:.45;transform:scale(.82)}}.approval-sub{color:var(--muted);font-size:12px;line-height:1.55;font-weight:650}.privacy-note{margin-top:14px;color:var(--muted);font-size:11px;line-height:1.6;text-align:center}.hidden{display:none!important}</style>
</head>
<body class="auth-page">
  <main class="auth-card"><div class="brand-chip student-chip">학생 출석</div>
    <section id="loginPanel"><h1>학생 로그인</h1><p class="subtext">학생 계정으로 로그인한 뒤 관리자 승인을 받습니다.</p><div id="serverState" class="status-box">학생 로그인 서버를 확인하는 중입니다.</div><div class="field"><label for="studentId">학생 ID</label><input id="studentId" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="학생 ID"></div><div class="field"><label for="studentPw">비밀번호</label><div class="input-wrap"><input id="studentPw" type="password" autocomplete="current-password" placeholder="비밀번호" style="padding-right:70px"><button class="input-action" type="button" onclick="togglePassword()">표시</button></div></div><div class="actions-stack"><button id="loginBtn" class="btn btn-primary btn-block" type="button" onclick="requestLogin()" disabled>로그인 승인 요청</button></div><div class="actions-stack" style="margin-top:10px"><a class="btn btn-soft btn-block" href="/student/check/">기기 점검</a><a class="btn btn-soft btn-block" href="/student/app-guide/">앱 설치 가이드</a><a class="btn btn-soft btn-block" href="/student/help/">학생 도움말</a></div><div class="privacy-note">최초 로그인 승인 후 위치 권한과 개인정보 필수·선택 동의를 각각 설정합니다.</div></section>
    <section id="pendingPanel" class="hidden"><h1>관리자 승인 대기 중</h1><p class="subtext">관리자에게 로그인 요청을 전송했습니다.</p><div class="approval-box"><div class="approval-head"><span class="approval-dot"></span><span>승인 결과 확인 중</span></div><div id="pendingText" class="approval-sub">관리자가 승인 또는 거절하면 자동으로 반영됩니다.</div></div><div class="actions-stack"><button class="btn btn-soft btn-block" type="button" onclick="cancelPending()">요청 취소</button></div><div class="actions-stack" style="margin-top:10px"><a class="btn btn-soft btn-block" href="/student/check/">기기 점검</a><a class="btn btn-soft btn-block" href="/student/help/">승인 절차 도움말</a></div></section>
  </main>
  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true"><div class="loading-card"><div class="spinner"></div><div id="loadingTitle" class="loading-title">확인 중입니다</div><div id="loadingSub" class="loading-sub">잠시만 기다려주세요.</div></div></div><div id="toast" class="toast">알림</div>
<script>
  const PLATFORM_CHOICE_KEY="attendanceStudentPlatformChoiceV1";let busy=false,pollTimer=null,serverReady=false,serverFailures=0;
  function hasPlatformChoice(){try{return Boolean(localStorage.getItem(PLATFORM_CHOICE_KEY))}catch(error){return false}}
  async function routeAfterLogin(session,approved){if(!hasPlatformChoice())return "/ios-or-android/"+(approved?"?approved=1":"");const consent=await StudentAttendance.Consent.ensure(session);if(!consent||!consent.requiredAccepted)return "/student/onboarding/?next="+encodeURIComponent("/student/identity/"+(approved?"?approved=1":""));return "/student/identity/"+(approved?"?approved=1":"")}
  document.addEventListener("DOMContentLoaded",async function(){AttendanceApp.Theme.init();document.getElementById("studentPw").addEventListener("keydown",function(event){if(event.key==="Enter")requestLogin()});if(new URLSearchParams(location.search).get("privacy")==="withdrawn")AttendanceApp.UI.toast("개인정보 필수 동의가 철회되어 로그아웃되었습니다.",4800);try{const session=await StudentAttendance.Session.validate();if(session){location.replace(await routeAfterLogin(session,false));return}}catch(error){AttendanceFailover.report({errorType:"LOGIN_SESSION_CHECK_FAILED",message:error.message||String(error),fallbackUrl:"/student/err/server/?from=login"})}const pending=StudentAttendance.Pending.current();if(pending&&pending.requestId&&pending.requestSecret){showPending();startPolling(pending);return}await checkServer()});
  async function checkServer(){const state=document.getElementById("serverState"),button=document.getElementById("loginBtn");try{const result=await StudentAttendance.api("studentFeaturePingJsonp",{},22000);if(!result||!result.ok)throw new Error(result&&result.message||"학생 로그인 서버 준비가 필요합니다.");serverFailures=0;serverReady=true;button.disabled=false;state.className="status-box success";state.textContent="학생 로그인 사용 가능 · "+(result.schoolName||"해강중학교")+" 반경 "+Number(result.radiusM||100)+"m"}catch(error){serverFailures+=1;serverReady=false;button.disabled=true;state.className="status-box danger";state.textContent="학생 로그인 서버에 연결하지 못했습니다. 다시 확인 중입니다.";AttendanceFailover.report({errorType:"LOGIN_SERVER_CHECK_FAILED",message:error.message||String(error),fallbackUrl:"/student/err/server/?from=login"});if(serverFailures>=2){AttendanceFailover.redirect("LOGIN_SERVER_UNAVAILABLE","/student/err/server/?from=login",error.message||String(error),1200);return}setTimeout(checkServer,2500)}}
  function togglePassword(){const input=document.getElementById("studentPw"),button=input.parentElement.querySelector("button"),visible=input.type==="text";input.type=visible?"password":"text";button.textContent=visible?"표시":"숨김"}
  function setBusy(value){busy=value;document.getElementById("loginBtn").disabled=value||!serverReady;document.getElementById("studentId").disabled=value;document.getElementById("studentPw").disabled=value}
  function showPending(){document.getElementById("loginPanel").classList.add("hidden");document.getElementById("pendingPanel").classList.remove("hidden")}
  function showLogin(){document.getElementById("pendingPanel").classList.add("hidden");document.getElementById("loginPanel").classList.remove("hidden");checkServer()}
  async function requestLogin(){if(busy||!serverReady)return;const studentId=document.getElementById("studentId").value.trim(),studentPw=document.getElementById("studentPw").value;if(!studentId||!studentPw){AttendanceApp.UI.toast("학생 ID와 비밀번호를 입력하세요.");return}setBusy(true);AttendanceApp.UI.loading("학생 계정 확인 중입니다","관리자 승인 요청을 준비합니다.");try{const response=await StudentAttendance.api("studentLoginJsonp",{studentId:studentId,studentPw:studentPw},30000);if(!response||!response.ok)throw new Error(response&&response.message||"학생 로그인을 요청하지 못했습니다.");const pending={requestId:response.requestId,requestSecret:response.requestSecret,studentId:studentId,createdAt:Date.now()};StudentAttendance.Pending.save(pending);showPending();startPolling(pending)}catch(error){AttendanceFailover.report({errorType:"STUDENT_LOGIN_REQUEST_FAILED",message:error.message||String(error),studentId:studentId,fallbackUrl:"/student/err/server/?from=login-request"});AttendanceApp.UI.toast(error.message||String(error),4200)}finally{AttendanceApp.UI.stopLoading();setBusy(false)}}
  function startPolling(pending){clearTimeout(pollTimer);checkStatus(pending)}
  async function checkStatus(pending){try{const response=await StudentAttendance.api("studentRequestStatusJsonp",{requestId:pending.requestId,requestSecret:pending.requestSecret},22000);if(response&&response.ok){const status=String(response.status||"PENDING").toUpperCase();if(status==="APPROVED"&&response.studentToken){StudentAttendance.Session.save(response);StudentAttendance.Pending.clear();AttendanceRoleApp.registerPushToken();const session=StudentAttendance.Session.current();document.getElementById("pendingText").textContent="승인되었습니다. 최초 설정 화면으로 이동합니다.";setTimeout(async function(){location.replace(await routeAfterLogin(session,true))},250);return}if(status==="DENIED"||status==="EXPIRED"){StudentAttendance.Pending.clear();showLogin();AttendanceApp.UI.toast(status==="DENIED"?"관리자가 로그인 요청을 거절했습니다.":"로그인 요청이 만료되었습니다.",4200);return}document.getElementById("pendingText").textContent="관리자 승인 대기 중 · "+new Date().toLocaleTimeString("ko-KR")}}catch(error){document.getElementById("pendingText").textContent="연결을 다시 확인하는 중입니다.";AttendanceFailover.report({errorType:"LOGIN_APPROVAL_POLL_FAILED",message:error.message||String(error),fallbackUrl:"/student/err/server/?from=approval"})}pollTimer=setTimeout(function(){checkStatus(pending)},4000)}
  function cancelPending(){clearTimeout(pollTimer);StudentAttendance.Pending.clear();showLogin();AttendanceApp.UI.toast("로그인 요청을 취소했습니다.")}
</script>
</body></html>
