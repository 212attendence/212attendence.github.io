<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>복구 센터 · 2-12 출석</title>
  <link rel="manifest" href="/student/manifest.json?v=30"><link rel="icon" type="image/png" sizes="300x300" href="/favicon.png?v=30"><link rel="apple-touch-icon" sizes="300x300" href="/favicon.png?v=30">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)"><meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin><link rel="stylesheet" href="/student/assets/app.css?v=22">
  <script src="/student/assets/app.js?v=30" defer></script><script src="/assets/resilience.js?v=1" defer></script>
  <style>:root{--warn:#ad661f;--warn-soft:rgba(173,102,31,.12)}html[data-theme="dark"]{--warn:#dda164;--warn-soft:rgba(221,161,100,.12)}body::before{content:"";position:fixed;z-index:-1;width:34rem;height:34rem;left:-14rem;top:-14rem;border-radius:50%;background:var(--warn-soft);filter:blur(78px)}.recovery-card{width:min(620px,100%)}.reason{margin:16px 0;padding:14px;border:1px solid var(--line);border-radius:17px;background:var(--surface-soft);color:var(--muted);font-size:12px;line-height:1.6}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid .btn{text-decoration:none}.note{margin-top:14px;color:var(--muted);font-size:11px;line-height:1.6}@media(max-width:520px){.grid{grid-template-columns:1fr}}</style>
</head>
<body class="auth-page">
<main class="auth-card recovery-card"><div class="brand-chip">자동 복구</div><h1>출석 시스템 복구 센터</h1><p class="subtext">현재 페이지에서 문제가 발생해 안전한 복구 화면으로 이동했습니다.</p><div id="reason" class="reason">오류 원인을 확인하고 있습니다.</div><div class="grid"><button class="btn btn-primary" type="button" onclick="retryPrevious()">이전 페이지 다시 시도</button><a class="btn btn-soft" href="/student/check/">기기 점검</a><a class="btn btn-soft" href="/student/login/">학생 로그인</a><a class="btn btn-soft" href="/student/identity/">학생 대시보드</a><a class="btn btn-soft" href="/student/app/android/">Android 앱 다운로드</a><a class="btn btn-soft" href="/student/help/">학생 도움말</a></div><div class="note">복구 시스템 작동 기록은 인터넷 연결이 가능할 때 관리자에게 전달됩니다. 반복 오류가 발생하면 기기 점검 결과를 복사해 관리자에게 보내세요.</div></main><div id="toast" class="toast">알림</div>
<script>document.addEventListener("DOMContentLoaded",function(){AttendanceApp.Theme.init();const p=new URLSearchParams(location.search),reason=p.get("reason")||"unknown",from=p.get("from")||document.referrer||"확인 불가";document.getElementById("reason").textContent="오류 유형: "+reason+" · 이전 위치: "+from;AttendanceFailover.report({errorType:"RECOVERY_PAGE_OPENED",message:"복구 센터 진입: "+reason,sourcePage:String(from),fallbackUrl:"/student/recovery/"})});function retryPrevious(){const p=new URLSearchParams(location.search),from=p.get("from");if(from){try{const u=new URL(from,location.origin);if(u.origin===location.origin&&u.pathname!==location.pathname){location.replace(u.pathname+u.search+u.hash);return}}catch(error){}}history.length>1?history.back():location.replace("/student/login/")}</script>
</body>
</html>
