<!DOCTYPE html>
<html lang="ko">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>로그인 방법 선택</title>
  <link rel="manifest" href="../manifest.json?v=21">
  <link rel="icon" href="../favicon.png?v=21">
  <link rel="apple-touch-icon" href="../favicon.png?v=21">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin>
  <link rel="stylesheet" href="../assets/app.css?v=21">
  <script src="../assets/app.js?v=21" defer></script>
  <style>
    .choice-list{display:grid;gap:12px}.choice{width:100%;min-height:82px;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 17px;border:1px solid var(--line);border-radius:18px;background:var(--surface-soft);color:var(--text);text-align:left}.choice.primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}.choice strong{display:block;font-size:15px;font-weight:900}.choice small{display:block;margin-top:5px;color:var(--muted);font-size:12px;line-height:1.45;font-weight:650}.choice.primary small{color:color-mix(in srgb,var(--accent-text) 72%,transparent)}.arrow{font-size:24px;opacity:.72}.session-box{margin-top:14px}
  </style>
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand-chip">로그인 보안</div>
    <h1>로그인 방법을 선택하세요</h1>
    <p class="subtext">이 기기에서 다음부터 사용할 빠른 인증 방법을 설정합니다.</p>

    <div class="choice-list">
      <button class="choice primary" type="button" onclick="location.href='/admin/setup-login-method/'">
        <span><strong id="primaryTitle">패스키 설정</strong><small id="primarySub">Face ID·Touch ID·Windows Hello를 등록합니다.</small></span><span class="arrow">›</span>
      </button>
      <button class="choice" type="button" onclick="location.href='/admin/dashboard/'">
        <span><strong>지금은 건너뛰기</strong><small>현재 로그인으로 대시보드에 들어갑니다. 설정에서 나중에 만들 수 있습니다.</small></span><span class="arrow">›</span>
      </button>
    </div>

    <div id="sessionInfo" class="status-box session-box">세션 정보를 확인하는 중입니다.</div>
    <button class="link-button" type="button" onclick="logout()">다른 계정으로 로그인</button>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      AttendanceApp.Theme.init();
      if (!AttendanceApp.Session.require("/admin/login/", "/admin/choose-login-method/")) return;
      if (AttendanceApp.Passkey.isRegistered()) {
        location.replace("/admin/dashboard/");
        return;
      }
      const device = AttendanceApp.Passkey.deviceInfo();
      document.getElementById("primaryTitle").textContent = device.title + " 설정";
      document.getElementById("primarySub").textContent = device.hint + "을 등록합니다.";
      document.getElementById("sessionInfo").textContent = "현재 로그인은 " + AttendanceApp.Session.expiryText() + "까지 유효합니다.";
    });

    function logout() {
      AttendanceApp.Session.clear();
      location.replace("/admin/login/");
    }
  </script>
</body>
</html>
