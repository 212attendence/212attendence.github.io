<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="2-12 출석 관리자">
  <title>오늘 출석률</title>
  <link rel="manifest" href="/admin/manifest.json?v=24">
  <link rel="icon" href="../favicon.png?v=21">
  <link rel="apple-touch-icon" href="../favicon.png?v=21">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin>
  <link rel="stylesheet" href="../assets/app.css?v=21">
  <script src="../assets/app.js?v=21" defer></script>
  <script src="/assets/role-app.js?v=24" defer></script>
  <style>
    :root{--green:#277a4d;--orange:#ad661f;--red:#b6423a;--gray:#8a8d86;--glass:rgba(255,255,252,.82);--glow-a:rgba(39,122,77,.14);--glow-b:rgba(58,100,124,.11)}
    html[data-theme="dark"]{--green:#77c495;--orange:#dda164;--red:#e47e76;--gray:#aaa9a1;--glass:rgba(34,35,33,.82);--glow-a:rgba(119,196,149,.08);--glow-b:rgba(132,179,205,.07)}
    ::view-transition-old(root),::view-transition-new(root){animation-duration:.3s;animation-timing-function:ease}
    ::view-transition-old(root){animation-name:theme-out}::view-transition-new(root){animation-name:theme-in}
    @keyframes theme-out{to{opacity:.72}}@keyframes theme-in{from{opacity:.72}}
    html.theme-transition,html.theme-transition body,html.theme-transition body::before,html.theme-transition body::after,html.theme-transition .page-head,html.theme-transition .chart-card,html.theme-transition .legend-card,html.theme-transition .btn,html.theme-transition .segmented{transition:background-color .3s ease,color .3s ease,border-color .3s ease,box-shadow .3s ease,opacity .3s ease,filter .3s ease}
    body{position:relative;overflow-x:hidden;background:var(--bg)}
    body::before,body::after{content:"";position:fixed;z-index:-1;width:32rem;height:32rem;border-radius:50%;filter:blur(76px);pointer-events:none}
    body::before{left:-13rem;top:-12rem;background:var(--glow-a)}body::after{right:-13rem;top:-8rem;background:var(--glow-b)}
    .page{width:min(980px,100%);margin:0 auto;padding:22px}
    .page-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 15px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(135deg,color-mix(in srgb,var(--glass) 96%,transparent),color-mix(in srgb,var(--glass) 76%,transparent));box-shadow:var(--shadow),inset 0 1px 0 color-mix(in srgb,#fff 50%,transparent);backdrop-filter:blur(24px) saturate(125%);-webkit-backdrop-filter:blur(24px) saturate(125%)}
    .head-title{display:flex;align-items:center;gap:12px}.back{width:42px;height:42px;padding:0;border-radius:14px;font-size:21px}.title h1{font-size:24px}.title p{margin:4px 0 0;color:var(--muted);font-size:12px;font-weight:650}.head-actions{display:flex;align-items:center;gap:8px}.segmented{width:190px}
    .layout{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(280px,.9fr);gap:16px;margin-top:16px}
    .chart-card,.legend-card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(145deg,color-mix(in srgb,var(--surface) 96%,transparent),color-mix(in srgb,var(--surface) 82%,transparent));box-shadow:var(--shadow),inset 0 1px 0 color-mix(in srgb,#fff 45%,transparent);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
    .chart-card{display:grid;place-items:center;min-height:530px;padding:28px}.chart-wrap{position:relative;width:min(390px,100%);aspect-ratio:1}.chart-wrap svg{width:100%;height:100%;overflow:visible;transform:rotate(-90deg)}
    .ring-bg{fill:none;stroke:var(--surface-soft);stroke-width:27}.ring{fill:none;stroke-width:27;stroke-linecap:butt;stroke-dasharray:0 999;transition:stroke-dasharray .9s cubic-bezier(.22,1,.36,1),stroke-dashoffset .9s cubic-bezier(.22,1,.36,1)}.ring.present{stroke:var(--green)}.ring.late{stroke:var(--orange)}.ring.absent{stroke:var(--red)}.ring.notyet{stroke:var(--gray)}
    .chart-center{position:absolute;inset:24%;display:grid;place-items:center;align-content:center;border:1px solid var(--line);border-radius:50%;background:color-mix(in srgb,var(--surface-strong) 92%,transparent);box-shadow:inset 0 1px 0 color-mix(in srgb,#fff 46%,transparent)}.rate{font-size:52px;line-height:1;font-weight:900;letter-spacing:-.07em}.rate-label{margin-top:9px;color:var(--muted);font-size:13px;font-weight:750}.total{margin-top:4px;color:var(--muted);font-size:11px;font-weight:650}
    .legend-card{padding:22px}.legend-title{font-size:18px;font-weight:900}.legend-sub{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.5;font-weight:650}.legend{display:grid;gap:10px;margin-top:18px}.legend-item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:11px;padding:13px;border:1px solid var(--line);border-radius:17px;background:color-mix(in srgb,var(--surface-soft) 72%,transparent)}.dot{width:11px;height:11px;border-radius:50%}.dot.present{background:var(--green)}.dot.late{background:var(--orange)}.dot.absent{background:var(--red)}.dot.notyet{background:var(--gray)}.legend-name{font-size:13px;font-weight:850}.legend-desc{margin-top:2px;color:var(--muted);font-size:11px;font-weight:650}.legend-value{font-size:23px;font-weight:900;letter-spacing:-.04em}.rule{margin-top:14px;padding:13px;border:1px solid var(--line);border-radius:17px;background:color-mix(in srgb,var(--surface-soft) 72%,transparent);color:var(--muted);font-size:12px;line-height:1.55;font-weight:650}.rule strong{color:var(--text)}.refresh{width:100%;margin-top:14px}
    .loading-overlay.show{background:color-mix(in srgb,var(--overlay) 82%,transparent);backdrop-filter:blur(18px) saturate(125%);-webkit-backdrop-filter:blur(18px) saturate(125%)}
    .loading-overlay .loading-card{background:color-mix(in srgb,var(--surface-strong) 88%,transparent);backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%)}
    @media(max-width:760px){.page{padding:14px}.page-head{align-items:flex-start;flex-direction:column}.head-actions{width:100%}.segmented{width:100%}.layout{grid-template-columns:1fr}.chart-card{min-height:430px;padding:20px}.chart-wrap{width:min(330px,100%)}.rate{font-size:44px}}
    @media(prefers-reduced-motion:reduce){.ring{transition:none}}
  </style>
</head>
<body>
  <main class="page">
    <header class="page-head">
      <div class="head-title"><button class="btn btn-soft back" onclick="returnToDashboard()" aria-label="대시보드로 돌아가기">‹</button><div class="title"><h1>오늘 출석률</h1><p id="dateText">2학년 12반 · 오늘 현황</p></div></div>
      <div class="head-actions"><div class="segmented" aria-label="테마"><button data-theme-choice="system" onclick="switchTheme('system')">자동</button><button data-theme-choice="light" onclick="switchTheme('light')">Light</button><button data-theme-choice="dark" onclick="switchTheme('dark')">Dark</button></div></div>
    </header>

    <section class="layout">
      <div class="chart-card">
        <div class="chart-wrap" aria-label="출석 상태 원 그래프">
          <svg viewBox="0 0 220 220" role="img">
            <circle class="ring-bg" cx="110" cy="110" r="78"></circle>
            <circle id="ringPresent" class="ring present" cx="110" cy="110" r="78"></circle>
            <circle id="ringLate" class="ring late" cx="110" cy="110" r="78"></circle>
            <circle id="ringAbsent" class="ring absent" cx="110" cy="110" r="78"></circle>
            <circle id="ringNotYet" class="ring notyet" cx="110" cy="110" r="78"></circle>
          </svg>
          <div class="chart-center"><div id="rateText" class="rate">0%</div><div class="rate-label">출석률</div><div id="totalText" class="total">전체 0명</div></div>
        </div>
      </div>

      <aside class="legend-card">
        <div class="legend-title">상태별 인원</div><div id="cutoffText" class="legend-sub">기준 시간을 확인하는 중입니다.</div>
        <div class="legend">
          <div class="legend-item"><span class="dot present"></span><div><div class="legend-name">출석</div><div class="legend-desc">정상 출석</div></div><div id="presentValue" class="legend-value">0</div></div>
          <div class="legend-item"><span class="dot late"></span><div><div class="legend-name">지각</div><div class="legend-desc">출석률에 포함</div></div><div id="lateValue" class="legend-value">0</div></div>
          <div class="legend-item"><span class="dot absent"></span><div><div class="legend-name">결석</div><div class="legend-desc">기준 시각 이후 표시</div></div><div id="absentValue" class="legend-value">0</div></div>
          <div class="legend-item"><span class="dot notyet"></span><div><div class="legend-name">미출석</div><div class="legend-desc">기준 시각 전까지 표시</div></div><div id="notYetValue" class="legend-value">0</div></div>
        </div>
        <div class="rule"><strong>표시 규칙</strong><br>월·화·수·금은 오후 3시, 목요일은 오후 3시 55분을 기준으로 미출석을 결석으로 전환합니다.</div>
        <button class="btn btn-primary refresh" onclick="loadData(true,true)">새로고침</button>
      </aside>
    </section>
  </main>

  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true"><div class="loading-card"><div class="spinner"></div><div id="loadingTitle" class="loading-title">출석률 계산 중입니다</div><div id="loadingSub" class="loading-sub">오늘 출석 데이터를 불러옵니다.</div></div></div>
  <div id="toast" class="toast">알림</div>

  <script>
    const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbzE5SDb4aYv5MtyUCP1r0sAp24wBEfWbySKRQXxpuiLrv6irwSbG4L8ABSNWZY8pEvX/exec";
    const SNAPSHOT_KEY="attendanceTodaySnapshotV1";
    const RING=2*Math.PI*78;

    document.addEventListener("DOMContentLoaded",function(){
      AttendanceApp.Theme.init();
      if(!AttendanceApp.Session.require("/admin/login/","/admin/attendance-rate/"))return;
      document.getElementById("dateText").textContent="2학년 12반 · "+new Date().toLocaleDateString("ko-KR")+" 현황";
      const cached=readSnapshot();
      if(cached){
        const registered=registeredStudentCount(cached,cached.summary||{});
        if(registered===0&&!(cached.logs||[]).length){location.replace("/admin/no-student-added/");return}
        render(applyCutoff(rawCounts(cached.logs||[],cached.summary||{},cached)));
        loadData(false,false);
      }else{
        loadData(false,true);
      }
    });

    function returnToDashboard(){
      const fromDashboard=sessionStorage.getItem("attendanceReturnToDashboard")==="1";
      sessionStorage.removeItem("attendanceReturnToDashboard");
      AttendanceApp.UI.stopLoading();
      if(fromDashboard&&history.length>1){history.back();return}
      location.replace("/admin/dashboard/");
    }

    function switchTheme(mode){
      const apply=function(){AttendanceApp.Theme.apply(mode)};
      if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches){apply();return}
      const root=document.documentElement;
      root.classList.add("theme-transition");
      if(document.startViewTransition){
        const transition=document.startViewTransition(apply);
        transition.finished.finally(function(){root.classList.remove("theme-transition")});
      }else{
        void root.offsetWidth;
        requestAnimationFrame(function(){apply();setTimeout(function(){root.classList.remove("theme-transition")},320)});
      }
    }

    function readSnapshot(){try{const s=JSON.parse(sessionStorage.getItem(SNAPSHOT_KEY)||"null");return s&&Date.now()-Number(s.savedAt||0)<300000?s:null}catch(e){return null}}
    function saveSnapshot(response,registered){try{sessionStorage.setItem(SNAPSHOT_KEY,JSON.stringify({savedAt:Date.now(),logs:response.logs||[],summary:response.summary||{},registeredStudentCount:registered}))}catch(e){}}

    async function loadData(showToast,showLoading){
      if(showLoading)AttendanceApp.UI.loading("출석률 계산 중입니다","오늘 출석 데이터를 불러옵니다.");
      const p=new URLSearchParams({action:"todayLogs"});AttendanceApp.Session.addAuthParams(p);
      try{
        const r=await AttendanceApp.jsonp(AttendanceApp.apiUrl(APPS_SCRIPT_URL,p));
        if(!r||!r.ok){
          if(AttendanceApp.Session.isUnauthorizedResponse(r)){AttendanceApp.Session.clear();location.replace("/admin/login/?next=/admin/attendance-rate/");return}
          throw new Error(r&&r.message||"출석 데이터를 불러오지 못했습니다.");
        }
        const logs=r.logs||[],summary=r.summary||{},registered=registeredStudentCount(r,summary);
        if(registered===0&&!logs.length){location.replace("/admin/no-student-added/");return}
        saveSnapshot(r,registered);
        render(applyCutoff(rawCounts(logs,summary,r)));
        if(showToast)AttendanceApp.UI.toast("새로고침 완료");
      }catch(e){AttendanceApp.UI.toast(e.message||String(e))}
      finally{if(showLoading)AttendanceApp.UI.stopLoading()}
    }

    function registeredStudentCount(response,summary){
      const candidates=[
        response&&response.registeredStudentCount,response&&response.studentCount,response&&response.userCount,response&&response.totalStudents,
        summary&&summary.registeredStudentCount,summary&&summary.studentCount,summary&&summary.userCount,summary&&summary.totalStudents,
        summary&&summary.total,summary&&summary["전체"]
      ];
      for(const value of candidates){if(value!==undefined&&value!==null&&value!==""){const number=Number(value);if(Number.isFinite(number))return Math.max(0,number)}}
      return null;
    }

    function rawCounts(rows,summary,response){
      const registered=registeredStudentCount(response,summary),c={total:registered===null?(Array.isArray(rows)?rows.length:0):registered,present:0,late:0,absent:0,notYet:0};
      (Array.isArray(rows)?rows:[]).forEach(r=>{const v=String(r.status||r.상태||"");if(v.includes("지각"))c.late++;else if(v.includes("출석")&&!v.includes("미출석"))c.present++;else if(v.includes("결석"))c.absent++;else if(v.includes("미출석"))c.notYet++});
      const aliases={present:["present","출석"],late:["late","지각"],absent:["absent","결석"],notYet:["notYet","notyet","미출석"]};
      Object.keys(aliases).forEach(k=>{for(const key of aliases[k]){if(summary&&summary[key]!=null){c[k]=Number(summary[key])||0;break}}});
      return c;
    }

    function applyCutoff(c){const now=new Date(),cutoff=now.getDay()===4?15*60+55:15*60,afterCutoff=now.getHours()*60+now.getMinutes()>=cutoff,known=c.present+c.late+c.absent+c.notYet;c.total=Math.max(c.total,known);const remainder=Math.max(0,c.total-known);if(afterCutoff){c.absent+=c.notYet+remainder;c.notYet=0}else{c.notYet+=c.absent+remainder;c.absent=0}return{...c,afterFour:afterCutoff,cutoffText:now.getDay()===4?"오후 3시 55분":"오후 3시"}}
    function render(c){const rate=c.total?Math.min(100,Math.round(((c.present+c.late)/c.total)*100)):0;document.getElementById("rateText").textContent=rate+"%";document.getElementById("totalText").textContent="전체 "+c.total+"명";document.getElementById("presentValue").textContent=c.present;document.getElementById("lateValue").textContent=c.late;document.getElementById("absentValue").textContent=c.absent;document.getElementById("notYetValue").textContent=c.notYet;document.getElementById("cutoffText").textContent=c.afterFour?c.cutoffText+" 이후 · 미확인 인원은 결석으로 표시":c.cutoffText+" 전 · 미확인 인원은 미출석으로 표시";drawRings(c)}
    function drawRings(c){const parts=[["ringPresent",c.present],["ringLate",c.late],["ringAbsent",c.absent],["ringNotYet",c.notYet]];let offset=0;parts.forEach(([id,value])=>{const el=document.getElementById(id),length=c.total?RING*(value/c.total):0,start=offset;el.style.transition="none";el.style.strokeDasharray="0 "+RING;el.style.strokeDashoffset=-start;void el.getBoundingClientRect();el.style.transition="stroke-dasharray .9s cubic-bezier(.22,1,.36,1),stroke-dashoffset .9s cubic-bezier(.22,1,.36,1)";requestAnimationFrame(()=>{el.style.strokeDasharray=length+" "+Math.max(0,RING-length);el.style.strokeDashoffset=-start});offset+=length})}
  </script>
</body>
</html>
