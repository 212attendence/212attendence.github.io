<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <base href="/admin/no-student-added/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>학생 등록 필요</title>
  <link rel="manifest" href="../manifest.json?v=21">
  <link rel="icon" href="../favicon.png?v=21">
  <link rel="apple-touch-icon" href="../favicon.png?v=21">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin>
  <link rel="stylesheet" href="../assets/app.css?v=21">
  <script src="../assets/app.js?v=21" defer></script>
  <style>
    :root{--glow-a:rgba(39,122,77,.15);--glow-b:rgba(58,100,124,.11)}
    html[data-theme="dark"]{--glow-a:rgba(119,196,149,.08);--glow-b:rgba(132,179,205,.07)}
    body{position:relative;overflow:hidden}
    body::before,body::after{content:"";position:fixed;z-index:-1;width:31rem;height:31rem;border-radius:50%;filter:blur(76px);pointer-events:none}
    body::before{left:-13rem;top:-12rem;background:var(--glow-a)}body::after{right:-13rem;bottom:-15rem;background:var(--glow-b)}
    .empty-card{position:relative;overflow:hidden;text-align:center;background:linear-gradient(145deg,color-mix(in srgb,var(--surface) 97%,transparent),color-mix(in srgb,var(--surface) 84%,transparent));backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}
    .empty-card::after{content:"";position:absolute;width:190px;height:190px;right:-95px;top:-105px;border-radius:50%;background:radial-gradient(circle,var(--glow-a),transparent 70%)}
    .empty-card h1{font-size:29px}.empty-card .subtext{max-width:360px;margin:10px auto 0}
  </style>
</head>
<body class="auth-page">
  <main class="auth-card empty-card">
    <h1>학생이 등록되지 않았습니다.</h1>
    <p class="subtext">도움말로 이동하는 법을 검색하시고 학생을 등록해주세요</p>
    <div class="actions-stack">
      <a class="btn btn-primary btn-block" href="/admin/help/#student-registration">도움말로 이동</a>
    </div>
  </main>
  <script>
    document.addEventListener("DOMContentLoaded",function(){AttendanceApp.Theme.init()});
  </script>
</body>
</html>
