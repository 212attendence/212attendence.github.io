<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <base href="/"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow,noarchive"><title>학생 개인정보 권한 · 2-12 출석</title>
  <link rel="manifest" href="/admin/manifest.json?v=30"><link rel="icon" href="/favicon.png?v=30"><link rel="apple-touch-icon" href="/favicon.png?v=30"><meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)"><meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin><link rel="stylesheet" href="/admin/assets/app.css?v=21"><script src="/admin/assets/app.js?v=30" defer></script><script src="/assets/resilience.js?v=1" defer></script>
  <style>:root{--green:#277a4d;--red:#b6423a;--orange:#ad661f;--blue:#315f84}html[data-theme="dark"]{--green:#77c495;--red:#e47e76;--orange:#dda164;--blue:#8ab6d8}.privacy-admin{width:min(1180px,100%)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0}.stat{padding:15px;border:1px solid var(--line);border-radius:19px;background:var(--surface-soft)}.stat span{color:var(--muted);font-size:11px;font-weight:850}.stat strong{display:block;margin-top:5px;font-size:25px}.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.toolbar input{flex:1;min-width:220px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:20px}.table{width:100%;min-width:1150px;border-collapse:collapse}.table th,.table td{padding:11px;border-bottom:1px solid var(--line);text-align:left;font-size:11px}.table th{background:var(--surface-soft);color:var(--muted);font-weight:900}.pill{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:10px;font-weight:900}.pill.ok{background:color-mix(in srgb,var(--green) 13%,transparent);color:var(--green)}.pill.bad{background:color-mix(in srgb,var(--red) 13%,transparent);color:var(--red)}.pill.wait{background:color-mix(in srgb,var(--orange) 13%,transparent);color:var(--orange)}.empty{padding:36px;text-align:center;color:var(--muted)}@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}.privacy-admin{padding:14px}}</style>
</head>
<body class="auth-page"><main class="auth-card privacy-admin"><div class="brand-chip">관리자 · 개인정보</div><h1>학생 개인정보 권한 현황</h1><p class="subtext">학생계정별 필수·선택 동의, 법정대리인 확인과 최근 변경 시각을 확인합니다.</p><section class="stats"><article class="stat"><span>전체 계정</span><strong id="total">-</strong></article><article class="stat"><span>필수 동의 완료</span><strong id="active">-</strong></article><article class="stat"><span>동의 필요</span><strong id="missing">-</strong></article><article class="stat"><span>철회</span><strong id="withdrawn">-</strong></article></section><div class="toolbar"><input id="search" type="search" placeholder="이름, 학생 ID, 지문 ID 검색" oninput="render()"><button class="btn btn-soft" type="button" onclick="loadData(true)">새로고침</button><a class="btn btn-soft" href="/accounts-s/">학생계정 관리</a><a class="btn btn-soft" href="/admin/dashboard/?resume=1">대시보드</a></div><div class="table-wrap"><table class="table"><thead><tr><th>학생</th><th>학생 ID</th><th>지문 ID</th><th>상태</th><th>필수</th><th>위치</th><th>알림</th><th>오류진단</th><th>업데이트</th><th>로그인 유지</th><th>백그라운드</th><th>연령/대리인</th><th>최근 동의</th></tr></thead><tbody id="body"><tr><td colspan="13"><div class="empty">개인정보 권한을 불러오는 중입니다.</div></td></tr></tbody></table></div></main><div id="loadingOverlay" class="loading-overlay" aria-hidden="true"><div class="loading-card"><div class="spinner"></div><div id="loadingTitle" class="loading-title">개인정보 권한 확인 중입니다</div><div id="loadingSub" class="loading-sub">잠시만 기다려주세요.</div></div></div><div id="toast" class="toast">알림</div>
<script>
  const API="https://script.google.com/macros/s/AKfycbzE5SDb4aYv5MtyUCP1r0sAp24wBEfWbySKRQXxpuiLrv6irwSbG4L8ABSNWZY8pEvX/exec";let rows=[],busy=false;
  document.addEventListener("DOMContentLoaded",function(){AttendanceApp.Theme.init();if(!AttendanceApp.Session.require("/admin/login/","/admin/privacy-permissions/"))return;loadData(false)});
  function params(action){const p=new URLSearchParams({action:action,_ts:String(Date.now())});AttendanceApp.Session.addAuthParams(p);AttendanceApp.addClientParams(p);return p}
  async function loadData(showToast){if(busy)return;busy=true;AttendanceApp.UI.loading("개인정보 권한 확인 중입니다","학생계정별 동의 기록을 불러옵니다.");try{const result=await AttendanceApp.jsonp(AttendanceApp.apiUrl(API,params("adminPrivacyPermissionsJsonp")),{timeoutMs:30000});if(AttendanceApp.Session.isUnauthorizedResponse(result)){AttendanceApp.Session.clear();location.replace("/admin/login/?next=/admin/privacy-permissions/");return}if(!result||!result.ok)throw new Error(result&&result.message||"권한 기록을 불러오지 못했습니다.");rows=Array.isArray(result.permissions)?result.permissions:[];render();if(showToast)AttendanceApp.UI.toast("개인정보 권한을 새로고침했습니다.")}catch(error){document.getElementById("body").innerHTML='<tr><td colspan="13"><div class="empty">'+AttendanceApp.UI.escapeHtml(error.message||String(error))+'</div></td></tr>';AttendanceFailover.report({errorType:"ADMIN_PRIVACY_LOAD_FAILED",message:error.message||String(error),fallbackUrl:"/admin/system-health/"})}finally{busy=false;AttendanceApp.UI.stopLoading()}}
  function yes(value){return value===true||value===1||value==="1"||String(value).toLowerCase()==="true"}
  function pill(value){return '<span class="pill '+(yes(value)?"ok":"bad")+'">'+(yes(value)?"동의":"미동의")+'</span>'}
  function statusPill(value){const s=String(value||"MISSING").toUpperCase(),cls=s==="ACTIVE"?"ok":s==="WITHDRAWN"?"bad":"wait";return '<span class="pill '+cls+'">'+AttendanceApp.UI.escapeHtml(s)+"</span>"}
  function render(){const q=document.getElementById("search").value.trim().toLowerCase(),filtered=q?rows.filter(function(x){return [x.name,x.studentId,x.fingerId].join(" ").toLowerCase().includes(q)}):rows;const active=rows.filter(x=>String(x.status||"").toUpperCase()==="ACTIVE"&&yes(x.requiredAccepted)).length,withdrawn=rows.filter(x=>String(x.status||"").toUpperCase()==="WITHDRAWN").length;document.getElementById("total").textContent=rows.length;document.getElementById("active").textContent=active;document.getElementById("missing").textContent=Math.max(0,rows.length-active-withdrawn);document.getElementById("withdrawn").textContent=withdrawn;document.getElementById("body").innerHTML=filtered.length?filtered.map(function(x){return '<tr><td><strong>'+AttendanceApp.UI.escapeHtml(x.name||"-")+'</strong></td><td>'+AttendanceApp.UI.escapeHtml(x.studentId||"-")+'</td><td>'+AttendanceApp.UI.escapeHtml(x.fingerId||"-")+'</td><td>'+statusPill(x.status)+'</td><td>'+pill(x.requiredAccepted)+'</td><td>'+pill(x.locationRequired)+'</td><td>'+pill(x.pushOptional)+'</td><td>'+pill(x.diagnosticsOptional)+'</td><td>'+pill(x.updatesOptional)+'</td><td>'+pill(x.rememberOptional)+'</td><td>'+pill(x.backgroundLocationOptional)+'</td><td>'+AttendanceApp.UI.escapeHtml((x.ageBand||"-")+(yes(x.guardianConfirmed)?" · 대리인 확인":""))+'</td><td>'+AttendanceApp.UI.escapeHtml(x.consentedAt||x.updatedAt||"-")+'</td></tr>'}).join(""):'<tr><td colspan="13"><div class="empty">표시할 권한 기록이 없습니다.</div></td></tr>'}
</script></body></html>
