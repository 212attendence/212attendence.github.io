<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <base href="/"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow,noarchive"><title>시스템 상태 · 2-12 출석</title>
  <link rel="manifest" href="/admin/manifest.json?v=30"><link rel="icon" href="/favicon.png?v=30"><link rel="apple-touch-icon" href="/favicon.png?v=30"><meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)"><meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin><link rel="stylesheet" href="/admin/assets/app.css?v=21"><script src="/admin/assets/app.js?v=30" defer></script><script src="/assets/resilience.js?v=1" defer></script>
  <style>:root{--green:#277a4d;--orange:#ad661f;--red:#b6423a;--blue:#315f84}html[data-theme="dark"]{--green:#77c495;--orange:#dda164;--red:#e47e76;--blue:#8ab6d8}.health-card{width:min(980px,100%)}.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}.summary{padding:15px;border:1px solid var(--line);border-radius:18px;background:var(--surface-soft)}.summary span{color:var(--muted);font-size:11px;font-weight:800}.summary strong{display:block;margin-top:6px;font-size:22px}.panel{margin-top:14px;border:1px solid var(--line);border-radius:20px;overflow:hidden}.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface-soft)}.panel-head strong{font-size:15px}.list{display:grid}.row{display:grid;grid-template-columns:150px 120px 1fr 150px;gap:10px;padding:12px 15px;border-top:1px solid var(--line);font-size:12px}.row small{color:var(--muted);line-height:1.5}.pill{display:inline-flex;padding:5px 8px;border-radius:999px;background:color-mix(in srgb,var(--orange) 13%,transparent);color:var(--orange);font-size:10px;font-weight:900}.empty{padding:28px;text-align:center;color:var(--muted);font-size:12px}.server-box{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:15px}.server-state{font-weight:900}.server-detail{margin-top:4px;color:var(--muted);font-size:11px}@media(max-width:760px){.summary-grid{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.health-card{padding:17px}}</style>
</head>
<body class="auth-page"><main class="auth-card health-card"><div class="brand-chip">관리자 · 복구 시스템</div><h1>시스템 상태 및 백업 알림</h1><p class="subtext">Apps Script, Android 배포 설정과 학생 화면에서 작동한 자동 백업 기록을 확인합니다.</p><section class="summary-grid"><article class="summary"><span>서버 상태</span><strong id="serverSummary">확인 중</strong></article><article class="summary"><span>최근 24시간 오류</span><strong id="error24">-</strong></article><article class="summary"><span>백업 이동</span><strong id="fallbackCount">-</strong></article><article class="summary"><span>Android 버전</span><strong id="appVersion">-</strong></article></section><section class="panel"><div class="panel-head"><strong>서버 연결</strong><button class="btn btn-soft" type="button" onclick="refreshAll()">새로고침</button></div><div class="server-box"><div><div id="serverState" class="server-state">확인 중입니다.</div><div id="serverDetail" class="server-detail">Apps Script 응답을 기다립니다.</div></div><span id="serverPill" class="pill">CHECK</span></div></section><section class="panel"><div class="panel-head"><strong>최근 백업·오류 알림</strong><span id="eventStatus">불러오는 중</span></div><div id="eventList" class="list"><div class="empty">기록을 확인하고 있습니다.</div></div></section><div class="actions-stack"><a class="btn btn-primary btn-block" href="/admin/app-release/">Android 앱 배포 현황</a><a class="btn btn-soft btn-block" href="/admin/privacy-permissions/">학생 개인정보 권한</a><a class="btn btn-soft btn-block" href="/admin/dashboard/?resume=1">관리자 대시보드</a></div></main><div id="loadingOverlay" class="loading-overlay" aria-hidden="true"><div class="loading-card"><div class="spinner"></div><div id="loadingTitle" class="loading-title">시스템 상태 확인 중입니다</div><div id="loadingSub" class="loading-sub">잠시만 기다려주세요.</div></div></div><div id="toast" class="toast">알림</div>
<script>
  const API="https://script.google.com/macros/s/AKfycbzE5SDb4aYv5MtyUCP1r0sAp24wBEfWbySKRQXxpuiLrv6irwSbG4L8ABSNWZY8pEvX/exec";let busy=false;
  document.addEventListener("DOMContentLoaded",function(){AttendanceApp.Theme.init();if(!AttendanceApp.Session.require("/admin/login/","/admin/system-health/"))return;refreshAll()});
  function params(action){const p=new URLSearchParams({action:action,_ts:String(Date.now())});AttendanceApp.Session.addAuthParams(p);AttendanceApp.addClientParams(p);return p}
  async function api(action,timeout){const result=await AttendanceApp.jsonp(AttendanceApp.apiUrl(API,params(action)),{timeoutMs:timeout||22000});if(AttendanceApp.Session.isUnauthorizedResponse(result)){AttendanceApp.Session.clear();location.replace("/admin/login/?next=/admin/system-health/");throw new Error("관리자 로그인이 필요합니다.")}if(!result||!result.ok)throw new Error(result&&result.message||"요청 실패");return result}
  async function refreshAll(){if(busy)return;busy=true;AttendanceApp.UI.loading("시스템 상태 확인 중입니다","서버와 최근 복구 기록을 확인합니다.");try{await Promise.allSettled([checkServer(),loadEvents(),loadRelease()])}finally{busy=false;AttendanceApp.UI.stopLoading()}}
  async function checkServer(){try{const ping=await AttendanceApp.jsonp(AttendanceApp.apiUrl(API,new URLSearchParams({action:"ping",_ts:String(Date.now())})),{timeoutMs:15000});document.getElementById("serverSummary").textContent="정상";document.getElementById("serverState").textContent="Apps Script 서버 응답 정상";document.getElementById("serverDetail").textContent="버전 "+String(ping&&ping.version||"확인 안 됨")+" · "+new Date().toLocaleTimeString("ko-KR");document.getElementById("serverPill").textContent="ONLINE"}catch(error){document.getElementById("serverSummary").textContent="오류";document.getElementById("serverState").textContent="Apps Script 서버 연결 실패";document.getElementById("serverDetail").textContent=error.message||String(error);document.getElementById("serverPill").textContent="OFFLINE"}}
  async function loadEvents(){try{const result=await api("adminFallbackEventsJsonp",25000),events=Array.isArray(result.events)?result.events:[];document.getElementById("error24").textContent=Number(result.last24Hours||0);document.getElementById("fallbackCount").textContent=events.length;document.getElementById("eventStatus").textContent=events.length+"건";document.getElementById("eventList").innerHTML=events.length?events.map(function(e){return '<div class="row"><div><strong>'+AttendanceApp.UI.escapeHtml(formatDate(e.createdAt))+'</strong><br><small>'+AttendanceApp.UI.escapeHtml(e.studentName||e.studentId||"비로그인")+'</small></div><div><span class="pill">'+AttendanceApp.UI.escapeHtml(e.errorType||"UNKNOWN")+'</span></div><div><strong>'+AttendanceApp.UI.escapeHtml(e.message||"-")+'</strong><br><small>'+AttendanceApp.UI.escapeHtml(e.sourcePage||"-")+'</small></div><div><small>백업: '+AttendanceApp.UI.escapeHtml(e.fallbackUrl||"-")+'<br>'+AttendanceApp.UI.escapeHtml(e.deviceName||"")+'</small></div></div>'}).join(""):'<div class="empty">최근 백업 작동 기록이 없습니다.</div>'}catch(error){document.getElementById("eventStatus").textContent="불러오기 실패";document.getElementById("eventList").innerHTML='<div class="empty">'+AttendanceApp.UI.escapeHtml(error.message||String(error))+'</div>'}}
  async function loadRelease(){try{const response=await fetch("/student/app/android/release.json?_="+Date.now(),{cache:"no-store"});if(!response.ok)throw new Error("release.json 오류");const data=await response.json();document.getElementById("appVersion").textContent="v"+(data.version||"-")}catch(error){document.getElementById("appVersion").textContent="확인 실패"}}
  function formatDate(value){const d=new Date(value);return Number.isFinite(d.getTime())?d.toLocaleString("ko-KR"):String(value||"-")}
</script></body></html>
