<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <base href="/">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow,noarchive">
  <title>Android 앱 배포 · 2-12 출석</title>
  <link rel="manifest" href="/admin/manifest.json?v=30"><link rel="icon" href="/favicon.png?v=30"><link rel="apple-touch-icon" href="/favicon.png?v=30">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)"><meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin><link rel="stylesheet" href="/admin/assets/app.css?v=21">
  <script src="/admin/assets/app.js?v=30" defer></script><script src="/assets/resilience.js?v=1" defer></script><script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js" defer></script>
  <style>:root{--green:#277a4d;--blue:#315f84}html[data-theme="dark"]{--green:#77c495;--blue:#8ab6d8}.release-card{width:min(780px,100%)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}.box{padding:16px;border:1px solid var(--line);border-radius:20px;background:var(--surface-soft)}.box strong{display:block;font-size:13px}.value{margin-top:6px;font-size:19px;font-weight:900;word-break:break-all}.muted{margin-top:5px;color:var(--muted);font-size:11px;line-height:1.55}.changes{margin:10px 0 0;padding-left:20px;color:var(--muted);font-size:12px;line-height:1.7}.qr-wrap{display:grid;place-items:center;min-height:230px}.qr-wrap canvas{max-width:210px!important;width:100%!important;height:auto!important;border-radius:12px}.status{margin-top:14px;padding:12px;border:1px solid var(--line);border-radius:15px;background:var(--surface-soft);font-size:12px;font-weight:800}@media(max-width:620px){.grid{grid-template-columns:1fr}}</style>
</head>
<body class="auth-page"><main class="auth-card release-card"><div class="brand-chip">관리자 · 앱 배포</div><h1>Android 앱 배포 현황</h1><p class="subtext">현재 학생 다운로드 페이지가 사용하는 APK 버전과 Expo 빌드를 확인합니다.</p><div id="status" class="status">배포 정보를 불러오는 중입니다.</div><div class="grid"><section class="box"><strong>현재 버전</strong><div id="version" class="value">-</div><div id="versionMeta" class="muted">-</div></section><section class="box"><strong>Expo 빌드 ID</strong><div id="buildId" class="value">-</div><div id="required" class="muted">-</div></section><section class="box"><strong>배포 공지</strong><div id="notice" class="value" style="font-size:15px">-</div><ul id="changes" class="changes"></ul></section><section class="box"><strong>학생 다운로드 QR</strong><div class="qr-wrap"><canvas id="qr"></canvas></div></section></div><div class="actions-stack"><button class="btn btn-primary btn-block" type="button" onclick="copyStudentLink()">학생 다운로드 링크 복사</button><a class="btn btn-soft btn-block" href="/student/app/android/" target="_blank" rel="noopener">학생 다운로드 페이지 열기</a><a id="fallbackBtn" class="btn btn-soft btn-block" href="#" target="_blank" rel="noopener">Expo 백업 페이지 열기</a><a class="btn btn-soft btn-block" href="/student/check/" target="_blank" rel="noopener">학생 기기 점검 페이지</a><a class="btn btn-soft btn-block" href="/admin/system-health/">시스템 상태</a><a class="btn btn-soft btn-block" href="/admin/dashboard/?resume=1">관리자 대시보드</a></div></main><div id="toast" class="toast">알림</div>
<script>
  let release=null;const STUDENT_URL=location.origin+"/student/app/android/";
  document.addEventListener("DOMContentLoaded",async function(){AttendanceApp.Theme.init();if(!AttendanceApp.Session.require("/admin/login/","/admin/app-release/"))return;try{const response=await fetch("/student/app/android/release.json?_="+Date.now(),{cache:"no-store"});if(!response.ok)throw new Error("release.json을 불러오지 못했습니다.");release=await response.json();render()}catch(error){document.getElementById("status").textContent="배포 정보 확인 실패 · "+(error.message||error);AttendanceFailover.report({errorType:"ADMIN_RELEASE_CONFIG_FAILED",message:error.message||String(error),fallbackUrl:"/admin/system-health/"})}});
  function render(){document.getElementById("status").textContent="배포 설정 정상 · "+new Date().toLocaleTimeString("ko-KR");document.getElementById("version").textContent="v"+(release.version||"-")+" ("+(release.versionCode||"-")+")";document.getElementById("versionMeta").textContent="배포일 "+new Date(release.releasedAt).toLocaleString("ko-KR");document.getElementById("buildId").textContent=release.buildId||"-";document.getElementById("required").textContent=release.required?"필수 업데이트":"선택 업데이트";document.getElementById("notice").textContent=release.notice||"공지 없음";document.getElementById("changes").innerHTML=(release.changes||[]).map(function(x){return "<li>"+AttendanceApp.UI.escapeHtml(x)+"</li>"}).join("");document.getElementById("fallbackBtn").href=release.fallbackUrl||"#";if(window.QRCode&&QRCode.toCanvas)QRCode.toCanvas(document.getElementById("qr"),STUDENT_URL,{width:210,margin:1},function(error){if(error)document.getElementById("status").textContent+=" · QR 생성 실패"});else document.getElementById("status").textContent+=" · QR 라이브러리 미로드"}
  async function copyStudentLink(){try{await navigator.clipboard.writeText(STUDENT_URL);AttendanceApp.UI.toast("학생 다운로드 링크를 복사했습니다.")}catch(error){AttendanceApp.UI.toast("복사하지 못했습니다. 주소창 링크를 사용하세요.",4200)}}
</script></body></html>
