<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>패스키 설정</title>
  <link rel="manifest" href="../manifest.json?v=12">
  <link rel="icon" href="../favicon.png?v=12">
  <link rel="apple-touch-icon" href="../favicon.png?v=12">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin>
  <link rel="stylesheet" href="../assets/app.css?v=12">
  <script src="../assets/app.js?v=12" defer></script>
  <style>
    .check-list{margin:16px 0 0;padding:0;list-style:none;display:grid;gap:9px}.check-list li{position:relative;padding-left:20px;color:var(--muted);font-size:13px;line-height:1.55;font-weight:650}.check-list li::before{content:"✓";position:absolute;left:0;color:var(--success);font-weight:900}.device-card{margin-top:14px;padding:14px;border:1px solid var(--line);border-radius:18px;background:var(--surface-soft)}
  </style>
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand-chip">2-12 로그인 보안</div>
    <h1 id="pageTitle">패스키 설정</h1>
    <p id="pageSub" class="subtext">이 기기에 안전한 로그인 방법을 등록합니다.</p>

    <div id="supportState" class="status-box">기기 인증 지원 여부를 확인하는 중입니다.</div>
    <div class="device-card">
      <div class="info-row"><span class="info-label">등록 기기</span><span id="deviceName" class="info-value">확인 중</span></div>
      <div class="info-row"><span class="info-label">현재 상태</span><span id="registrationState" class="info-value">미등록</span></div>
    </div>

    <ul class="check-list">
      <li>얼굴·지문 정보는 웹사이트나 Google Sheets로 전송되지 않습니다.</li>
      <li>공개키만 서버에 저장되며 기기 안의 개인키는 외부로 나오지 않습니다.</li>
      <li>기기를 초기화하거나 운영체제에서 패스키를 삭제하면 다시 등록해야 합니다.</li>
    </ul>

    <div class="actions-stack">
      <button id="registerBtn" class="btn btn-primary btn-block" type="button" onclick="registerPasskey()">패스키 등록 시작</button>
      <button class="btn btn-soft btn-block" type="button" onclick="location.href='../dashboard/'">대시보드로 돌아가기</button>
      <a class="link-button" href="../?help=1">도움말</a>
    </div>
  </main>

  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-card"><div class="spinner"></div><div id="loadingTitle" class="loading-title">등록 준비 중입니다</div><div id="loadingSub" class="loading-sub">잠시만 기다려주세요.</div></div>
  </div>
  <div id="toast" class="toast">알림</div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzE5SDb4aYv5MtyUCP1r0sAp24wBEfWbySKRQXxpuiLrv6irwSbG4L8ABSNWZY8pEvX/exec";
    let registering = false;

    document.addEventListener("DOMContentLoaded", function () {
      AttendanceApp.Theme.init();
      if (!AttendanceApp.Session.require("../login/", "/setup-login-method/")) return;
      setDeviceCopy();
      checkSupport();
    });

    function setDeviceCopy() {
      const device = AttendanceApp.Passkey.deviceInfo();
      document.getElementById("pageTitle").textContent = device.title + " 설정";
      document.getElementById("pageSub").textContent = device.hint + "을 이 사이트의 패스키로 등록합니다.";
      document.getElementById("deviceName").textContent = device.name;
      document.getElementById("registrationState").textContent = AttendanceApp.Passkey.isRegistered() ? "등록됨" : "미등록";
      document.getElementById("registerBtn").textContent = AttendanceApp.Passkey.isRegistered() ? device.title + " 다시 등록" : device.title + " 등록 시작";
    }

    async function checkSupport() {
      const state = document.getElementById("supportState");
      const button = document.getElementById("registerBtn");
      if (!AttendanceApp.Passkey.supported()) {
        state.className = "status-box danger";
        state.textContent = "이 브라우저에서는 패스키 기기 인증을 지원하지 않습니다.";
        button.disabled = true;
        return;
      }

      try {
        if (PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) {
          const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
          if (!available) {
            state.className = "status-box danger";
            state.textContent = "사용 가능한 생체인식 또는 화면 잠금 인증이 없습니다.";
            button.disabled = true;
            return;
          }
        }
        state.className = "status-box success";
        state.textContent = AttendanceApp.Passkey.isRegistered()
          ? "이 기기에 패스키가 등록되어 있습니다. 필요하면 다시 등록할 수 있습니다."
          : "이 기기는 내장 인증기를 사용한 패스키 등록을 지원합니다.";
      } catch (error) {
        state.className = "status-box";
        state.textContent = "기기 인증을 지원합니다. 등록 버튼을 눌러 계속하세요.";
      }
    }

    async function registerPasskey() {
      if (registering) return;
      if (!AttendanceApp.Passkey.supported()) {
        AttendanceApp.UI.toast("이 브라우저는 기기 인증을 지원하지 않습니다.");
        return;
      }

      registering = true;
      document.getElementById("registerBtn").disabled = true;
      AttendanceApp.UI.loading("등록 요청 생성 중입니다", "안전한 패스키 등록 요청을 준비합니다.");

      try {
        const device = AttendanceApp.Passkey.deviceInfo();
        const optionParams = new URLSearchParams({
          action: "passkeyRegisterOptionsJsonp",
          origin: location.origin,
          hostname: location.hostname,
          deviceName: device.name,
          userAgent: navigator.userAgent || ""
        });
        AttendanceApp.Session.addAuthParams(optionParams);
        const optionResponse = await AttendanceApp.jsonp(AttendanceApp.apiUrl(APPS_SCRIPT_URL, optionParams));
        if (!optionResponse || !optionResponse.ok) {
          if (AttendanceApp.Session.isUnauthorizedResponse(optionResponse)) {
            AttendanceApp.Session.clear();
            location.replace("../login/?next=/setup-login-method/");
            return;
          }
          throw new Error(optionResponse && optionResponse.message || "패스키 등록 요청을 만들지 못했습니다.");
        }

        const source = optionResponse.publicKey || optionResponse.options || optionResponse.data;
        if (!source || !source.challenge || !source.user || !source.user.id) throw new Error("기기 인증 등록 요청 형식이 올바르지 않습니다.");

        AttendanceApp.UI.stopLoading();
        const credential = await navigator.credentials.create({ publicKey: normalizeCreationOptions(source) });
        if (!credential) throw new Error("기기 인증 등록 결과를 받지 못했습니다.");

        AttendanceApp.UI.loading("등록 정보 확인 중입니다", "공개키를 저장하고 등록을 완료합니다.");
        const verifyParams = new URLSearchParams({
          action: "passkeyRegisterVerifyJsonp",
          requestId: optionResponse.requestId || optionResponse.challengeId || "",
          credential: JSON.stringify(serializeAttestation(credential)),
          origin: location.origin,
          hostname: location.hostname,
          deviceName: device.name,
          userAgent: navigator.userAgent || ""
        });
        AttendanceApp.Session.addAuthParams(verifyParams);
        const verifyResponse = await AttendanceApp.jsonp(AttendanceApp.apiUrl(APPS_SCRIPT_URL, verifyParams));
        if (!verifyResponse || !verifyResponse.ok) throw new Error(verifyResponse && verifyResponse.message || "패스키 등록 검증에 실패했습니다.");

        AttendanceApp.Passkey.save(credential.id || "", device.name);
        setDeviceCopy();
        AttendanceApp.UI.stopLoading();
        AttendanceApp.UI.toast("패스키 등록이 완료되었습니다.");
        setTimeout(function () { location.replace("../dashboard/"); }, 800);
      } catch (error) {
        AttendanceApp.UI.stopLoading();
        AttendanceApp.UI.toast(error && error.name === "NotAllowedError" ? "패스키 등록이 취소되었습니다." : error && error.message || String(error));
      } finally {
        registering = false;
        document.getElementById("registerBtn").disabled = false;
      }
    }

    function normalizeCreationOptions(source) {
      const result = Object.assign({}, source, {
        challenge: AttendanceApp.base64UrlToBytes(source.challenge),
        user: Object.assign({}, source.user, { id: AttendanceApp.base64UrlToBytes(source.user.id) })
      });
      if (Array.isArray(source.excludeCredentials)) {
        result.excludeCredentials = source.excludeCredentials.map(function (item) {
          return Object.assign({}, item, { id: AttendanceApp.base64UrlToBytes(item.id) });
        });
      }
      return result;
    }

    function serializeAttestation(credential) {
      return {
        id: credential.id,
        rawId: AttendanceApp.bytesToBase64Url(credential.rawId),
        type: credential.type,
        response: {
          clientDataJSON: AttendanceApp.bytesToBase64Url(credential.response.clientDataJSON),
          attestationObject: AttendanceApp.bytesToBase64Url(credential.response.attestationObject),
          transports: credential.response.getTransports ? credential.response.getTransports() : []
        },
        clientExtensionResults: credential.getClientExtensionResults ? credential.getClientExtensionResults() : {}
      };
    }
  </script>
</body>
</html>
