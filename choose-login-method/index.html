<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>로그인 방법 선택</title>
  <link rel="manifest" href="../manifest.json?v=8" />
  <link rel="icon" type="image/png" href="../favicon.png?v=8" />
  <link rel="apple-touch-icon" href="../favicon.png?v=8" />
  <meta name="theme-color" content="#fafaf8" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    :root { --bg:#fafaf8; --card:#fffefb; --text:#1f2320; --muted:#74746e; --line:rgba(92,92,84,.18); --accent:#3f403a; --shadow:0 18px 50px rgba(31,35,32,.07); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:var(--bg); color:var(--text); font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif; }
    .card { width:min(460px,100%); padding:28px; border:1px solid var(--line); border-radius:28px; background:var(--card); box-shadow:var(--shadow); }
    h1 { margin:0; font-size:29px; letter-spacing:-.055em; font-weight:950; }
    p { margin:10px 0 22px; color:var(--muted); line-height:1.6; font-size:14px; font-weight:700; }
    .options { display:grid; gap:12px; }
    .option { width:100%; min-height:76px; display:flex; align-items:center; justify-content:space-between; gap:14px; padding:16px 17px; border:1px solid var(--line); border-radius:18px; background:#fff; color:var(--text); cursor:pointer; text-align:left; font-family:inherit; }
    .option strong { display:block; font-size:15px; font-weight:950; }
    .option small { display:block; margin-top:5px; color:var(--muted); font-size:12px; line-height:1.45; font-weight:700; }
    .option.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .option.primary small { color:rgba(255,255,255,.72); }
    .arrow { font-size:24px; opacity:.75; }
    .skip { width:100%; margin-top:16px; border:0; background:transparent; color:var(--muted); font:850 13px inherit; cursor:pointer; }
    .note { margin-top:14px; padding:12px 13px; border-radius:14px; background:#f1f0ec; color:var(--muted); font-size:12px; line-height:1.55; font-weight:700; }
    @media (max-width:560px) { body { padding:14px; align-items:start; padding-top:max(34px,env(safe-area-inset-top)); } .card { padding:24px 20px; border-radius:24px; } h1 { font-size:27px; } }
  </style>
</head>
<body>
  <main class="card">
    <h1>로그인 방법 선택</h1>
    <p>이 기기에서 앞으로 사용할 인증 방법을 선택하세요.</p>

    <div class="options">
      <button class="option primary" type="button" onclick="location.href='../setup-login-method/'">
        <span><strong id="primaryTitle">기기 인증 설정</strong><small id="primarySub">Face ID, Touch ID, Windows Hello 또는 기기 PIN을 등록합니다.</small></span>
        <span class="arrow">›</span>
      </button>
      <button class="option" type="button" onclick="location.href='../dashboard/'">
        <span><strong>지금은 설정하지 않기</strong><small>현재 로그인으로 대시보드에 들어갑니다. 나중에 도움말에서 설정할 수 있습니다.</small></span>
        <span class="arrow">›</span>
      </button>
    </div>

    <button class="skip" type="button" onclick="logoutAndBack()">다른 계정으로 다시 로그인</button>
    <div class="note">기기 인증 등록이 완료되면 다음 접속부터 로그인 페이지를 열자마자 Face ID·Touch ID·Windows Hello가 실행됩니다.</div>
  </main>

  <script>
    function hasSession() {
      return !!(sessionStorage.getItem("sessionToken") || sessionStorage.getItem("adminId"));
    }

    function setDeviceText() {
      const ua = navigator.userAgent || "";
      const title = document.getElementById("primaryTitle");
      const sub = document.getElementById("primarySub");
      if (/Windows/i.test(ua)) {
        title.textContent = "Windows Hello 설정";
        sub.textContent = "얼굴, 지문 또는 Windows Hello PIN을 등록합니다.";
      } else if (/iPhone|iPad|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)) {
        title.textContent = "Face ID 설정";
        sub.textContent = "Face ID, Touch ID 또는 기기 암호를 등록합니다.";
      } else if (/Macintosh|Mac OS X/i.test(ua)) {
        title.textContent = "Touch ID 설정";
        sub.textContent = "Touch ID 또는 Mac 로그인 암호를 등록합니다.";
      } else if (/Android/i.test(ua)) {
        title.textContent = "기기 인증 설정";
        sub.textContent = "지문, 얼굴 또는 화면 잠금 PIN을 등록합니다.";
      }
    }

    function logoutAndBack() {
      sessionStorage.clear();
      location.replace("../login/");
    }

    document.addEventListener("DOMContentLoaded", function () {
      if (!hasSession()) {
        sessionStorage.setItem("postLoginRoute", "/choose-login-method/");
        location.replace("../login/?next=/choose-login-method/");
        return;
      }
      if (localStorage.getItem("attendancePasskeyRegistered") === "1") {
        location.replace("../dashboard/");
        return;
      }
      setDeviceText();
    });
  </script>
</body>
</html>
