<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>2-12 Attendance Dashboard</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f3f5f8;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header .sub {
      font-size: 13px;
      color: #cbd5e1;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: #2563eb;
      color: white;
    }

    button.secondary {
      background: #475569;
    }

    button.danger {
      background: #dc2626;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      margin-bottom: 16px;
    }

    .login-card {
      max-width: 420px;
      margin: 80px auto;
    }

    .field {
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .stat {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .stat .label {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 30px;
      font-weight: 800;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      background: #e5e7eb;
      color: #374151;
    }

    .pill.online {
      background: #dcfce7;
      color: #166534;
    }

    .pill.offline {
      background: #fee2e2;
      color: #991b1b;
    }

    .pill.출석 {
      background: #dcfce7;
      color: #166534;
    }

    .pill.지각 {
      background: #fef3c7;
      color: #92400e;
    }

    .pill.오류,
    .pill.미등록,
    .pill.비활성 {
      background: #fee2e2;
      color: #991b1b;
    }

    .pill.중복 {
      background: #e0e7ff;
      color: #3730a3;
    }

    .pill.테스트 {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .pill.미인식 {
      background: #f1f5f9;
      color: #334155;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .event {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .event-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .event-name {
      font-size: 20px;
      font-weight: 900;
    }

    .event-meta {
      color: #475569;
      line-height: 1.5;
      font-size: 14px;
    }

    .small {
      color: #64748b;
      font-size: 13px;
    }

    .mono {
      font-family: Consolas, Monaco, monospace;
      font-size: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 8px;
      border-radius: 10px;
      overflow-wrap: anywhere;
    }

    .hidden {
      display: none !important;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .right-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 18px;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .modal h3 {
      margin-top: 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <div id="loginPage" class="wrap">
    <div class="card login-card">
      <h2>2-12 출석 대시보드</h2>
      <p class="small">관리자 로그인 후 오늘 출석 로그를 불러옵니다.</p>

      <div class="field">
        <input id="adminId" placeholder="관리자 ID" autocomplete="username" />
      </div>

      <div class="field">
        <input id="adminPw" type="password" placeholder="관리자 비밀번호" autocomplete="current-password" />
      </div>

      <button id="loginBtn" onclick="login()">로그인</button>

      <p id="loginMsg" class="small"></p>
    </div>
  </div>

  <div id="dashboardPage" class="hidden">
    <header>
      <div>
        <h1>2-12 출석 대시보드</h1>
        <div class="sub" id="headerSub">오늘 로그 + 실시간 MQTT</div>
      </div>

      <div class="right-actions">
        <button class="secondary" onclick="loadTodayLogs()">오늘 로그 새로고침</button>
        <button class="secondary" onclick="openSettings()">MQTT 설정</button>
        <button class="danger" onclick="logout()">로그아웃</button>
      </div>
    </header>

    <div class="wrap">
      <div class="card">
        <div class="toolbar">
          <div class="status-row">
            <span>MQTT</span>
            <span id="mqttStatus" class="pill offline">OFFLINE</span>

            <span>ESP32</span>
            <span id="espStatus" class="pill offline">UNKNOWN</span>

            <span id="todayLabel" class="pill">오늘</span>
          </div>

          <div class="small" id="lastHeartbeat">heartbeat 없음</div>
        </div>

        <div class="mono" id="systemLog">시스템 준비</div>
      </div>

      <div class="grid">
        <div class="stat">
          <div class="label">오늘 전체 로그</div>
          <div class="value" id="statTotal">0</div>
        </div>

        <div class="stat">
          <div class="label">출석</div>
          <div class="value" id="statPresent">0</div>
        </div>

        <div class="stat">
          <div class="label">지각</div>
          <div class="value" id="statLate">0</div>
        </div>

        <div class="stat">
          <div class="label">오류/미인식</div>
          <div class="value" id="statError">0</div>
        </div>
      </div>

      <div class="grid-2" style="margin-top:16px;">
        <div class="card">
          <div class="toolbar">
            <h3 style="margin:0;">오늘 출석 로그</h3>
            <span class="small" id="logCount">0개</span>
          </div>

          <div id="todayLogs" class="event-list"></div>
        </div>

        <div class="card">
          <div class="toolbar">
            <h3 style="margin:0;">실시간 수신 이벤트</h3>
            <span class="small">사이트가 켜진 이후</span>
          </div>

          <div id="liveEvents" class="event-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal-bg">
    <div class="modal">
      <h3>MQTT 설정</h3>

      <div class="field">
        <label class="small">WebSocket URL</label>
        <input id="mqttUrlInput" />
      </div>

      <div class="field">
        <label class="small">MQTT Username</label>
        <input id="mqttUserInput" />
      </div>

      <div class="field">
        <label class="small">MQTT Password</label>
        <input id="mqttPassInput" type="password" />
      </div>

      <div class="field">
        <label class="small">Status Topic</label>
        <input id="topicStatusInput" />
      </div>

      <div class="field">
        <label class="small">Event Topic</label>
        <input id="topicEventInput" />
      </div>

      <div class="field">
        <label class="small">Heartbeat Topic</label>
        <input id="topicHeartbeatInput" />
      </div>

      <div class="modal-actions">
        <button class="secondary" onclick="closeSettings()">닫기</button>
        <button onclick="saveSettings()">저장 후 재연결</button>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_ADMIN_URL =
      "https://script.google.com/macros/s/AKfycbzE5SDb4aYv5MtyUCP1r0sAp24wBEfWbySKRQXxpuiLrv6irwSbG4L8ABSNWZY8pEvX/exec";

    const DEFAULT_MQTT = {
      url: "wss://793e777e3e64408cafd9c5b413d3bd16.s1.eu.hivemq.cloud:8884/mqtt",
      user: "jiukeum",
      pass: "",
      topicStatus: "attendance/2-12/status",
      topicEvent: "attendance/2-12/event",
      topicHeartbeat: "attendance/2-12/heartbeat"
    };

    let currentAdmin = null;
    let mqttClient = null;
    let mqttConfig = loadSettings();

    let todayLogs = [];
    let liveEvents = [];

    function $(id) {
      return document.getElementById(id);
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function logSystem(msg) {
      const time = new Date().toLocaleTimeString("ko-KR");
      $("systemLog").textContent = "[" + time + "] " + msg;
    }

    function loadSettings() {
      const raw = localStorage.getItem("attendance_mqtt_settings_v2");

      if (!raw) {
        return { ...DEFAULT_MQTT };
      }

      try {
        return { ...DEFAULT_MQTT, ...JSON.parse(raw) };
      } catch (e) {
        return { ...DEFAULT_MQTT };
      }
    }

    function saveSettingsToStorage() {
      localStorage.setItem("attendance_mqtt_settings_v2", JSON.stringify(mqttConfig));
    }

    function openSettings() {
      $("mqttUrlInput").value = mqttConfig.url;
      $("mqttUserInput").value = mqttConfig.user;
      $("mqttPassInput").value = mqttConfig.pass;
      $("topicStatusInput").value = mqttConfig.topicStatus;
      $("topicEventInput").value = mqttConfig.topicEvent;
      $("topicHeartbeatInput").value = mqttConfig.topicHeartbeat;

      $("settingsModal").style.display = "flex";
    }

    function closeSettings() {
      $("settingsModal").style.display = "none";
    }

    function saveSettings() {
      mqttConfig = {
        url: $("mqttUrlInput").value.trim(),
        user: $("mqttUserInput").value.trim(),
        pass: $("mqttPassInput").value,
        topicStatus: $("topicStatusInput").value.trim(),
        topicEvent: $("topicEventInput").value.trim(),
        topicHeartbeat: $("topicHeartbeatInput").value.trim()
      };

      saveSettingsToStorage();
      closeSettings();

      if (mqttClient) {
        try {
          mqttClient.end(true);
        } catch (e) {}
      }

      connectMQTT();
    }

    function jsonp(url, params) {
      return new Promise(function (resolve, reject) {
        const callbackName =
          "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

        params.callback = callbackName;

        const query = Object.keys(params)
          .map(function (key) {
            return encodeURIComponent(key) + "=" + encodeURIComponent(params[key]);
          })
          .join("&");

        const script = document.createElement("script");
        script.src = url + "?" + query;

        const timer = setTimeout(function () {
          cleanup();
          reject(new Error("요청 시간 초과"));
        }, 20000);

        window[callbackName] = function (data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function () {
          cleanup();
          reject(new Error("스크립트 로드 실패"));
        };

        function cleanup() {
          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        document.body.appendChild(script);
      });
    }

    async function login() {
      const adminId = $("adminId").value.trim();
      const adminPw = $("adminPw").value.trim();

      if (!adminId || !adminPw) {
        $("loginMsg").textContent = "관리자 ID와 비밀번호를 입력하세요.";
        return;
      }

      $("loginBtn").disabled = true;
      $("loginMsg").textContent = "로그인 확인 중...";

      try {
        const res = await jsonp(GOOGLE_ADMIN_URL, {
          action: "dashboardLoginJsonp",
          adminId: adminId,
          adminPw: adminPw,
          deviceName: navigator.platform || "",
          screenSize: screen.width + "x" + screen.height,
          clientTime: new Date().toLocaleString("ko-KR"),
          clientTimezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          userAgent: navigator.userAgent
        });

        if (!res.ok) {
          $("loginBtn").disabled = false;
          $("loginMsg").textContent = res.message || "로그인 실패";
          return;
        }

        currentAdmin = {
          adminId: adminId,
          adminPw: adminPw,
          role: res.role || "ADMIN"
        };

        $("loginPage").classList.add("hidden");
        $("dashboardPage").classList.remove("hidden");

        $("headerSub").textContent =
          "관리자: " + currentAdmin.adminId + " / 오늘 로그 + 실시간 MQTT";

        loadTodayLogs();
        connectMQTT();

      } catch (err) {
        $("loginBtn").disabled = false;
        $("loginMsg").textContent =
          "로그인 오류: " + err.message;
      }
    }

    function logout() {
      currentAdmin = null;

      if (mqttClient) {
        try {
          mqttClient.end(true);
        } catch (e) {}
      }

      mqttClient = null;
      todayLogs = [];
      liveEvents = [];

      $("dashboardPage").classList.add("hidden");
      $("loginPage").classList.remove("hidden");
      $("loginBtn").disabled = false;
      $("loginMsg").textContent = "";
    }

    async function loadTodayLogs() {
      if (!currentAdmin) {
        return;
      }

      logSystem("오늘 로그 불러오는 중...");

      try {
        const res = await jsonp(GOOGLE_ADMIN_URL, {
          action: "todayLogs",
          adminId: currentAdmin.adminId,
          adminPw: currentAdmin.adminPw
        });

        if (!res.ok) {
          logSystem("오늘 로그 불러오기 실패: " + (res.message || ""));
          return;
        }

        todayLogs = Array.isArray(res.logs) ? res.logs : [];

        $("todayLabel").textContent = res.date || "오늘";

        renderTodayLogs(todayLogs);
        renderSummary(res.summary || makeSummaryFromLogs(todayLogs));

        logSystem("오늘 로그 불러오기 완료: " + todayLogs.length + "개");

      } catch (err) {
        logSystem("오늘 로그 불러오기 오류: " + err.message);
      }
    }

    function connectMQTT() {
      if (!mqttConfig.pass) {
        $("mqttStatus").textContent = "PASSWORD 필요";
        $("mqttStatus").className = "pill offline";
        logSystem("MQTT 설정에서 비밀번호를 입력하세요.");
        return;
      }

      $("mqttStatus").textContent = "CONNECTING";
      $("mqttStatus").className = "pill offline";

      logSystem("MQTT 연결 시도...");

      mqttClient = mqtt.connect(mqttConfig.url, {
        username: mqttConfig.user,
        password: mqttConfig.pass,
        reconnectPeriod: 3000,
        connectTimeout: 15000,
        clean: true
      });

      mqttClient.on("connect", function () {
        $("mqttStatus").textContent = "ONLINE";
        $("mqttStatus").className = "pill online";

        logSystem("MQTT 연결 성공");

        mqttClient.subscribe(mqttConfig.topicStatus);
        mqttClient.subscribe(mqttConfig.topicEvent);
        mqttClient.subscribe(mqttConfig.topicHeartbeat);
      });

      mqttClient.on("reconnect", function () {
        $("mqttStatus").textContent = "RECONNECTING";
        $("mqttStatus").className = "pill offline";
      });

      mqttClient.on("close", function () {
        $("mqttStatus").textContent = "OFFLINE";
        $("mqttStatus").className = "pill offline";
      });

      mqttClient.on("error", function (err) {
        logSystem("MQTT 오류: " + err.message);
      });

      mqttClient.on("message", function (topic, message) {
        const text = message.toString();

        if (topic === mqttConfig.topicStatus) {
          handleStatus(text);
          return;
        }

        if (topic === mqttConfig.topicHeartbeat) {
          handleHeartbeat(text);
          return;
        }

        if (topic === mqttConfig.topicEvent) {
          handleEvent(text);
          return;
        }
      });
    }

    function handleStatus(text) {
      if (text === "online") {
        $("espStatus").textContent = "ONLINE";
        $("espStatus").className = "pill online";
      } else {
        $("espStatus").textContent = "OFFLINE";
        $("espStatus").className = "pill offline";
      }
    }

    function handleHeartbeat(text) {
      let data = null;

      try {
        data = JSON.parse(text);
      } catch (e) {
        $("lastHeartbeat").textContent = "heartbeat: " + text;
        return;
      }

      $("espStatus").textContent = "ONLINE";
      $("espStatus").className = "pill online";

      $("lastHeartbeat").textContent =
        "heartbeat / RSSI " +
        (data.rssi || "-") +
        " / fingerReady " +
        (data.fingerReady ? "YES" : "NO") +
        " / " +
        new Date().toLocaleTimeString("ko-KR");
    }

    function handleEvent(text) {
      let data = null;

      try {
        data = JSON.parse(text);
      } catch (e) {
        logSystem("MQTT 이벤트 JSON 파싱 실패");
        return;
      }

      liveEvents.unshift(data);

      if (liveEvents.length > 50) {
        liveEvents.pop();
      }

      renderLiveEvents();

      if (data && data.type === "attendance") {
        setTimeout(function () {
          loadTodayLogs();
        }, 800);
      }
    }

    function getDisplayName(item) {
      const name = String(item.name || "").trim();

      if (name) {
        return name;
      }

      const status = String(item.status || "").trim();

      if (status === "미인식") {
        return "미인식 지문";
      }

      return "미등록 사용자";
    }

    function statusClass(status) {
      const s = String(status || "").trim();

      if (s === "출석") return "출석";
      if (s === "지각") return "지각";
      if (s === "오류") return "오류";
      if (s === "중복") return "중복";
      if (s === "미인식") return "미인식";
      if (s === "미등록") return "미등록";
      if (s === "비활성") return "비활성";
      if (s === "테스트") return "테스트";

      return "";
    }

    function renderTodayLogs(logs) {
      const box = $("todayLogs");
      box.innerHTML = "";

      $("logCount").textContent = logs.length + "개";

      if (!logs.length) {
        box.innerHTML = '<div class="small">오늘 로그가 없습니다.</div>';
        return;
      }

      logs.forEach(function (log) {
        box.appendChild(createEventElement(log));
      });
    }

    function renderLiveEvents() {
      const box = $("liveEvents");
      box.innerHTML = "";

      if (!liveEvents.length) {
        box.innerHTML = '<div class="small">아직 실시간 이벤트가 없습니다.</div>';
        return;
      }

      liveEvents.forEach(function (event) {
        box.appendChild(createEventElement(event));
      });
    }

    function createEventElement(item) {
      const div = document.createElement("div");
      div.className = "event";

      const name = getDisplayName(item);
      const status = item.status || "-";
      const cls = statusClass(status);

      const timeText =
        item.time ||
        item.timestamp ||
        new Date().toLocaleTimeString("ko-KR");

      const message = item.message || "";

      div.innerHTML =
        '<div class="event-top">' +
          '<div class="event-name">' + escapeHtml(name) + '</div>' +
          '<span class="pill ' + cls + '">' + escapeHtml(status) + '</span>' +
        '</div>' +
        '<div class="event-meta">' +
          '시간: ' + escapeHtml(timeText) + '<br>' +
          '장치: ' + escapeHtml(item.deviceId || '-') + '<br>' +
          escapeHtml(message || '-') +
        '</div>';

      return div;
    }

    function renderSummary(summary) {
      $("statTotal").textContent = summary.total || 0;
      $("statPresent").textContent = summary.present || 0;
      $("statLate").textContent = summary.late || 0;

      const errorTotal =
        (summary.error || 0) +
        (summary.unknown || 0) +
        (summary.unregistered || 0) +
        (summary.inactive || 0);

      $("statError").textContent = errorTotal;
    }

    function makeSummaryFromLogs(logs) {
      const summary = {
        total: logs.length,
        present: 0,
        late: 0,
        duplicate: 0,
        error: 0,
        unknown: 0,
        unregistered: 0,
        inactive: 0,
        test: 0,
        other: 0
      };

      logs.forEach(function (log) {
        const status = String(log.status || "").trim();

        if (status === "출석") {
          summary.present++;
        } else if (status === "지각") {
          summary.late++;
        } else if (status === "중복") {
          summary.duplicate++;
        } else if (status === "오류") {
          summary.error++;
        } else if (status === "미인식") {
          summary.unknown++;
        } else if (status === "미등록") {
          summary.unregistered++;
        } else if (status === "비활성") {
          summary.inactive++;
        } else if (status === "테스트") {
          summary.test++;
        } else {
          summary.other++;
        }
      });

      return summary;
    }

    renderLiveEvents();
  </script>
</body>
</html>
