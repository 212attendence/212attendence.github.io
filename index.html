<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>2-12 출석 시스템</title>
  <link rel="manifest" href="./manifest.json?v=20">
  <link rel="icon" href="./favicon.png?v=20">
  <link rel="apple-touch-icon" href="./favicon.png?v=20">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin>
  <link rel="stylesheet" href="./assets/app.css?v=20">
  <script src="./assets/app.js?v=20" defer></script>
  <script src="./assets/student.js?v=20" defer></script>
  <style>
    :root{--admin:#3d443e;--admin-soft:rgba(61,68,62,.1);--student:#315f84;--student-soft:rgba(49,95,132,.12)}
    html[data-theme="dark"]{--admin:#d8d3c5;--admin-soft:rgba(216,211,197,.1);--student:#8ab6d8;--student-soft:rgba(138,182,216,.12)}
    body::before,body::after{content:"";position:fixed;z-index:-1;width:34rem;height:34rem;border-radius:50%;filter:blur(78px);pointer-events:none}
    body::before{left:-15rem;top:-14rem;background:var(--student-soft)}
    body::after{right:-15rem;bottom:-16rem;background:var(--admin-soft)}
    .role-card{width:min(680px,100%)}
    .role-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:20px}
    .role-option{position:relative;overflow:hidden;display:flex;min-height:210px;flex-direction:column;justify-content:space-between;padding:21px;border:1px solid var(--line);border-radius:25px;background:linear-gradient(145deg,var(--surface),var(--surface-soft));color:var(--text);text-decoration:none;box-shadow:var(--shadow-soft);transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}
    .role-option::after{content:"";position:absolute;width:145px;height:145px;right:-76px;top:-76px;border-radius:50%;background:currentColor;opacity:.055}
    .role-option.student{color:var(--student)}.role-option.admin{color:var(--admin)}
    .role-icon{display:grid;place-items:center;width:50px;height:50px;border-radius:17px;background:currentColor;color:var(--surface-strong);font-size:20px;font-weight:900}
    .role-copy{color:var(--text)}.role-copy strong{display:block;font-size:22px;letter-spacing:-.04em}.role-copy span{display:block;margin-top:7px;color:var(--muted);font-size:12px;line-height:1.55;font-weight:650}.role-arrow{align-self:flex-end;color:currentColor;font-size:26px}
    .help-links{display:flex;justify-content:center;margin-top:18px}.help-links a{color:var(--muted);font-size:12px;font-weight:800;text-decoration:none}
    @media(hover:hover) and (pointer:fine){.role-option:hover{transform:translateY(-3px);border-color:color-mix(in srgb,currentColor 32%,var(--line));box-shadow:var(--shadow)}}
    @media(max-width:620px){.role-grid{grid-template-columns:1fr}.role-option{min-height:176px}}
  </style>
</head>
<body class="auth-page">
  <main class="auth-card role-card">
    <div class="brand-chip">2-12 출석 시스템</div>
    <h1>로그인 유형을 선택하세요</h1>
    <p class="subtext">학생 출석 인증과 관리자 대시보드는 서로 다른 로그인 방식을 사용합니다.</p>
    <div class="role-grid">
      <a class="role-option student" href="./student-login/"><div class="role-icon">S</div><div class="role-copy"><strong>학생 로그인</strong><span>학생 ID와 비밀번호, 관리자 승인 후 해강중학교 위치 출석을 인증합니다.</span></div><div class="role-arrow">›</div></a>
      <a class="role-option admin" href="./login/?v=20"><div class="role-icon">A</div><div class="role-copy"><strong>관리자 로그인</strong><span>Google·관리자 계정 또는 패스키로 대시보드와 학생 승인 요청을 관리합니다.</span></div><div class="role-arrow">›</div></a>
    </div>
    <div class="help-links"><a href="./?-student">학생 도움말</a></div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded",function(){
      AttendanceApp.Theme.init();
      const params=new URLSearchParams(location.search);
      const raw=location.search.replace(/^\?/,"");

      if(raw==="-student"||params.has("-student")){
        location.replace("./student-help/"+location.hash);
        return;
      }

      if(params.get("help")!=="1")return;

      if(AttendanceApp.Session.restore()){
        location.replace("./admin-help/"+location.hash);
        return;
      }

      sessionStorage.setItem("postLoginRoute","/admin-help/"+location.hash);
      location.replace("./login/?next="+encodeURIComponent("/admin-help/"+location.hash));
    });
  </script>
</body>
</html>
