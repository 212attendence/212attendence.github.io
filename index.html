<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>2-12 출석 시스템</title>
  <link rel="manifest" href="./manifest.json?v=12">
  <link rel="icon" href="./favicon.png?v=12">
  <link rel="apple-touch-icon" href="./favicon.png?v=12">
  <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme:light)">
  <meta name="theme-color" content="#171817" media="(prefers-color-scheme:dark)">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" crossorigin>
  <link rel="stylesheet" href="./assets/app.css?v=12">
  <script src="./assets/app.js?v=12" defer></script>
  <style>
    .menu{display:grid;gap:11px}.menu-item{display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:72px;padding:15px 16px;border:1px solid var(--line);border-radius:18px;background:var(--surface-soft);color:var(--text);text-decoration:none}.menu-item strong{display:block;font-size:15px;font-weight:900}.menu-item small{display:block;margin-top:4px;color:var(--muted);font-size:12px;line-height:1.45;font-weight:650}.arrow{color:var(--muted);font-size:24px}
  </style>
</head>
<body class="auth-page">
  <main id="redirectCard" class="auth-card">
    <div class="brand-chip">2-12 출석</div>
    <h1>로그인 화면으로 이동 중</h1>
    <p class="subtext">잠시만 기다려주세요.</p>
    <div class="status-box">자동으로 이동하지 않으면 아래 버튼을 누르세요.</div>
    <div class="actions-stack"><a class="btn btn-primary btn-block" href="./login/?v=12">로그인 열기</a></div>
  </main>

  <main id="helpCard" class="auth-card hidden">
    <div class="brand-chip">도움말</div>
    <h1>무엇을 설정할까요?</h1>
    <p class="subtext">기기별 설치와 로그인 보안 설정을 안내합니다.</p>
    <div class="menu">
      <a class="menu-item" href="./home-icon-setting/">
        <span><strong>홈 화면 앱 설치</strong><small>iPhone·Android·PC에 앱처럼 설치합니다.</small></span><span class="arrow">›</span>
      </a>
      <a class="menu-item" href="./setup-login-method/">
        <span><strong>패스키 설정</strong><small>Face ID·Touch ID·Windows Hello를 등록합니다.</small></span><span class="arrow">›</span>
      </a>
      <a class="menu-item" href="./login/?v=12">
        <span><strong>로그인으로 이동</strong><small>Google 계정 또는 관리자 계정으로 로그인합니다.</small></span><span class="arrow">›</span>
      </a>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      AttendanceApp.Theme.init();
      const help = new URLSearchParams(location.search).get("help") === "1";
      if (help) {
        document.title = "도움말 · 2-12 출석";
        document.getElementById("redirectCard").classList.add("hidden");
        document.getElementById("helpCard").classList.remove("hidden");
        return;
      }
      setTimeout(function () { location.replace("./login/?v=12"); }, 120);
    });
  </script>
</body>
</html>
