<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>2-12 출석 시스템</title>
  <link rel="manifest" href="./manifest.json?v=7" />
  <link rel="icon" type="image/png" href="./favicon.png?v=7" />
  <link rel="apple-touch-icon" href="./favicon.png?v=7" />
  <meta name="theme-color" content="#fafaf8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="2-12 출석" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    :root {
      --bg:#fafaf8; --card:#fffefb; --text:#1f2320; --muted:#74746e;
      --line:rgba(92,92,84,.18); --accent:#3f403a; --accent-text:#fff;
      --shadow:0 18px 50px rgba(31,35,32,.07);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
      background:var(--bg); color:var(--text);
      font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    }
    .card {
      width:min(440px,100%); padding:30px 24px; border:1px solid var(--line);
      border-radius:28px; background:var(--card); box-shadow:var(--shadow);
    }
    h1 { margin:0; font-size:29px; letter-spacing:-.055em; font-weight:950; }
    p { margin:10px 0 22px; color:var(--muted); line-height:1.6; font-weight:700; }
    .menu { display:grid; gap:12px; }
    .menu a {
      display:flex; align-items:center; justify-content:space-between; gap:14px;
      min-height:64px; padding:15px 17px; border:1px solid var(--line);
      border-radius:17px; color:var(--text); text-decoration:none; background:#fff;
      font-weight:900;
    }
    .menu small { display:block; margin-top:4px; color:var(--muted); font-size:12px; font-weight:700; }
    .arrow { color:var(--muted); font-size:20px; }
    .back {
      display:block; width:100%; margin-top:16px; border:0; background:transparent;
      color:var(--muted); font:850 13px inherit; cursor:pointer;
    }
    .loading { text-align:center; color:var(--muted); font-weight:800; }
    .spinner {
      width:38px; height:38px; margin:0 auto 14px; border-radius:50%;
      border:4px solid rgba(63,64,58,.14); border-top-color:var(--accent);
      animation:spin .75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:560px) {
      body { padding:14px; align-items:start; padding-top:max(34px,env(safe-area-inset-top)); }
      .card { border-radius:24px; }
    }
  </style>
</head>
<body>
  <main id="app" class="card">
    <div class="loading"><div class="spinner"></div>로그인 화면으로 이동 중입니다.</div>
  </main>

  <script>
    function isMobileDevice() {
      const ua = navigator.userAgent || "";
      const iPadDesktop = navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1;
      return /Android|iPhone|iPad|iPod|Mobile/i.test(ua) || iPadDesktop;
    }

    function showHelpMenu() {
      document.title = "도움말 · 2-12 출석";
      document.getElementById("app").innerHTML = `
        <h1>도움말</h1>
        <p>설정할 항목을 선택하세요.</p>
        <div class="menu">
          <a href="./home-icon-setting/">
            <span>홈 화면 아이콘 설정<small>아이폰·안드로이드 홈 화면에 추가하는 방법</small></span>
            <span class="arrow">›</span>
          </a>
          <a href="./setup-face-id/">
            <span>Face ID / 기기 인증 설정<small>Face ID, Touch ID, Windows Hello 등록</small></span>
            <span class="arrow">›</span>
          </a>
        </div>
        <button class="back" onclick="location.href='./login/'">로그인으로 돌아가기</button>
      `;
    }

    document.addEventListener("DOMContentLoaded", function () {
      localStorage.removeItem("attendancePersistentAuth");
      const params = new URLSearchParams(location.search);
      if (params.get("help") === "1") {
        showHelpMenu();
        return;
      }
      location.replace("./login/");
    });
  </script>
</body>
</html>
