<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>2-12 출석</title>

  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./favicon.png" />

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #152033;
      --muted: #6b7280;
      --line: #e5e7eb;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    input,
    button {
      font-family: inherit;
    }

    input:disabled,
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 26px;
      margin: 0;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    .date-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: 800;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .online {
      background: #dcfce7;
      color: #166534;
    }

    .offline {
      background: #fee2e2;
      color: #991b1b;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .login-card {
      max-width: 440px;
      margin: 60px auto;
      padding: 28px;
    }

    .login-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 6px;
      letter-spacing: -0.04em;
    }

    .login-sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      margin: 12px 0 6px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 900;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
      width: 100%;
      margin-top: 14px;
    }

    .btn-ghost {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-small {
      padding: 9px 11px;
      font-size: 13px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    #googleButtonHome {
      display: flex;
      justify-content: center;
      min-height: 44px;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.50);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .loading-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .loading-panel {
      width: min(380px, calc(100vw - 48px));
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.28);
      transform: translateY(8px) scale(0.98);
      transition: transform 0.18s ease;
    }

    .loading-overlay.show .loading-panel {
      transform: translateY(0) scale(1);
    }

    .loading-spinner {
      display: block;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid #dbeafe;
      border-top-color: #2563eb;
      margin: 0 auto 16px;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-title {
      font-size: 18px;
      font-weight: 950;
      color: #111827;
      letter-spacing: -0.03em;
    }

    .loading-sub {
      font-size: 14px;
      color: #4b5563;
      margin-top: 8px;
      line-height: 1.6;
      word-break: break-all;
      font-weight: 700;
    }

    .dashboard {
      display: none;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0;
    }

    .summary-card {
      padding: 18px;
      border-radius: 18px;
      background: white;
      border: 1px solid var(--line);
    }

    .summary-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .summary-value {
      font-size: 30px;
      font-weight: 950;
      margin-top: 6px;
      letter-spacing: -0.04em;
    }

    .panel-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 950;
    }

    .log-list {
      display: flex;
      flex-direction: column;
    }

    .log-row {
      display: grid;
      grid-template-columns: 92px 86px 1fr 110px 1.4fr;
      gap: 10px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }

    .log-row:last-child {
      border-bottom: 0;
    }

    .log-header {
      background: #f8fafc;
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .status-chip {
      display: inline-flex;
      justify-content: center;
      min-width: 54px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .chip-present {
      background: #dcfce7;
      color: #166534;
    }

    .chip-late {
      background: #ffedd5;
      color: #9a3412;
    }

    .chip-dup {
      background: #e0e7ff;
      color: #3730a3;
    }

    .chip-bad {
      background: #fee2e2;
      color: #991b1b;
    }

    .chip-neutral {
      background: #f3f4f6;
      color: #374151;
    }

    .muted {
      color: var(--muted);
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    @media (max-width: 760px) {
      .wrap {
        padding: 14px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .log-row {
        grid-template-columns: 70px 70px 1fr;
      }

      .log-row .hide-mobile,
      .log-header .hide-mobile {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <section id="loginBox" class="card login-card">
      <div class="login-title">2학년 12반 출석</div>
      <div class="login-sub">
        Google 계정 또는 관리자 계정으로 로그인하세요.
      </div>

      <div id="googleButtonHome">
        <div id="googleButton"></div>
      </div>

      <div class="divider">또는 관리자 로그인</div>

      <label for="adminId">관리자 ID</label>
      <input id="adminId" type="text" placeholder="관리자 ID" autocomplete="username" />

      <label for="adminPw">관리자 비밀번호</label>
      <input id="adminPw" type="password" placeholder="비밀번호" autocomplete="current-password" />

      <button id="adminLoginBtn" class="btn-primary" onclick="adminLogin()">로그인</button>
    </section>

    <section id="dashboard" class="dashboard">
      <div class="topbar">
        <div class="title-row">
          <h1>출석 대시보드</h1>
          <span id="todayPill" class="date-pill">----</span>
        </div>

        <div class="status-row">
          <span class="status-item">
            MQTT <span id="mqttBadge" class="badge offline">OFFLINE</span>
          </span>
          <span class="status-item">
            ESP32 <span id="espBadge" class="badge offline">OFFLINE</span>
          </span>
          <button class="btn-ghost btn-small" onclick="loadTodayLogs()">새로고침</button>
          <button class="btn-ghost btn-small" onclick="logout()">로그아웃</button>
        </div>
      </div>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">전체</div>
          <div id="sumTotal" class="summary-value">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">출석</div>
          <div id="sumPresent" class="summary-value" style="color:#16a34a;">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">지각</div>
          <div id="sumLate" class="summary-value" style="color:#ea580c;">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">중복/기타</div>
          <div id="sumOther" class="summary-value" style="color:#64748b;">0</div>
        </div>
      </div>

      <div class="card">
        <div class="panel-head">
          <div>
            <div class="panel-title">오늘 출석 로그</div>
            <div id="loginInfo" class="muted" style="font-size:13px;margin-top:4px;">로그인 정보</div>
          </div>
          <div id="lastUpdated" class="muted" style="font-size:13px;">-</div>
        </div>

        <div class="panel-body">
          <div class="log-list">
            <div class="log-row log-header">
              <div>시간</div>
              <div>상태</div>
              <div>이름</div>
              <div class="hide-mobile">지문ID</div>
              <div class="hide-mobile">메시지</div>
            </div>
            <div id="logList"></div>
          </div>
        </div>
      </div>

      <div class="footer-note">
        Google 로그인 세션은 Apps Script Cache 기준 약 6시간 유지됩니다.
      </div>
    </section>
  </div>

  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-panel">
      <div class="loading-spinner"></div>
      <div id="loadingTitle" class="loading-title">잠시만 기다려주세요</div>
      <div id="loadingSub" class="loading-sub">로그인 확인 중입니다.</div>
    </div>
  </div>

  <div id="toast" class="toast">알림</div>

  <script>
    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbzE5SDb4aYv5MtyUCP1r0sAp24wBEfWbySKRQXxpuiLrv6irwSbG4L8ABSNWZY8pEvX/exec";

    const GOOGLE_CLIENT_ID =
      "802531292497-rjso2clr980pru87nc3sbf1nofq31kcc.apps.googleusercontent.com";

    const MQTT_HOST = "793e777e3e64408cafd9c5b413d3bd16.s1.eu.hivemq.cloud";
    const MQTT_WS_PORT = 8884;
    const MQTT_USER = "jiukeum";

    const MQTT_PASS = "Ojh1532591!";

    const TOPIC_STATUS = "attendance/2-12/status";
    const TOPIC_EVENT = "attendance/2-12/event";
    const TOPIC_HEARTBEAT = "attendance/2-12/heartbeat";

    const ESP_OFFLINE_AFTER_MS = 25000;

    let mqttClient = null;
    let lastEspSeenAt = 0;
    let espWatchTimer = null;
    let loginLoadingType = "";

    document.addEventListener("DOMContentLoaded", function () {
      setTodayPill();
      initGoogleButton();
      restoreSession();
      connectMqtt();
      startEspWatchdog();

      document.getElementById("adminPw").addEventListener("keydown", function (e) {
        if (e.key === "Enter") adminLogin();
      });
    });

    function setTodayPill() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      document.getElementById("todayPill").textContent = `${yyyy}-${mm}-${dd}`;
    }

    function initGoogleButton() {
      if (!window.google || !google.accounts || !google.accounts.id) {
        setTimeout(initGoogleButton, 300);
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential,
        auto_select: false,
        cancel_on_tap_outside: true
      });

      google.accounts.id.renderButton(
        document.getElementById("googleButton"),
        {
          type: "standard",
          theme: "outline",
          size: "large",
          text: "signin_with",
          shape: "pill",
          logo_alignment: "left",
          width: 280
        }
      );
    }

    function handleGoogleCredential(response) {
      if (!response || !response.credential) {
        stopLoginLoading();
        toast("Google 로그인 토큰을 받지 못했습니다.");
        return;
      }

      if (loginLoadingType) {
        return;
      }

      const idToken = response.credential;
      const googleEmail = getEmailFromGoogleCredential(idToken) || "Google 계정";

      startLoginLoading("google", googleEmail);

      const params = new URLSearchParams();
      params.set("action", "googleLoginJsonp");
      params.set("idToken", idToken);
      params.set("deviceName", navigator.platform || "");
      params.set("screenSize", window.innerWidth + "x" + window.innerHeight);
      params.set("clientTime", new Date().toISOString());
      params.set("clientTimezone", Intl.DateTimeFormat().resolvedOptions().timeZone || "");
      params.set("userAgent", navigator.userAgent || "");

      callJsonp(APPS_SCRIPT_URL + "?" + params.toString(), function (res) {
        stopLoginLoading();

        if (!res || !res.ok) {
          toast((res && res.message) ? res.message : "Google 로그인 실패");
          return;
        }

        sessionStorage.setItem("loginType", "google");
        sessionStorage.setItem("sessionToken", res.sessionToken || "");
        sessionStorage.setItem("loginEmail", res.email || "");
        sessionStorage.setItem("loginName", res.name || "");
        sessionStorage.setItem("loginRole", res.role || "GOOGLE");

        toast("Google 로그인 성공");
        showDashboard();
        loadTodayLogs();
      });
    }

    function getEmailFromGoogleCredential(idToken) {
      try {
        const parts = String(idToken || "").split(".");
        if (parts.length < 2) return "";

        let payload = parts[1].replace(/-/g, "+").replace(/_/g, "/");

        while (payload.length % 4) {
          payload += "=";
        }

        const jsonText = decodeURIComponent(
          Array.prototype.map.call(atob(payload), function (c) {
            return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
          }).join("")
        );

        const data = JSON.parse(jsonText);
        return String(data.email || "").trim();

      } catch (err) {
        return "";
      }
    }

    function adminLogin() {
      if (loginLoadingType) {
        return;
      }

      const adminId = document.getElementById("adminId").value.trim();
      const adminPw = document.getElementById("adminPw").value.trim();

      if (!adminId || !adminPw) {
        toast("관리자 ID/PW를 입력하세요.");
        return;
      }

      startLoginLoading("admin", adminId);

      const params = new URLSearchParams();
      params.set("action", "dashboardLoginJsonp");
      params.set("adminId", adminId);
      params.set("adminPw", adminPw);
      params.set("deviceName", navigator.platform || "");
      params.set("screenSize", window.innerWidth + "x" + window.innerHeight);
      params.set("clientTime", new Date().toISOString());
      params.set("clientTimezone", Intl.DateTimeFormat().resolvedOptions().timeZone || "");
      params.set("userAgent", navigator.userAgent || "");

      callJsonp(APPS_SCRIPT_URL + "?" + params.toString(), function (res) {
        stopLoginLoading();

        if (!res || !res.ok) {
          toast((res && res.message) ? res.message : "관리자 로그인 실패");
          return;
        }

        sessionStorage.setItem("loginType", "admin");
        sessionStorage.setItem("adminId", adminId);
        sessionStorage.setItem("adminPw", adminPw);
        sessionStorage.setItem("loginRole", res.role || "ADMIN");

        toast("관리자 로그인 성공");
        showDashboard();
        loadTodayLogs();
      });
    }

    function startLoginLoading(type, accountText) {
      loginLoadingType = type;

      const overlay = document.getElementById("loadingOverlay");
      const title = document.getElementById("loadingTitle");
      const sub = document.getElementById("loadingSub");

      if (type === "google") {
        title.textContent = "Google 계정 로그인 중입니다.";
        sub.textContent = accountText + "로 로그인 중입니다.";
      } else {
        title.textContent = "관리자 계정 로그인 중입니다.";
        sub.textContent = accountText + "으로 로그인 중...";
      }

      setAdminLoginDisabled(true);

      if (overlay) {
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
      }
    }

    function stopLoginLoading() {
      const overlay = document.getElementById("loadingOverlay");

      if (overlay) {
        overlay.classList.remove("show");
        overlay.setAttribute("aria-hidden", "true");
      }

      setAdminLoginDisabled(false);
      loginLoadingType = "";
    }

    function setAdminLoginDisabled(disabled) {
      const adminId = document.getElementById("adminId");
      const adminPw = document.getElementById("adminPw");
      const adminLoginBtn = document.getElementById("adminLoginBtn");

      if (adminId) adminId.disabled = disabled;
      if (adminPw) adminPw.disabled = disabled;
      if (adminLoginBtn) adminLoginBtn.disabled = disabled;
    }

    function restoreSession() {
      const loginType = sessionStorage.getItem("loginType") || "";

      if (loginType === "google" && sessionStorage.getItem("sessionToken")) {
        showDashboard();
        loadTodayLogs();
        return;
      }

      if (loginType === "admin" && sessionStorage.getItem("adminId") && sessionStorage.getItem("adminPw")) {
        showDashboard();
        loadTodayLogs();
      }
    }

    function logout() {
      sessionStorage.clear();
      stopLoginLoading();

      if (window.google && google.accounts && google.accounts.id) {
        google.accounts.id.disableAutoSelect();
      }

      document.getElementById("dashboard").style.display = "none";
      document.getElementById("loginBox").style.display = "block";

      toast("로그아웃 완료");
    }

    function showDashboard() {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      const loginType = sessionStorage.getItem("loginType") || "";
      const role = sessionStorage.getItem("loginRole") || "";

      if (loginType === "google") {
        const email = sessionStorage.getItem("loginEmail") || "";
        const name = sessionStorage.getItem("loginName") || "";

        document.getElementById("loginInfo").textContent =
          `Google 로그인: ${name || email} / ${role}`;
      } else {
        const adminId = sessionStorage.getItem("adminId") || "";

        document.getElementById("loginInfo").textContent =
          `관리자 로그인: ${adminId} / ${role}`;
      }
    }

    function loadTodayLogs() {
      const params = new URLSearchParams();
      params.set("action", "todayLogs");
      addAuthParams(params);

      callJsonp(APPS_SCRIPT_URL + "?" + params.toString(), function (res) {
        if (!res || !res.ok) {
          toast((res && res.message) ? res.message : "오늘 로그 조회 실패");

          if (String((res && res.message) || "").includes("세션")) {
            logout();
          }

          return;
        }

        renderTodayLogs(res);
      });
    }

    function addAuthParams(params) {
      const loginType = sessionStorage.getItem("loginType") || "";

      if (loginType === "google") {
        params.set("sessionToken", sessionStorage.getItem("sessionToken") || "");
        return;
      }

      params.set("adminId", sessionStorage.getItem("adminId") || "");
      params.set("adminPw", sessionStorage.getItem("adminPw") || "");
    }

    function renderTodayLogs(res) {
      const summary = res.summary || {};
      const logs = res.logs || [];

      document.getElementById("todayPill").textContent = res.date || "";
      document.getElementById("sumTotal").textContent = summary.total || 0;
      document.getElementById("sumPresent").textContent = summary.present || 0;
      document.getElementById("sumLate").textContent = summary.late || 0;

      const other =
        Number(summary.duplicate || 0) +
        Number(summary.unknown || 0) +
        Number(summary.inactive || 0) +
        Number(summary.error || 0);

      document.getElementById("sumOther").textContent = other;

      const list = document.getElementById("logList");

      if (!logs.length) {
        list.innerHTML = `
          <div class="log-row">
            <div class="muted">-</div>
            <div><span class="status-chip chip-neutral">없음</span></div>
            <div class="muted">오늘 로그가 없습니다.</div>
            <div class="hide-mobile muted">-</div>
            <div class="hide-mobile muted">-</div>
          </div>
        `;
      } else {
        list.innerHTML = logs.map(renderLogRow).join("");
      }

      document.getElementById("lastUpdated").textContent =
        "마지막 업데이트 " + new Date().toLocaleTimeString("ko-KR");
    }

    function renderLogRow(log) {
      const status = log.status || "";
      const chipClass = getStatusChipClass(status);

      return `
        <div class="log-row">
          <div>${escapeHtml(log.time || "")}</div>
          <div><span class="status-chip ${chipClass}">${escapeHtml(status)}</span></div>
          <div>
            <strong>${escapeHtml(log.name || "-")}</strong>
            <div class="muted" style="font-size:12px;">${escapeHtml(log.date || "")}</div>
          </div>
          <div class="hide-mobile">${escapeHtml(log.fingerId || "")}</div>
          <div class="hide-mobile muted">${escapeHtml(log.message || "")}</div>
        </div>
      `;
    }

    function getStatusChipClass(status) {
      if (status === "출석") return "chip-present";
      if (status === "지각") return "chip-late";
      if (status === "중복") return "chip-dup";
      if (status === "미등록" || status === "비활성" || status === "오류") return "chip-bad";

      return "chip-neutral";
    }

    function connectMqtt() {
      if (!window.mqtt) {
        setTimeout(connectMqtt, 500);
        return;
      }

      if (!MQTT_PASS || MQTT_PASS === "여기에_MQTT_비밀번호") {
        setMqttBadge(false);
        console.warn("MQTT_PASS가 비어 있습니다.");
        return;
      }

      const url = `wss://${MQTT_HOST}:${MQTT_WS_PORT}/mqtt`;

      const clientId =
        "dashboard-2-12-" +
        Math.random().toString(16).slice(2) +
        "-" +
        Date.now();

      mqttClient = mqtt.connect(url, {
        clientId: clientId,
        username: MQTT_USER,
        password: MQTT_PASS,
        clean: true,
        connectTimeout: 8000,
        reconnectPeriod: 3000,
        keepalive: 30
      });

      mqttClient.on("connect", function () {
        setMqttBadge(true);
        toast("MQTT 연결됨");

        mqttClient.subscribe(TOPIC_STATUS);
        mqttClient.subscribe(TOPIC_HEARTBEAT);
        mqttClient.subscribe(TOPIC_EVENT);
      });

      mqttClient.on("reconnect", function () {
        setMqttBadge(false);
      });

      mqttClient.on("close", function () {
        setMqttBadge(false);
      });

      mqttClient.on("error", function (err) {
        setMqttBadge(false);
        console.error("MQTT error", err);
      });

      mqttClient.on("message", function (topic, message) {
        const text = message.toString();
        let data = {};

        try {
          data = JSON.parse(text);
        } catch (err) {
          data = { raw: text };
        }

        handleMqttMessage(topic, data);
      });
    }

    function handleMqttMessage(topic, data) {
      console.log("MQTT", topic, data);

      if (topic === TOPIC_STATUS) {
        if (data.status === "online") {
          markEspOnline();
        } else if (data.status === "offline") {
          setEspBadge(false);
        }
      }

      if (topic === TOPIC_HEARTBEAT) {
        markEspOnline();
      }

      if (topic === TOPIC_EVENT) {
        markEspOnline();

        if (
          data.type === "attendance" ||
          data.type === "queued_sent" ||
          data.type === "queued"
        ) {
          setTimeout(loadTodayLogs, 700);
        }
      }
    }

    function markEspOnline() {
      lastEspSeenAt = Date.now();
      setEspBadge(true);
    }

    function startEspWatchdog() {
      if (espWatchTimer) clearInterval(espWatchTimer);

      espWatchTimer = setInterval(function () {
        if (!lastEspSeenAt) {
          setEspBadge(false);
          return;
        }

        if (Date.now() - lastEspSeenAt > ESP_OFFLINE_AFTER_MS) {
          setEspBadge(false);
        }
      }, 3000);
    }

    function setMqttBadge(isOnline) {
      const el = document.getElementById("mqttBadge");

      if (!el) return;

      el.textContent = isOnline ? "ONLINE" : "OFFLINE";
      el.className = "badge " + (isOnline ? "online" : "offline");
    }

    function setEspBadge(isOnline) {
      const el = document.getElementById("espBadge");

      if (!el) return;

      el.textContent = isOnline ? "ONLINE" : "OFFLINE";
      el.className = "badge " + (isOnline ? "online" : "offline");
    }

    function callJsonp(url, callback) {
      const callbackName =
        "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

      let script = null;
      let finished = false;

      const timer = setTimeout(function () {
        if (finished) return;

        finished = true;

        delete window[callbackName];

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }

        if (loginLoadingType) {
          stopLoginLoading();
        }

        toast("Apps Script 응답 시간 초과");
      }, 15000);

      window[callbackName] = function (data) {
        if (finished) return;

        finished = true;
        clearTimeout(timer);

        try {
          callback(data);
        } finally {
          delete window[callbackName];

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      };

      const sep = url.includes("?") ? "&" : "?";

      script = document.createElement("script");
      script.src = url + sep + "callback=" + encodeURIComponent(callbackName);

      script.onerror = function () {
        if (finished) return;

        finished = true;
        clearTimeout(timer);

        delete window[callbackName];

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }

        if (loginLoadingType) {
          stopLoginLoading();
        }

        toast("Apps Script 연결 실패");
      };

      document.head.appendChild(script);
    }

    function toast(message) {
      const el = document.getElementById("toast");

      el.textContent = message;
      el.classList.add("show");

      setTimeout(function () {
        el.classList.remove("show");
      }, 2200);
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
