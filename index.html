<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2-12 출석 시스템</title>

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <style>
    :root {
      --bg: #fafaf8;
      --card: #fffefb;
      --text: #1f2320;
      --muted: #74746e;
      --line: rgba(92, 92, 84, 0.18);
      --accent: #3f403a;
      --accent-text: #ffffff;
      --shadow: 0 18px 50px rgba(31, 35, 32, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      padding: 24px;
    }

    .card {
      width: min(440px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 34px 28px;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      letter-spacing: -0.06em;
      line-height: 1.15;
      font-weight: 950;
    }

    p {
      margin: 12px 0 28px;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 700;
      font-size: 15px;
    }

    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 16px;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
      font-family: inherit;
    }

    .sub {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>2학년 12반<br>출석 시스템</h1>
    <p>
      관리자 로그인 후 출석 대시보드에 접속할 수 있습니다.
    </p>

    <button onclick="goLogin()">로그인</button>

    <div class="sub">
      로그인 세션이 있으면 대시보드로 바로 이동합니다.
    </div>
  </main>

  <script>
    function hasSession() {
      return !!(
        sessionStorage.getItem("sessionToken") ||
        sessionStorage.getItem("adminId")
      );
    }

    function goLogin() {
      if (hasSession()) {
        location.href = "./dashboard/";
      } else {
        location.href = "./login/";
      }
    }
  </script>
</body>
</html>
